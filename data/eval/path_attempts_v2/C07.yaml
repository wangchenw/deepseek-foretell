  description: |
    fetch_schedule 类工具（get_recent_form / get_team_schedule / get_team_season_stats）无 basketball
    版本且未做 sport guard，篮球 team_id（10155 勇士 / 10131 太阳）静默命中 football_team 同 id
    足球实体（科特布斯/格勒诺布尔），code=OK 返回足球战绩/赛程。但 SQL 基准证明 basketball_match
    表中勇士/太阳的 NBA 近期战绩与交锋完整存在。属「数据库能撑、工具实现缺失 + sport guard 缺失」，
    非 data_gap，非无解。
  failed_atomic: C07-T1-a2
route_complete: false
route_complete_reason: |
  数据层路径完整（SQL 基准可完整回答勇士/太阳近期战绩 + 交锋），但工具层路径不可安全完成
  （现有工具静默返回足球数据，会误导 LLM 产出 false positive）。route_complete 以「工具链能否
  安全完成」为准，故 false；但 verdict 不再是 ❌，而是 ⚠️（implementation_gap，可修复）。
