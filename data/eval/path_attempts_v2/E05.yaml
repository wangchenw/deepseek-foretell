type_id: E05
case_id: TC-E05-REG-007
explored_at: '2026-06-29'
methodology: Agent 2 SQL 优先（schema → 独立 SQL 基准 → 工具对照 → 判定）
rework_reason: >-
  原判 ⚠️ routing_gap（合成 ID 假命中）。用户指出"竞彩合成 ID 假命中影响 E05"是
  工具逻辑问题，需用 SQL 基准验证：DB 真实十四场期次/14 场赛事是哪些，
  resolve_lottery_match / get_lottery_schedule 返回的合成 match_id 是否与真实
  football_match 对应，还是假命中。

atomics:
  - id: E05-T0-a1
    category: fetch_schedule
    target: 胜负彩/十四场 401 本期场次
    hard_constraints:
      - get_lottery_schedule play_type=401
      - 返回 14 场列表
    rounds:
      - round: 1
        hypothesis: >-
          先查 lottery 相关表结构，确认十四场（sfc/401）的期次表与场次表字段，
          重点核实 lottery_zc_match.match_id 与 lottery_match.match_id 的语义
          是否指向 football_match.id。
        schema_query: |
          information_schema.columns WHERE table_schema=DATABASE()
          AND table_name LIKE '%lottery%'   -- 已通过 helper schema "lottery"
        schema_result: >-
          确认关键表：
          (1) lottery_zc_issue(type=sfc/rj/bqc/jqc, issue, result, start_time,
              end_time, draw_time) — 期次表；
          (2) lottery_zc_match(type, issue, match_id, comp, home, away,
              match_time, match_time_str, result) — 场次表，match_id 字段
              **无 column_comment**，语义存疑；
          (3) lottery_match(sport_id, match_id, lottery_type[101/201/301/401/402/
              403/404], issue, issue_num, home_name, away_name, is_same,
              lottery_match_id) — 彩种关联表，含两个 ID 字段：
              match_id（注释"比赛id"）与 lottery_match_id（注释"体彩官方比赛ID，
              彩种唯一"）。关键线索：lottery_match 同时持有 match_id 与
              lottery_match_id 两个字段，提示二者并不等价。
        decision: continue

      - round: 2
        hypothesis: >-
          独立写 SQL 求本期十四场期次与 14 场赛事的"应该答案"，作为基准。
          先定位本期 issue（type=sfc 中最新且未开奖、停售时间未过的期次），
          再分别从 lottery_zc_match(type=sfc) 与 lottery_match(lottery_type=401)
          拉 14 场，对比两者的 match_id 字段数值是否一致。
        sql_baseline:
          query_1: >-
            SELECT issue, type, result, FROM_UNIXTIME(draw_time) draw_dt,
            FROM_UNIXTIME(end_time) end_dt, FROM_UNIXTIME(start_time) start_dt
            FROM lottery_zc_issue WHERE type='sfc' ORDER BY issue DESC LIMIT 8
          result_1: >-
            本期 = issue 26089（type=sfc，result=null 未开奖；开售 2026-06-28 18:00、
            停售 2026-06-29 22:00、开奖 2026-07-04 00:00）。上期 26088 已开奖
            result="3,0,0,3,3,1,0,3,0,0,3,0,1,0"。
          query_2: >-
            SELECT issue, match_no, home, away, match_time_str, match_id, comp
            FROM (SELECT issue, match_id, comp, home, away, match_time_str,
                  ROW_NUMBER() OVER (ORDER BY match_id) match_no
                  FROM lottery_zc_match WHERE type='sfc' AND issue=26089) t LIMIT 20
          result_2: >-
            14 场全为 2026 世界杯：第1场 巴西vs日本(06-30)、第2场 德国vs巴拉圭、
            第3场 荷兰vs摩洛哥、第4场 科特迪vs挪威(07-01)、第5场 法国vs瑞典、
            第6场 墨西哥vs厄瓜多、第7场 英格兰vs刚果金(07-02)、第8场 美国vs波黑、
            第9场 西班牙vs奥地利(07-03)、第10场 葡萄牙vs克罗地、第11场 瑞士vs阿尔及、
            第12场 澳大利vs埃及(07-04)、第13场 阿根廷vs佛得角、第14场 哥伦比vs加纳。
            lottery_zc_match.match_id 取值 = 260891, 260892, 260893, 260894, 260895,
            260896, 260897, 260898, 260899, 2608910, 2608911, 2608912, 2608913,
            2608914 —— 形如 issue*10+match_no 的合成值。
          query_3: >-
            SELECT issue, issue_num, lottery_match_id, match_id, home_name,
            away_name, is_same FROM lottery_match
            WHERE lottery_type=401 AND issue='26089' ORDER BY issue_num LIMIT 20
          result_3: >-
            14 行，同一期 issue=26089，home_name/away_name 与 lottery_zc_match
            完全一致（is_same=1）。关键字段对照：
            第1场 lottery_match_id=260891, match_id=4459720（巴西vs日本）；
            第2场 lottery_match_id=260892, match_id=4459718（德国vs巴拉圭）；
            第3场 lottery_match_id=260893, match_id=4459719（荷兰vs摩洛哥）；
            第10场 lottery_match_id=2608910, match_id=4459727（葡萄牙vs克罗地）；
            第14场 lottery_match_id=2608914, match_id=4459732（哥伦比vs加纳）。
            **结论：lottery_zc_match.match_id == lottery_match.lottery_match_id
            （合成彩票官方 ID）；而真实 football_match.id 存放在
            lottery_match.match_id（44597xx 系列）。**
        decision: continue

      - round: 3
        hypothesis: >-
          验证合成 ID 与真实 ID 在 football_match 中的对应关系，坐实"合成 ID 假命中"：
          (a) 用合成 ID 260891/260892/260893/2608914 查 football_match，看是否
          指向 2026 世界杯 巴西vs日本 等；(b) 用真实 ID 4459720/4459718/4459719/
          4459721/4459722/4459732 查 football_match JOIN football_team，看对阵
          是否与十四场名单一致。
        sql_baseline:
          query_a: >-
            SELECT m.id match_id, ht.name_zh home, at.name_zh away,
                   FROM_UNIXTIME(m.match_time) mt, m.status_id
            FROM football_match m
            LEFT JOIN football_team ht ON ht.id=m.home_team_id
            LEFT JOIN football_team at ON at.id=m.away_team_id
            WHERE m.id IN (260891,260892,260893,2608914) ORDER BY m.id LIMIT 10
          result_a: >-
            合成 ID 全部命中**真实但不相关的历史 football_match 行**：
            260891 → 高马 vs 斯特拉斯堡B队，2009-08-16 00:00，status=8（已结束，
            法低级联赛）；260892 → 雷昂 vs 敦刻尔克，2009-08-16；260893 →
            贝桑松 vs 阿尔弗维利，2009-08-16；2608914 → 都柏林大学 vs
            圣帕特里克竞技，2019-03-02，status=8（爱尔兰联赛）。
            即合成 ID 数值与历史 football_match.id 碰撞，指向 2009/2019 年比赛，
            而非工具宣称的 2026 世界杯。
          query_b: >-
            SELECT m.id match_id, ht.name_zh home, at.name_zh away,
                   FROM_UNIXTIME(m.match_time) mt, m.status_id
            FROM football_match m
            LEFT JOIN football_team ht ON ht.id=m.home_team_id
            LEFT JOIN football_team at ON at.id=m.away_team_id
            WHERE m.id IN (4459720,4459718,4459719,4459721,4459722,4459723,
                           4459724,4459725,4459727,4459728,4459729,4459797,
                           4459731,4459732) ORDER BY m.id LIMIT 20
          result_b: >-
            真实 ID 全部正确对应 2026 世界杯十四场对阵，status_id=1（未开赛）：
            4459720→巴西vs日本(06-30 01:00)、4459718→德国vs巴拉圭、
            4459719→荷兰vs摩洛哥、4459721→法国vs瑞典(07-01)、
            4459722→科特迪瓦vs挪威、4459723→墨西哥vs厄瓜多尔、
            4459724→英格兰vs刚果民主共和国(07-02)、4459725→美国vs波黑、
            4459727→葡萄牙vs克罗地亚(07-03)、4459728→西班牙vs奥地利、
            4459729→瑞士vs阿尔及利亚、4459797→澳大利亚vs埃及(07-04)、
            4459731→阿根廷vs佛得角、4459732→哥伦比亚vs加纳。
            与 lottery_zc_match.home/away 完全一致。DB 数据完整可用。
        decision: continue

      - round: 4
        hypothesis: >-
          调工具对照：get_lottery_schedule(401) 与 resolve_lottery_match(401,
          code=1, issue=26089) 返回的 match_id 是合成 ID 还是真实 football_match.id，
          并验证下游 get_odds_snapshot 用两种 ID 的差异（坐实生产环境影响）。
        tool_call:
          - name: get_lottery_schedule
            params: {play_type: '401'}
            result: >-
              code=OK, count=14, issue=26089，14 场 home_name/away_name/league_name
              /date 全部正确（巴西vs日本 2026-06-30 ... 哥伦比vs加纳 2026-07-04），
              但每条 match_id = 260891, 260892, ..., 2608914 —— 即 lottery_zc_match
              的合成 ID，非真实 football_match.id。
          - name: resolve_lottery_match
            params: {play_type: '401', code: '1', issue: '26089'}
            result: >-
              code=OK, count=10 候选（各期第1场），每条 match_id 同样是合成 ID：
              260891（本期 巴西vs日本）、260881（上期 瑞士vs加拿大）、260871、
              260861、260851 ... 260801。共享同一合成 ID 假命中 bug。
          - name: resolve_match
            params: {home: 巴西, away: 日本, date: '2026-06-30'}
            result: >-
              code=OK, count=1, match_id=4459720, home_team_id=10477,
              away_team_id=14529, league=世界杯, status=not_started,
              match_time_beijing=2026-06-30 01:00:00。正确返回真实 football_match.id。
          - name: get_odds_snapshot
            params: {match_id: 260891}
            result: >-
              code=SKIP_MATCH，reason="欧赔与亚盘均缺失"。用合成 ID 下游取不到
              本期赔率（合成 ID 指向的 2009 法低级联赛无盘口数据）。
          - name: get_odds_snapshot
            params: {match_id: 4459720}
            result: >-
              code=OK，返回平博/盈禾/利记/澳门/韦德 等多家欧赔（主胜 1.72-1.80、
              和 3.4-3.65、客胜 4.25-5.13）+ 平博/澳门/皇冠 等亚盘（盘口 -0.75）。
              真实 ID 下游数据完整。
        comparison: >-
          SQL 基准 vs 工具返回：
          (1) 14 场名单（home/away/league/date/期次）—— 工具与 SQL 基准完全一致，
              get_lottery_schedule(401) 拿 14 场名单这一步可信；
          (2) match_id 字段 —— 工具返回 260891/260892/.../2608914（合成 ID），
              SQL 基准证明真实 football_match.id 为 4459720/4459718/...（来自
              lottery_match.match_id，而非 lottery_zc_match.match_id），
              二者**不一致**；
          (3) 合成 ID 数值与历史 football_match.id 碰撞 —— SQL 直查 football_match
              证实 260891 实为 2009-08-16 法低级联赛"高马 vs 斯特拉斯堡B队"
              （status=8 已结束），2608914 实为 2019 爱尔兰联赛"都柏林大学 vs
              圣帕特里克竞技"，并非工具标注的 2026 世界杯 巴西vs日本/哥伦比vs加纳；
          (4) 下游影响 —— get_odds_snapshot(260891)=SKIP_MATCH（空），
              get_odds_snapshot(4459720)=OK（多家欧赔+亚盘）。即工具返回的
              match_id 字段若被下游当作 football_match.id 使用，要么取不到数据
              （SKIP_MATCH），要么在存在历史盘口时会取到 2009/2019 年的错误
              比赛盘口——生产环境会基于错误比赛数据出方案。
        decision: blocked_with_root_cause

    final_status: blocked
    gap_type: tool_logic_gap
    gap_evidence: >-
      工具层字段语义错误，已用 SQL 基准三向对照实锤：
      (A) 表结构层：lottery_match 同时持有 match_id（真实 football_match.id，
      4459720 系列，注释"比赛id"）与 lottery_match_id（合成彩票官方 ID，
      260891 系列，注释"体彩官方比赛ID，彩种唯一"）；lottery_zc_match.match_id
      实为后者（合成 ID，issue*10+match_no），字段名虽叫 match_id 但**不指向
      football_match.id**。
      (B) 工具实现层：mysql_client.get_lottery_schedule 对 play_type=401
      （FOURTEEN_MATCHES, zc_type='sfc'）直接 SELECT lottery_zc_match.match_id
      并在 _row_lottery_entry 中以 entry["match_id"] = row.get("match_id") 透传，
      导致返回的 match_id 字段是合成 ID 而非真实 football_match.id；字段名
      "match_id" 误导下游（get_odds_snapshot / get_recent_form 等均按
      football_match.id 语义使用）。
      (C) SQL 基准对照层：合成 ID 260891 在 football_match 中命中 2009-08-16
      法低级联赛"高马 vs 斯特拉斯堡B队"（status=8），而非 2026 世界杯"巴西 vs
      日本"（真实 id=4459720, status=1）；2608914 命中 2019 爱尔兰联赛而非
      "哥伦比 vs 加纳"（真实 id=4459732）。get_odds_snapshot(260891)=SKIP_MATCH、
      get_odds_snapshot(4459720)=OK 进一步证明下游影响。
      综上：SQL 能查到 14 场真实赛事与真实 match_id（DB 数据完整），但工具
      get_lottery_schedule/resolve_lottery_match 返回的 match_id 是合成 ID 且
      与历史 football_match.id 碰撞 → **tool_logic_gap（⚠️, P1）**，非 routing_gap
      （路由正确、参数正确、工具被正确选中，问题在工具返回字段的语义与取值），
      非 data_gap（DB 有完整十四场数据）。
    recommended_next_step: >-
      工程修复（foretell/tools/crazy_sports/mysql_client.py）：
      对 zc 类玩法（401/402/403），_row_lottery_entry 不应直接透传
      lottery_zc_match.match_id 作为 match_id；应 JOIN lottery_match
      （ON lottery_match.lottery_type=<对应彩种> AND lottery_match.issue=
      lottery_zc_match.issue AND lottery_match.lottery_match_id=
      lottery_zc_match.match_id）取 lottery_match.match_id 作为真实
      football_match.id，或新增 real_match_id 字段并保留 lottery_code/issue_num
      供展示。临时规避：上层 agent 忽略 lottery 工具返回的 match_id，对每场
      用 resolve_match(home_name, away_name, date) 重解析得真实 match_id 后
      再 get_odds_snapshot/get_recent_form（已验证可行）。

  - id: E05-T0-a3
    category: fetch_stats
    target: 各场基本面
    hard_constraints:
      - get_recent_form stub
    rounds:
      - round: 1
        hypothesis: a3 依赖真实 team_id，验证 resolve_team+get_recent_form 路径可用。
        tool_call:
          - name: resolve_team
            params: {name: 巴西}
            result: code=OK, team_id=10477（国家队），与 football_match.home_team_id 一致。
          - name: get_recent_form
            params: {team_id: 10477, limit: 5}
            result: code=OK, 非 stub，返回近 5 场战绩（含日期/胜负/进失球/主客）。
        comparison: 真实 team_id 路径下基本面数据完整，与 a1 合成 ID 问题独立。
        decision: satisfied
    final_status: satisfied
    gap_type: null
    gap_evidence: >-
      a3 走 resolve_team(home_name)→team_id→get_recent_form，与 lottery 合成 ID
      路径解耦，数据可用。注意：若误用合成 ID 反查 team 则会出错，但正确路径
      （球队名解析）已验证通畅。

  - id: E05-T0-a4
    category: fetch_odds_snapshot
    target: 各场赔率
    hard_constraints:
      - stub 实现 gap
    rounds:
      - round: 1
        hypothesis: >-
          a4 取赔率依赖正确 match_id。分别用合成 ID 与真实 ID 调
          get_odds_snapshot 对照，验证合成 ID 假命中是否影响赔率环节。
        tool_call:
          - name: get_odds_snapshot
            params: {match_id: 260891}
            result: code=SKIP_MATCH，reason="欧赔与亚盘均缺失"（合成 ID 无盘口）。
          - name: get_odds_snapshot
            params: {match_id: 4459720}
            result: >-
              code=OK，多家欧赔（平博/盈禾/利记/澳门/韦德）+ 亚盘（平博/澳门/皇冠，
              盘口 -0.75）齐全。SQL 直查 football_odds_europe match_id=4459720 亦证实。
        comparison: >-
          真实 ID 赔率完整 OK；合成 ID 赔率 SKIP_MATCH。a4 本身工具非 stub、
          数据可用，但其可用性前提是上游传入真实 match_id——直接受 a1 的
          tool_logic_gap 连带影响。
        decision: satisfied_with_caveat
    final_status: satisfied
    gap_type: null
    gap_evidence: >-
      get_odds_snapshot 非 stub、真实 ID 下数据完整；但若上游沿用 a1 工具返回的
      合成 match_id，则 a4 会得 SKIP_MATCH（或潜在错误历史盘口）。a4 自身无独立
      gap，风险继承自 a1 的 tool_logic_gap。

  - id: E05-T0-a2
    category: delegate_subagent
    target: screening-agent 两阶段初筛
    hard_constraints:
      - 稳胆+搏冷分层
      - 含风险提示
    rounds:
      - round: 1
        hypothesis: a2 属智能体编排层，非 MySQL 工具链数据路径，不在探路范围。
        decision: skipped
    final_status: skipped
    gap_type: context_gap
    gap_evidence: >-
      稳胆+搏冷分层、风险提示属 screening-agent 编排与答案合成层，非 foretell
      MySQL 工具链；数据齐备后由上层 agent 完成，标记 context_gap（编排层）。

  - id: E05-T0-a5
    category: synthesize_answer
    target: 十四场方案输出
    hard_constraints:
      - 两阶段初筛结构
      - 数据诚实
    rounds:
      - round: 1
        hypothesis: a5 属答案合成层，依赖 a1/a3/a4 数据，非数据路径。
        decision: skipped
    final_status: skipped
    gap_type: context_gap
    gap_evidence: >-
      十四场方案输出（两阶段初筛结构、数据诚实）属答案合成层，由 LLM 决定；
      数据路径已通（需走 a1 规避路径），合成质量不属工具链探路范围。

satisfied:
  - E05-T0-a3
  - E05-T0-a4

blocking_gap:
  type: tool_logic_gap
  priority: P1
  description: >-
    竞彩合成 ID 假命中（工具逻辑缺陷，非路由、非数据缺失）。get_lottery_schedule
    (401) 与 resolve_lottery_match 返回的 match_id 字段直接透传
    lottery_zc_match.match_id（合成彩票官方 ID，形如 issue*10+match_no，
    如 260891/2608910/2608914），而非真实 football_match.id（4459720/4459727/
    4459732，存于 lottery_match.match_id）。合成 ID 数值与历史 football_match.id
    碰撞：260891 实为 2009-08-16 法低级联赛"高马 vs 斯特拉斯堡B队"（status=8），
    2608914 实为 2019 爱尔兰联赛"都柏林大学 vs 圣帕特里克竞技"，并非工具标注的
    2026 世界杯"巴西 vs 日本"/"哥伦比 vs 加纳"。生产环境若用该 match_id 下游取
    赔率/统计，会得到 SKIP_MATCH 或错误比赛的历史盘口。
  failed_atomic: E05-T0-a1
  root_cause_location: foretell/tools/crazy_sports/mysql_client.py
  root_cause_detail: >-
    get_lottery_schedule 对 zc 类玩法 SELECT lottery_zc_match.match_id 并在
    _row_lottery_entry 中 entry["match_id"]=row.get("match_id") 透传；
    lottery_zc_match.match_id 实为合成彩票官方 ID（= lottery_match.lottery_match_id），
    非 football_match.id。应 JOIN lottery_match 取 lottery_match.match_id 作为
    真实 match_id（或新增 real_match_id 字段）。
  workaround: >-
    忽略 lottery 工具返回的 match_id，对每场用 resolve_match(home_name, away_name,
    date) 重解析得真实 football_match.id（4459720 等），再 get_odds_snapshot/
    get_recent_form。已验证可行：resolve_match(巴西,日本,2026-06-30)→4459720→
    get_odds_snapshot OK。

route_complete: true

verdict: warning   # ✅ / ⚠️ / ❌  → ⚠️（改判：routing_gap → tool_logic_gap, P1）
verdict_change: >-
  由原 ⚠️ routing_gap 改判为 ⚠️ tool_logic_gap（P1）。理由：SQL 基准证明 DB 有
  完整 14 场真实数据与真实 match_id（lottery_match.match_id=4459720 系列），
  非 data_gap；路由与参数均正确（get_lottery_schedule(401) 被正确选中并返回
  14 场），非 routing_gap；问题在工具返回的 match_id 字段语义错误（透传合成
  ID 而非真实 football_match.id）且合成 ID 与历史 football_match.id 碰撞，
  属工具逻辑缺陷 → tool_logic_gap。route_complete=true（存在 resolve_match
  重解析规避路径），但生产环境直接用工具返回 match_id 会出错，故判 ⚠️ 而非 ✅。

key_findings:
  - >-
    SQL 基准 14 场真实 match_id（来自 lottery_match.match_id，JOIN football_team
    验证对阵一致）：4459720 巴西vs日本、4459718 德国vs巴拉圭、4459719 荷兰vs
    摩洛哥、4459722 科特迪瓦vs挪威、4459721 法国vs瑞典、4459723 墨西哥vs
    厄瓜多尔、4459724 英格兰vs刚果民主共和国、4459725 美国vs波黑、4459728
    西班牙vs奥地利、4459727 葡萄牙vs克罗地亚、4459729 瑞士vs阿尔及利亚、
    4459797 澳大利亚vs埃及、4459731 阿根廷vs佛得角、4459732 哥伦比亚vs加纳
    （均 status=1 未开赛，2026 世界杯）。
  - >-
    工具返回 match_id（合成 ID，来自 lottery_zc_match.match_id）：260891/260892/
    .../2608914。与真实 football_match.id 不一致，且合成 ID 在 football_match
    中命中 2009 法低级联赛（260891→高马vs斯特拉斯堡B队）、2019 爱尔兰联赛
    （2608914→都柏林大学vs圣帕特里克竞技）等历史比赛 → 合成 ID 假命中实锤。
  - >-
    下游影响实证：get_odds_snapshot(260891)=SKIP_MATCH（空），
    get_odds_snapshot(4459720)=OK（多家欧赔+亚盘）；resolve_match(巴西,日本,
    2026-06-30)→4459720 为正确规避路径。
  - >-
    两个 ID 字段的语义对照（关键证据）：lottery_zc_match.match_id ==
    lottery_match.lottery_match_id（合成彩票官方 ID）≠ football_match.id；
    lottery_match.match_id 才是真实 football_match.id。工具读错字段。
