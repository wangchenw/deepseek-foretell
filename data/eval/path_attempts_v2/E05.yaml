atomic_id: aq_3
rounds:
  - round: 1
    hypothesis: "lottery_zc_match 表无 status_id，需 JOIN football_match 拿状态。直觉用
      lottery_zc_match.match_id = football_match.id 关联——验证这个假设"
    sql_baseline:
      query: |
        SELECT l.id AS lottery_id, l.match_id, l.home, l.away, l.match_time_str,
               fm.id AS fm_id, fm.status_id, fm.match_time_str AS fm_time_str
        FROM lottery_zc_match l
        LEFT JOIN football_match fm ON l.match_id=fm.id
        WHERE l.type='sfc' AND l.issue=26089 ORDER BY l.match_id
      result: "14/14 JOIN 全部命中，但【全部 status_id=8（已完场）】且 fm_time_str 是
        2009-08-16 / 2019-02-26 等历史日期，与 lottery_zc_match.match_time_str=2026-06-30
        完全不一致！说明 lottery_zc_match.match_id（260891~2608914）是合成 ID（issue*10+
        entry_num），【不是 football_match.id 的真实外键】——JOIN 是假命中，football_match
        里恰好有 id=260891 等历史比赛记录"
    decision: continue
  - round: 2
    hypothesis: "合成 ID 假命中。改用 home/away 名称 + 时间窗（6/30-7/4）+ neutral=1（世界杯
      中立场）关联 football_match 找真实比赛 ID 和 status_id"
    sql_baseline:
      query: |
        SELECT m.id, m.status_id, m.match_time_str, m.neutral,
               ht.short_name_zh AS home_name, at.short_name_zh AS away_name
        FROM football_match m
        JOIN football_team ht ON m.home_team_id=ht.id
        JOIN football_team at ON m.away_team_id=at.id
        WHERE m.neutral=1
          AND m.match_time_str BETWEEN '2026-06-30 00:00:00' AND '2026-07-04 23:59:59'
          AND (ht.short_name_zh IN ('巴西','德国','荷兰','科特迪','法国','墨西哥','英格兰',
                '美国','西班牙','葡萄牙','瑞士','澳大利','阿根廷','哥伦比')
               OR at.short_name_zh IN ('日本','巴拉圭','摩洛哥','挪威','瑞典','厄瓜多',
                '刚果金','波黑','奥地利','克罗地','阿尔及','埃及','佛得角','加纳'))
        ORDER BY m.match_time LIMIT 30
      result: "找到 13 场真实比赛，全部 status_id=1（未开赛）+ neutral=1（中立场），
        真实 football_match.id=4459718~4459732 区间。缺墨西哥vs厄瓜多（名称匹配差异：
        lottery_zc_match.home='墨西哥' vs football_team.short_name_zh='墨西哥' 应匹配，
        但 lottery_zc_match.away='厄瓜多' vs football_team.short_name_zh='厄瓜多尔' 不匹配）"
    decision: continue
  - round: 3
    hypothesis: "补查墨西哥那场（用 home 名称 LIKE 匹配）+ 验证 resolve_lottery_match 工具
      是否也暴露合成 ID 问题"
    sql_baseline:
      query: |
        SELECT m.id, m.status_id, m.match_time_str,
               ht.short_name_zh AS home_name, at.short_name_zh AS away_name
        FROM football_match m
        JOIN football_team ht ON m.home_team_id=ht.id
        JOIN football_team at ON m.away_team_id=at.id
        WHERE m.match_time_str LIKE '2026-07-01%'
          AND (ht.short_name_zh LIKE '%墨西哥%' OR ht.name_zh LIKE '%墨西哥%') LIMIT 5
      result: "id=4459723, status_id=1, 2026-07-01 09:00, 墨西哥 vs 厄瓜多尔。
        → 14 场全部找到真实 football_match.id，【全部 status_id=1 未开赛可投注】"
    tool_call:
      name: resolve_lottery_match
      params: {play_type: "401", code: "第1场"}
      result:
        code: OK
        count: 10
        sample: "返回 10 期（issue 26080~26089）的『第1场』候选，需上层用 issue=26089 筛选本期。
          每个候选 match_id 字段都是合成 ID（260891/260881/260871...），无 status_id 字段"
    comparison: "双重 gap 确认：
      ① tool_logic_gap：get_lottery_schedule / resolve_lottery_match 返回的 match_id 字段是
        lottery_zc_match.match_id（合成 ID=issue*10+entry_num），不是 football_match.id 真实
        外键。Agent 拿这个 match_id 去调 get_odds_snapshot / get_match_result 等下游工具，
        会拿到完全无关的历史比赛数据（2009/2019 年的 status_id=8 已完场赛）。这是生产环境
        现在就在用的有问题的工具，优先级最高。
      ② tool_logic_gap：工具返回不含 status_id 字段，无法直接做两阶段初筛的第二阶段
        （区分未开赛/已完场）。需额外用 home/away 名称 + 时间窗 + neutral 关联 football_match。
      SQL 基准证明 14 场全部 status_id=1 未开赛可投注（真实 id=4459718~4459732 + 4459723/
        4459797 等，全部 neutral=1 中立场世界杯）"
    decision: blocked
final_status: blocked
gap_type: tool_logic_gap
gap_evidence: "SQL 基准对比：
  - 假关联：JOIN lottery_zc_match.match_id=football_match.id → 14/14 命中但 status_id=8
    且 fm_time_str=2009/2019 历史日期（合成 ID 假命中）
  - 真实关联：用 home/away 名称 + 6/30-7/4 时间窗 + neutral=1 → 14 场全部 status_id=1
    未开赛，真实 football_match.id=4459718~4459732 区间
  工具 get_lottery_schedule(401) / resolve_lottery_match(401,'第1场') 返回的 match_id
  字段是合成 ID（260891 等），不是真实外键。下游工具误用会导致拿到无关历史比赛数据。
  工具返回也不含 status_id，无法做两阶段初筛第二阶段。"
recommended_next_step: "P1 修复 _row_lottery_entry / get_lottery_schedule / resolve_lottery_match：
  ① match_id 字段应解析为真实 football_match.id（用 home/away 名称 + match_time 日期 JOIN
  football_match + football_team），或在 lottery_zc_match 表新增 real_match_id 字段；
  ② 返回字段补充 status_id（JOIN football_match 取 status_id），让上层可直接做两阶段初筛；
  ③ resolve_lottery_match 的 code='第N场' 返回多期候选时，应优先按 issue=MAX(issue) 或
  支持 issue 参数过滤本期。"

