atomic_id: aq_1
rounds:
  - round: 1
    hypothesis: "『本期』指 lottery_zc_match 表里 type='sfc' 的 MAX(issue)。先查表结构
      确认字段（lottery_zc_match 表是否真有 issue/match_id/type 字段），同时看
      mysql_client._row_lottery_entry 实现确认工具返回字段（关键：是否含 status_id）"
    schema_query: |
      SELECT column_name, column_type, column_comment
      FROM information_schema.columns
      WHERE table_schema='data_center' AND table_name='lottery_zc_match'
      ORDER BY ordinal_position
    schema_result: "lottery_zc_match 表字段：id/type(sfc|bqc|jqc|rj)/issue(期号)/match_id(int)/
      comp(赛事)/home/away/match_time(int)/match_time_str/result。表本身【无 status_id 字段】。
      mysql_client._row_lottery_entry (line 232-252) 对 401 返回字段：
      lottery_id/play_type/issue/issue_num/lottery_code/home_name/away_name/league_name/date/
      match_id/(result if exists)——【工具返回也不含 status_id】，且 match_id 直接取 row['match_id']"
    decision: continue
  - round: 2
    hypothesis: "SQL 基准查 MAX(issue) + 14 场记录，同时对照 get_lottery_schedule(401) 默认行为
      （mysql_client line 666：不传 date/period 时查 issue=MAX(issue)）"
    sql_baseline:
      query_max_issue: |
        SELECT type, MAX(issue) AS max_issue, COUNT(*) AS cnt
        FROM lottery_zc_match WHERE type='sfc' GROUP BY type LIMIT 5
      result_max_issue: "type=sfc, max_issue=26089, 总历史记录 2702 条。本期=issue 26089"
      query_14: |
        SELECT id, issue, match_id, comp, home, away, match_time_str, result
        FROM lottery_zc_match WHERE type='sfc' AND issue=26089 ORDER BY match_id
      result_14: "14 场全有：第1场巴西vs日本、第2场德国vs巴拉圭、第3场荷兰vs摩洛哥、
        第4场科特迪vs挪威、第5场法国vs瑞典、第6场墨西哥vs厄瓜多、第7场英格兰vs刚果金、
        第8场美国vs波黑、第9场西班牙vs奥地利、第10场葡萄牙vs克罗地、第11场瑞士vs阿尔及、
        第12场澳大利vs埃及、第13场阿根廷vs佛得角、第14场哥伦比vs加纳。全世界杯赛事。
        match_id 字段=260891~2608914（规律：issue*10 + entry_num，合成 ID）"
    tool_call:
      name: get_lottery_schedule
      params: {play_type: "401"}
      result:
        code: OK
        count: 14
        sample_entry_1: "lottery_id=8891, issue=26089, issue_num=1, lottery_code=第1场,
          home_name=巴西, away_name=日本, league_name=世界杯, date=2026-06-30,
          match_id=260891（合成 ID，无 status_id 字段）"
    comparison: "一致：工具默认查 issue=MAX(issue)=26089，返回 14 场，与 SQL 基准完全对齐。
      但工具返回字段【不含 status_id】，无法直接做两阶段初筛的第二阶段（区分未开赛/已完场），
      必须额外 JOIN football_match——见 aq_3 发现的合成 ID 假命中问题。"
    decision: satisfied
final_status: satisfied
