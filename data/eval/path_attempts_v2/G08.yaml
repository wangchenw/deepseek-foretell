      3. 伤病：tag=6 西决实证（雷霆杰伦威腿筋拉伤/米切尔比目鱼肌/索伯ACL）✓；『缺阵影响%』无量化字段
      4. 效率：team_stats offensive_rating(雷霆117/马刺118)/defensive_rating(106/110)/three_points_accuracy(36%/35%) ✓
