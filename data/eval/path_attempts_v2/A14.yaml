    query: "SELECT m.id, m.match_time_str, ht.name_zh, at.name_zh, m.coverage_lineup, m.status_id FROM football_match m JOIN football_team ht... WHERE home=10908 AND away=25413 AND match_time_str LIKE '2026-05-17%'"
