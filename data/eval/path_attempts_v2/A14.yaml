final_finding: |
  A14「球队阵容」存在完全可行的 SQL 路径,满足 atomic aq_3(单场阵容)+ aq_5(球队大名单)全部需求。
  单场阵容路径:
    football_match_lineup(父表,含 confirmed/home_formation/away_formation/coach_id)
    JOIN football_match_lineup_detail(子表,含 first/captain/name/shirt_number/position/rating)
    WHERE match_id=? AND confirmed=1,返回双方 11 首发 + 替补 + 阵型 + 队长 + 位置 + 球衣号 + rating。
  球队大名单路径:
    football_team_squad JOIN football_player JOIN football_team
    WHERE team_id=?,返回球员中文名 + 位置 + 球衣号 + is_captain,用于模块 B 伤停核心球员识别。
  验证样本:2026-05-17 川崎vs町田 match_id=4470722,
    川崎 4-2-3-1(队长胁坂泰斗 14号),町田 3-4-2-1(队长昌子源 3号),40 球员详情完整。
    川崎+町田大名单 68 人,JOIN football_player 取姓名成功。
  foretell get_match_lineup 是 stub(对 4470722 返回 DATA_MISSING,SQL 实有完整阵容),代码 mysql_client.py:866-867。
  foretell 无 get_team_squad 原生工具,须 SQL 直查 football_team_squad。
  赛前 vs 复盘:confirmed=1 是正式阵容(复盘用),confirmed=0 是预计阵容(赛前用),LLM 须按场景选取。
