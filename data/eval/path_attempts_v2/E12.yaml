type_id: E12
type_name: 在售方案
case_id: TC-E12-001
explored_at: '2026-06-29'
entity_entry: batch
scenario: E
verdict_lean: satisfied   # SQL 基准 + 工具均查到世界杯在售方案，推翻旧 data_gap 判决
rework_note: |
  旧判决（path_attempts/E12.yaml）判 ❌ data_gap，理由是 Nami 上游无世界杯已发布方案数据。
  但旧判决仅查 data_macao_recommend（心水推荐）表，把"在售方案"等同于"心水推荐"，
  未查 lottery_*_odds 表的 sell_status（销售状态）维度。本次按 Agent 2 SQL 优先方法
  穷举 recommend/方案/plan/scheme/prediction/lottery/cms_news 全部候选表，确认"在售方案"
  的正确语义映射是 lottery_bd_odds/jczq_odds 的 sell_status='1'（销售中），SQL 基准查到
  3 条世界杯在售方案，工具 get_lottery_schedule(404/301, 2026-06-30) 同步返回 3 条 on_sale
  世界杯方案，与 SQL 基准完全一致。改判 ✅ satisfied。

---
atomic_id: T1-a1
category: resolve_entity
target: {entity: match, keyword: 世界杯}
rounds:
  - round: 1
    hypothesis: "用户问『世界杯在售方案』，需先解析『世界杯』实体。世界杯既可能落在
      football_competition/football_match（competition_id=1，旧记录 424 场），也可能落在
      lottery_*_odds 表的 comp 字段（comp='世界杯'）。先 schema 确认相关表结构。"
    schema_query: |
      -- 候选"方案/推荐/发布"相关表全量扫描
      SELECT table_name FROM information_schema.tables
      WHERE table_schema='data_center'
        AND (table_name LIKE 'lottery%' OR table_name LIKE 'cms%'
             OR table_name LIKE 'data_macao%' OR table_name LIKE '%recommend%'
             OR table_name LIKE '%publish%' OR table_name LIKE '%plan%'
             OR table_name LIKE '%scheme%' OR table_name LIKE '%prediction%')
      ORDER BY table_name
    schema_result: |
      命中表：cms_news / data_macao_recommend / football_cms_news / lottery_bd_odds /
      lottery_bd_result / lottery_bdsf_odds / lottery_bdsf_result / lottery_jclq_odds /
      lottery_jclq_result / lottery_jczq_odds / lottery_jczq_result / lottery_match /
      lottery_sfc_star / lottery_zc_issue / lottery_zc_match。
      无独立 plan/scheme/prediction/proposal 表——"方案"非独立实体表，而是 lottery 在售场次
      或 data_macao_recommend 心水。data_macao_recommend 字段：id(心水id)/confidence_factor/
      predict_msg/source_match_id/create_time/update_time，【无 competition/league 字段、
      无 sell_status 字段】，只能经 source_match_id 关联 football_match 间接定位赛事。
      lottery_bd_odds / lottery_jczq_odds 有 comp(赛事名称) + sell_status(销售状态码) 字段。
    decision: continue
  - round: 2
    hypothesis: "用 SQL 验证『世界杯』实体在 lottery 表 comp 字段与 football_match 表的可解析性，
      作为 resolve_entity 基准。"
    sql_baseline:
      query: |
        SELECT 'lottery_bd_odds' AS tbl, comp, COUNT(*) AS cnt FROM lottery_bd_odds WHERE comp LIKE '%世界杯%' GROUP BY comp
        UNION ALL
        SELECT 'lottery_jczq_odds', comp, COUNT(*) FROM lottery_jczq_odds WHERE comp LIKE '%世界杯%' GROUP BY comp
        UNION ALL
        SELECT 'lottery_zc_match', comp, COUNT(*) FROM lottery_zc_match WHERE comp LIKE '%世界杯%' GROUP BY comp
      result: |
        lottery_bd_odds: 世界杯 76 条 + U20世界杯 14 条
        lottery_jczq_odds: 世界杯 88 条 + 世界杯预选赛 147 条
        lottery_zc_match: 世界杯 288 条
        → 『世界杯』实体在 lottery 三表均可解析，comp='世界杯' 精确匹配 2026 世界杯正赛。
    tool_call:
      name: get_lottery_schedule
      params: {play_type: "404", date: "2026-06-30"}
      result:
        code: OK
        count: 4
        world_cup_entries: 3
        sample: "entries 含 league_name='世界杯' 的 巴西vs日本/德国vs巴拉圭/荷兰vs摩洛哥，
          league_name 字段直接承载世界杯实体，无需额外 resolve_team"
    comparison: "SQL 基准（comp='世界杯' 大量存在）与工具返回（league_name='世界杯' entries）
      一致。世界杯实体可经 lottery comp/league_name 字段直接解析，亦可经 football_match
      competition_id=1 解析。resolve_entity 满足。"
    decision: satisfied
final_status: satisfied
gap_type: null
gap_evidence: |
  SQL 基准：lottery_bd_odds/jczq_odds/zc_match 三表 comp='世界杯' 均有大量记录（76/88/288）。
  工具 get_lottery_schedule(404, 2026-06-30) 返回 entries[].league_name='世界杯'，世界杯实体
  可直接解析。旧判决称"世界杯维度无已发布方案数据"仅在 data_macao_recommend 心水表成立，
  在 lottery 在售场次表不成立。
recommended_next_step: "无。世界杯实体解析已打通。"

