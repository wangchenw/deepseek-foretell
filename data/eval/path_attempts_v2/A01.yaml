    action: "调 get_odds_trend(match_id=4460972) 验证 stub"
    result: "DATA_MISSING,points=[](确认是 stub,与 db_schema_map.md 第四章一致)"
    reasoning: "工具层缺口。需 SQL 直查 football_odds_europe 替代"
