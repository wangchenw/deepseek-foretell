    result: "返回 20 家公司。例 company_id=5:初盘 3.50/3.20/2.15→即时 3.25/2.15/3.40→最新 26/1.01/34(走地中平局几乎确定)。实际赛果 3-3 平局,机构判断准确"
    reasoning: "get_odds_trend 的 SQL workaround 路径成立:用 first_odd vs odd vs real_odd 对比即可推导走势。完全可回答 turn 2'盘口各个纬度'与 turn 15'结合最新盘口冷门场次'"
    next: "A01 探索结束,落盘"
final_finding: |
  A01 路径完全成立。数据库快照(2026-06-28)含 issue 260627 共 12 场竞彩足球(6 芬超+6 世界杯),
  get_lottery_schedule(date='2026-06-28') 返回 9 场含完整 spf/rq/bf/jq/bqc 全玩法赔率。
  turn 1"最可能出平局":用 spf 平局赔率排序,最低=阿尔及利亚vs奥地利(1.94)、赫尔辛基火花vs瓦萨(2.93)、
    克罗地亚vs加纳(3.00)——可给出有数据支撑的推荐。
  turn 2"盘口+历史交战推荐比分":get_odds_snapshot 给欧赔+亚盘即时盘,football_odds_europe 给初盘→即时→最新走势,
    get_h2h 给历史交锋(本场仅 1 场,需诚实说明样本少)。
  turn 3"已结束比赛结果+赔率":get_match_result 给 3-3 比分+半场+红黄牌+角球,resolve_lottery_match 给全玩法赔率。
  turn 4"昨天所有竞彩足球":SQL 按 issue+match_time 过滤昨日即可,路径同 turn 3。
  turn 10-12"深度分析001/002/003":用户口语编号需先 get_lottery_schedule 取列表再映射到"周六067"格式,
    然后 resolve_lottery_match 拿 match_id,再调 get_odds_snapshot/get_h2h/football_odds_europe 深度分析。
  turn 13"001红卡怎么回事":get_match_result 返回 red_card 字段(本场 0-0),路径成立。
  turn 15/16"结合最新盘口冷门场次":football_odds_europe 的 real_odd(最新盘)+is_zoudi(走地)可识别盘口异动,
    配合 spf 找冷门。
  唯一隐患:用户口语"001"与工具"周六067"的编号语义错配,需 LLM 层先 get_lottery_schedule 再映射,
  若 LLM 直接传"周日001"会得 ENTITY_NOT_FOUND(假阴性风险)。
