verdict_reason: |
  E06 维持 ⚠️ implementation_gap(确认原判)。SQL 基准验证:
  (1) DB 真实存在任九 rj 期次(lottery_zc_issue.type='rj',issue 26080-26089,含开奖结果/奖池/销售额);
  (2) DB 真实存在任九 14 候选场次(lottery_zc_match.type='rj',issue=26089 14 场世界杯);
  (3) rj 与 sfc 每期共享同一批 14 场(同 match_id/home/away/match_time),故工具 401 返回的 14 场
      虽走 type='sfc' 过滤,但场次实体与 rj 完全一致(非合成 ID 假命中,场次本身正确);
  (4) 但 foretell 工具层无任九专属 play_type——401 硬编码 lottery_zc_match.type='sfc'
      (mysql_client.py:216),PlayType 枚举无 RJ,产品语义被误标为十四场胜负彩;
  (5) 任九专属的 lottery_zc_issue.type='rj' 期次元数据(开奖/奖池)与任选9场选号逻辑均未暴露;
  (6) 足彩玩法赔率 DB 无表(lottery_zc_match 无 odds 字段,无 lottery_zc_odds 表)→ 赔率维度叠加 data_gap;
  (7) T1-a2 综合所需逐场基本面工具为 stub(与 E05 同源)。
  判定:数据存在(期次+14场),工具缺失 rj 专属路由+选号综合 → 主导 implementation_gap,
  赔率维度 data_gap。route_complete=false。需新增 PlayType.RJ(如 405)映射 type='rj'、
  暴露任九期次元数据、实现逐场基本面工具,并解决足彩玩法赔率数据缺口后方可 route_complete。
