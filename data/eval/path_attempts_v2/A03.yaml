final_finding: |
  A03 路径成立。用户口语"3月21/22日"对应数据库 2026-03-21/22(年份错位,LLM 层需做年份对齐)。
  4 场中 3 场数据完整:
  - 富勒姆vs伯恩利 2026-03-21 23:00(4343327):赛果 3-1/0-0 与用户原话一致,赛前盘口完整(欧赔+亚盘让一球),
    赛前近 5 场可通过 SQL 直查获取(3-15 诺丁汉森林客胜 0-3、3-08 南安普顿主负 0-1、3-05 西汉姆主负 1-4、
    3-01 热刺主胜 3-1、2-22 桑德兰客胜 3-1)。
  - 埃弗顿vs切尔西 2026-03-22 01:30(4343325):match_id 到位,可同样路径分析。
  - 利兹联vs布伦特福德 2026-03-22 04:00(4343328):match_id 到位。
  - 纽卡斯尔vs桑德兰 2026-03-22:数据库无此场次(纽卡当日无比赛),真实 data_gap,需诚实说明。
  赛前数据维度均可用 SQL/工具获取:近期状态(SQL 直查赛前 N 场)、h2h(get_h2h)、盘口(get_odds_snapshot+football_odds_europe)、
  伤停(get_injury_report stub→SQL football_team_injury)、排名(football_points_table_team)、阵容(get_match_lineup stub→SQL football_match_lineup)。
  关键发现:get_recent_form 无时间截止参数,返回当前最近 N 场而非赛前最近 N 场,违反用户"不要搜赛后结果"要求,
  必须 SQL 直查 match_time < 比赛时间 的方式获取赛前近期战绩。
