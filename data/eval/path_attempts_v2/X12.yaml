atomic_id: aq_5
rounds:
  - round: 1
    hypothesis: "用 SQL 独立基准：查 2026-06-27 当天 competition_id=1（世界杯）含法国/挪威的场次，确认真实主客方向"
    schema_query: |
      SELECT column_name, column_type, column_comment FROM information_schema.columns
      WHERE table_schema='data_center' AND table_name='football_match'
    schema_result: "football_match 主键为 id（非 match_id）；match_time 为 int 时间戳；match_time_str 为北京时间字符串；含 home_team_id/away_team_id/competition_id/neutral/status_id"
    sql_baseline:
      query: |
        SELECT id, home_team_id, away_team_id, competition_id, match_time, match_time_str, status_id, neutral
        FROM football_match
        WHERE competition_id=1 AND match_time_str LIKE '2026-06-27%'
        LIMIT 50
      result: "6 条世界杯场次；其中 id=4460928 home_team_id=13820(挪威) away_team_id=10234(法国) match_time_str='2026-06-27 03:00:00' status_id=8(完场) neutral=1（中立场）；其余 5 场为新西兰vs比利时、乌拉圭vs西班牙、沙特vs佛得角、埃及vs伊朗、塞内加尔vs伊拉克"
    decision: continue
  - round: 2
    hypothesis: "现在按用户字面顺序调用 resolve_match(home=法国, away=挪威, date=2026-06-27)——预判会因主客方向不匹配而失败"
    tool_call:
      name: resolve_match
      params: {home: "法国", away: "挪威", date: "2026-06-27"}
      result: "ENTITY_NOT_FOUND（dimension=match_entity，data={home:法国, away:挪威, date:2026-06-27}）"
    comparison: "SQL 基准证明 DB 里 2026-06-27 世界杯存在该对阵（id=4460928），但工具按用户字面顺序 home=法国/away=挪威 查询返回 ENTITY_NOT_FOUND——工具漏了真实存在的数据。这是核心 tool_logic_gap：resolve_match 严格按 home/away 顺序匹配，不做反向 fallback，遇到用户主客颠倒的输入会直接漏判"
    decision: continue
  - round: 3
    hypothesis: "用 DB 真实方向（home=挪威, away=法国）重新调用 resolve_match 验证工具是否能正确返回"
    tool_call:
      name: resolve_match
      params: {home: "挪威", away: "法国", date: "2026-06-27"}
      result: "OK，count=1，candidate match_id=4460928 home_team_id=13820 away_team_id=10234 home_name=挪威 away_name=法国 league_id=1 league_name=世界杯 match_time_beijing='2026-06-27 03:00:00' status=finished neutral=true round_group=9 round_num=3"
    comparison: "工具结果与 SQL 基准完全一致（同一场 id=4460928，主客方向=挪威主场）。证明工具本身能查到，只是要求调用方传入正确的主客方向；LLM 必须自我纠正方向"
    decision: continue
  - round: 4
    hypothesis: "再验证一条不依赖主客方向的备用路径 get_team_schedule，看能否在 LLM 不确定方向时也能定位该场"
    tool_call:
      name: get_team_schedule
      params: {team_id: 13820, direction: "all", limit: 20}
      result: "OK，count=20，含 match_id=4460928 home_name=挪威 away_name=法国 date=2026-06-27 status=finished league_name=世界杯 match_time_beijing='2026-06-27 03:00:00'（既出现在挪威的 schedule 里，也出现在法国的 schedule 里——另查法国 schedule 同样含此条）"
    comparison: "get_team_schedule 不受用户主客颠倒影响，能稳定返回该场且自带真实 home_name/away_name。是一条比 resolve_match 更稳健的兜底路径。SQL 基准与工具一致"
    decision: satisfied
final_status: satisfied
gap_type: tool_logic_gap
gap_evidence: |
  SQL 基准（round 1）：2026-06-27 世界杯含 id=4460928 挪威(主) vs 法国(客)，DB 真实存在。
  工具对照（round 2）：resolve_match(home=法国, away=挪威, date=2026-06-27) → ENTITY_NOT_FOUND，
    漏掉了 DB 真实存在的场次，原因是工具严格按 home/away 顺序匹配，不做反向 fallback。
  工具对照（round 3）：resolve_match(home=挪威, away=法国, date=2026-06-27) → OK 返回 id=4460928，
    证明数据存在且工具能查到，只是要求调用方传入正确方向。
  兜底路径（round 4）：get_team_schedule(13820, direction=all) 也能稳定返回该场，
    且自带真实 home_name/away_name，不受主客颠倒影响。
  结论：tool_logic_gap——resolve_match 在用户主客颠倒场景下会漏判 DB 真实存在的场次；
  缓解路径是 LLM 在 resolve_match 失败后立即用 get_team_schedule 兜底，或工具内部增加 swap(home,away) fallback。
recommended_next_step: |
  P1：resolve_match 内部增加反向 fallback——当 (home,away,date) 0 命中时，自动尝试 swap(home,away)
  再查一次，若命中则在 envelope meta 里加 orientation_swapped=true 提示 LLM；
  或在 ENTITY_NOT_FOUND 的 data 里附 hint：'试过反向匹配吗？DB 可能方向相反'。
  P2：路由层提示词增强——当用户使用 'A vs B + 日期' 入口且 resolve_match 失败时，
  LLM 应自动切换到 get_team_schedule 兜底，而非直接断言无赛。

