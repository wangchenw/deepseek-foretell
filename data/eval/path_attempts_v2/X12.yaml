atomic_id: aq_1
rounds:
  - round: 1
    hypothesis: "用户说'法国'，需 resolve_team 拿到国家队 team_id（不是女足/青年队）"
    schema_query: |
      SELECT column_name, column_type, column_comment FROM information_schema.columns
      WHERE table_schema='data_center' AND table_name='football_team'
    schema_result: "football_team 主键为 id；含 name_zh/name_en/short_name_zh/national 等字段"
    sql_baseline:
      query: |
        SELECT id, name_zh, name_en, short_name_zh, national FROM football_team
        WHERE name_zh='法国' OR short_name_zh='法国' LIMIT 20
      result: "id=10234 name_zh=法国 national=1（国家队）；另有女足/U16~U23 多个候选"
    tool_call:
      name: resolve_team
      params: {name: "法国"}
      result: "OK，count=10，候选含 10234(法国)、10311(U21)、10471(U20)、11807(女足) 等；首个候选 team_id=10234 即为国家队"
    comparison: "SQL 基准与工具一致：法国国家队 team_id=10234。LLM 需在 10 个候选里挑 national=1 且无后缀的'法国'"
    decision: satisfied
final_status: satisfied
gap_type: null
gap_evidence: "SQL 与 resolve_team 一致，法国国家队 team_id=10234"
recommended_next_step: "无需动作"

