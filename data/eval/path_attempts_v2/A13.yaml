final_finding: |
  A13「历史交锋」存在完全可行的 SQL 路径,5 对球队 h2h 数据全部命中且与 atomic 期望完全一致。
  核心 SQL:football_match 双向查 (home_team_id=A AND away_team_id=B) OR (home_team_id=B AND away_team_id=A),
  AND match_time < 1778976000(2026-05-17),JOIN football_team(主客各一)+ football_competition 取名称。
  scores 数组取索引 0 作为常规比分([比分,半场,红牌,黄牌,角球,加时,点球])。
  五对命中明细:
    福伦丹vs特尔斯达:10+ 场(荷乙,2025-03-12 最近)
    科莫vs帕尔马:8 场(意甲+意乙,2025-10-25 最近)
    全北vs金泉:8 场(韩K联,2026-03-08 最近)
    川崎vs町田:5 场 J1 + 3 场友谊赛(2026-03-28 最近)
    富川FCvs浦项铁人:2 场(2026-03-22 韩K联 + 2016-05-11 韩国杯)
  foretell get_h2h 工具有三个隐患:
    (1) 不区分赛前/赛后——返回 5/17 当日场(match_id 4480379),违反「赛前视角不反推」硬约束,LLM 须手工剔除;
    (2) 暴露 match_id/home_team_id/away_team_id 内部 ID,不返回球队名/赛事名,需 LLM 层 JOIN 剥离;
    (3) resolve_team('浦项制铁') 仅返回后备队/U18/U15,一线队 10417 缺失,须降级「浦项铁人」或 SQL 兜底。
  SQL 直查完全规避上述隐患,是首选路径。
