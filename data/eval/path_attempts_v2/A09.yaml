    result: "10 条在玩场:4548368 阿格尔皇室杜马 0-2 PWD巴门达(喀甲 22:30 上半场)、4548369 FC瞪羚 0-2 考顿体育、4548372 艾格勒 0-0 彭特靴尔、4564860 普鲁士明斯特B队 0-1 威斯法利亚、4564458 比什凯克 0-0 纳夫兹、4549767 拉脱维亚U17 1-0 立陶宛U17(22:00 中场)、4477539 EB斯特雷穆尔 2-1 B36托尔斯港、4483089 拉格斯维德 1-1 BK前进、4486548 卡里鲁 0-0 派德、4506740 拉夫沙安 0-0 雷加塔。home_scores/away_scores 第 1 位=当前比分,第 5 位=角球"
    reasoning: "DB 快照内确有 20+ 条在玩场且含当前比分——基准答案可由 SQL 直接给出。这证明工具返回空≠无解,SQL 路径清晰可答 turn1-2『接下来哪几场适合买大球』『现在进行中的比赛』"
    next: "对照 foretell 工具是否能在玩列表"
