final_finding: |
  A09 是滚球盘(live 走地)多轮投注跟踪场景。SQL 直查 football_match WHERE status_id∈{2,3,4,5,7} 证明 DB 快照内确有 20+ 条在玩场且含当前比分(本轮验证 10 条:阿格尔皇室杜马 0-2、FC瞪羚 0-2、艾格勒 0-0、普鲁士明斯特B队 0-1、EB斯特雷穆尔 2-1 等,均为 22:00/22:30 上半场/中场),路径清晰可答 turn1-2『接下来哪几场适合买大球』『现在进行中的比赛』——按大球水位+当前比分归纳 3-5 场。
  turn3/turn5/turn8 邓多克盘口与时间跟踪:get_odds_snapshot(4469061 邓多克 6/27 完场)返回完整欧赔/亚盘/大小球盘口,在玩+完场均可用,turn8 可满足。
  turn3/turn6/turn7 邓多克与尤文图斯实时比分:SQL 基准确认邓多克(10484)在快照内无在玩场,最近一场 6/27 02:45 已完场 2-3;尤文图斯(10467)最近完场 5/25,6/28 前无在玩/已完场。用户『都进球了』对尤文图斯无法用库数据验证,须按 expected_behaviors『数据不足时诚实说明』兜底:明说『邓多克 6/27 完场 2-3 双方有进球;尤文图斯当前无在玩数据,无法确认其进球』,不得编造实时比分。
  turn4 开球时间冲突:库内 02:45 北京 vs 用户口述 16 点,以库为准向用户澄清。
  foretell 工具链两个 implementation_gap 阻塞生产直答:(1) get_schedule_by_date(6/28) 默认 cap 100 漏全部在玩场,无 status_filter 参数;(2) get_match_result 对在玩场返回 NOT_APPLICABLE,get_team_schedule 不返回比分字段——无原生实时比分工具。叠加 P0 bug 复现:get_team_schedule(direction=upcoming, 10484) 返回 2005 历史升序。
  可行 workaround:SQL 直查 status_id∈{2,3,4,5,7} 建立在玩基准 + 逐场 get_odds_snapshot 补盘口 + LLM 按大球水位归纳;无在玩数据时诚实说明。生产 Foretell 若不 SQL 兜底会漏在玩/编造比分。
