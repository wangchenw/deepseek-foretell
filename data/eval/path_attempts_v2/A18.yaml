final_finding: |
  A18(语义精度_锁定排名)底库路径完全可行:
  (1) 锁定排名验证:football_points_table_team WHERE season_id=MAX(season_id) 返回当前赛季
      完整积分榜,埃因霍温 84 分第 1 领先第二名费耶诺德 19 分,34 轮全完赛,已锁定冠军;
  (2) 008 时点锁定状态:008=round_num=31,赛季总 34 轮,剩余 3 轮,埃因霍温领先 19 分,
      第二名最多再得 9 分,19>9 → 008 时点已提前锁定冠军(语义判断有底库支撑);
  (3) 008 实际结果:埃因霍温 6-1 兹沃勒(净胜 5 球),用户「还能净胜三个球吗」答案为「能」,
      赛前预测可基于埃因霍温主场进攻力(101进球/34场)+ 兹沃勒防守差(71失球/34场)+
      战意风险综合判断;
  (4) 批量 001-009:resolve_lottery_match 9 场全部 OK,resolve_match 可补 match_id;
  (5) 基本面维度:get_recent_form/get_h2h/get_odds_snapshot 可用 + SQL 直查
      football_competition_teams_stats 可补赛季统计;
  (6) 战意/伤停/指数变化:工具 stub,但 SQL 直查 football_intelligence/football_team_injury/
      football_odds_europe 时序数据可得;
  (7) 语义精度规则:锁定冠军≠一定留力,须结合对阵重要性/欧战资格/杯赛剩余/主教练轮换习惯,
      底库数据可支撑多维度判断,不得机械断言。

  结论:数据库有数据能回答用户全部 turn1/turn3/turn4 问题,SQL 直查路径完整可行,
  工具层 stub(get_standings 缺 season_id 过滤 / get_intel_tags / get_injury_report /
  get_odds_trend / get_kelly / get_betfair / get_team_season_stats)不阻塞数据获取。

