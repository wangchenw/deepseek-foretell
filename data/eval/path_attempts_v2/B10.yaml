blocking_gap:
  type: tool_logic_gap
  description: |
    get_standings 按单表联赛积分榜模型设计，对世界杯 48 队 12 小组 + 最佳第三名横向榜的多表杯赛结构
    降级失败，具体表现（均有 SQL 基准对照证据）：
    (1) 把 12 张分组榜 + 1 张「第3名队伍排名」榜压成一张扁平 30 行表，行内无 group/conference/stage_id
        字段 → 12 个 position=1 并列呈现、不同组 position 不可比，无法回答「两队排名接近吗」；
    (2) 行内无 promotion_id 出线标记 → 无法直接判定「打平能否出线」；
    (3) 刚果(金) 重复两行（pos1=第3名榜、pos3=group 11，同分同净胜球）语义混淆，消费者无法区分组内
        排名与最佳第三名榜；加纳因组内与第3名榜值恰好相同被去重为一行，行为不一致；
    (4) LIMIT 30 截断 position=4：乌兹别克斯坦(group 11 第4)、巴拿马(group 12 第4) 被完全丢弃，
        而 SQL 基准证明 DB 有这两队完整积分榜行（0分、promotion_id=0 淘汰）—— 工具漏报已淘汰队。
    SQL 基准（football_points_table_team JOIN football_points_table，competition_id=1 season_id=13776）
    完整拥有 8 队组内排名/积分/净胜球、第3名队伍排名、promotion_id 出线标记，6 出线 2 淘汰；
    阶段为小组赛（可排名），本赛季无淘汰赛积分榜数据（淘汰赛为对阵签表，排名不适用是正确语义）。
    故原判 ⚠️ implementation_gap「对淘汰赛不降级」措辞修正为 tool_logic_gap：真实缺陷是小组赛多组+
    最佳第三名横向榜的结构化降级失败，而非淘汰赛误读。等级维持 ⚠️（数据齐备、工具逻辑错、
    生产环境照此回答用户会拿到「12 队并列第一/无法判断打平出线/漏报已淘汰队」的错误后果）。
  failed_atomic: B10-T1-a1
  suggested_fix: |
    get_standings 对 type=2(杯赛) 赛事结构化改造：返回行增加 group/conference/stage_id/promotion_id；
    按「分组榜列表 + 横向榜(第3名队伍排名)」结构化输出；取消/扩大 LIMIT 30 不截断 position=4；
    去重策略改为按「table_id+team_id」保留各榜行并标注榜类型。属 Phase 2 工具层重构，本次不修改 foretell/tools/。
