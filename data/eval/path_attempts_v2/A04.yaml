final_finding: |
  A04(球队近期赛程/近5轮+XG+多联赛)的数据路径基本可行,唯 XG 维度数据库层真无解。

  一、近5轮赛程(核心需求)——✅ 完整路径
  推荐 SQL:
    SELECT m.id, c.short_name_zh AS league, m.match_time_str,
           ht.name_zh AS home, at.name_zh AS away,
           m.home_scores, m.away_scores, m.status_id
    FROM football_match m
    JOIN football_team ht ON ht.id=m.home_team_id
    JOIN football_team at ON at.id=m.away_team_id
    JOIN football_competition c ON c.id=m.competition_id
    WHERE (m.home_team_id=:tid OR m.away_team_id=:tid)
      AND m.status_id=8
    ORDER BY m.match_time DESC LIMIT 5
  返回联赛/日期/主客队名/比分数组/主客场标识(home_team_id=:tid 即主场)。
  foretell get_recent_form 也可用但只返回 date/outcome/goals_for/goals_against/venue,无对手名/联赛/比分明细,数据稀疏,推荐用 SQL JOIN。

  二、近5轮攻防数据——✅ 完整路径
  JOIN football_match_team_stats(match_id+team_id):
    goals, goals_against, shots, shots_on_target, ball_possession,
    corner_kicks, tackles, interceptions, clearances, blocked_shots,
    passes, passes_accuracy, key_passes, crosses, duels_won, fouls
  "防守漏洞指数"无原生字段,可由 goals_against + shots_on_target_conceded + interceptions + clearances 综合合成(需 JOIN 对手侧 team_stats 取 shots_on_target 作为被射正)。

  三、多联赛覆盖——✅ 全部可解析有数据
  实测:英超(利物浦10249/切尔西10180)、西甲(埃尔切10301/阿拉维斯10646)、意甲(卡利亚里10456/乌迪内斯10297/佛罗伦萨10059/亚特兰大11060)、韩K联(全北10238/金泉尚武10652/富川20060/浦项10417)、芬超(VPS瓦萨10972/赫尔辛基10387)、瑞超(尤尔加登10464/布洛马波卡纳11575)、德丙(艾禾斯堡10853/菲尔特10144)、法国杯(朗斯10918/尼斯10529)、日职联(町田泽维亚25413/浦和红钻10298)。冷门联赛无 data_gap。

  四、伤病——✅ SQL workaround(stub 工具)
  football_team_injury 表有数据(type/reason/missed_matches/del_flag),foretell get_injury_report 是 stub,SQL 直查绕过。需 JOIN football_player 拿球员名。

  五、赔率变化——✅ SQL workaround(stub 工具)
  football_odds_europe 含 first_odd(初盘)/odd(即时)/real_odd(最新),可观察变化;get_odds_trend 是 stub。凯利无独立表,可由欧赔反推。

  六、XG(预期进球)——❌ 数据库层真无解
  information_schema 全库扫描 column_name LIKE '%xg%'/'%expected%'/'%xgoals%' 返回空。
  football_match_team_stats / football_match_player_stats / football_competition_teams_stats / football_competition_players_stats 均无 xG/xGA/expected_goals 字段。
  此非工具 bug 而是 DB schema 不存储,无法用 SQL workaround 补救。
  按 atomic hard_constraint,XG 必须诚实说明"数据库未存储 xG,无法提供",不得用实际进球/射门数编造替代为"xG"。

  综上:7 维度中 6 维有数据路径(近5轮赛程/近5轮攻防/主客差异/伤病/赔率/多联赛),XG 维度只能诚实说明缺口。整体路径可行但存在一个必须诚实标注的硬缺口,属 ⚠️。
