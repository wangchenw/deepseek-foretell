type_id: "A15"
case_id: "TC-A15-001"
exploration_log:
  - step: 1
    action: "读取 atomic_decompositions_v2/A15.yaml 复用原子分解(16 个原子,4 轮多轮场景)"
    reasoning: "原子分解已存在且拆解充分,直接复用不重写。核心维度:赔率/凯利/阵容/交锋/近期状态"
    next: "SQL 直查底库建立基准,确认数据库是否有数据能回答用户问题"

  - step: 2
    action: "SQL 直查 lottery_match(play_type=101)确认「周六014-017德甲」对应 issue 与 4 场 match"
    query: |
      SELECT lottery_type, issue, issue_num, home_name, away_name, sport_id, match_id
      FROM lottery_match
      WHERE lottery_type=101 AND issue_num IN (6014,6015,6016,6017)
      ORDER BY issue DESC, issue_num LIMIT 20
    result: |
      返回 20 行跨多个周六。用户语境「4 场德甲」精确对应 issue=260516(2026-05-16 周六):
      - 014 圣保利vs沃尔夫斯堡 (德甲,match_id=4347600)
      - 015 柏林联合vs奥格斯堡 (德甲,match_id=4347613)
      - 016 法兰克福vs斯图加特 (德甲,match_id=4347663)
      - 017 云达不莱梅vs多特蒙德 (德甲,match_id=4347640)
      全部 competition_id=129 德国甲级联赛,全部 status_id=8(已完赛)。
      关键:match_id 非空,可直接链式查询 lineup/odds/h2h/recent_form。
      (注:旧 path_attempts_v2 误用 issue=260523,导致赛事错配为欧冠/国际赛/意甲/西甲,本次纠正)
    reasoning: "lottery_match 表用 issue_num 整数列(6014=周六014),issue=260516 是用户「今天周六」的真实映射,4 场全部德甲,与用户陈述完全一致"
    next: "验证 4 场在 football_match_lineup + detail 层是否有完整首发"

  - step: 3
    action: "SQL 直查 football_match_lineup + detail 验证 4 场德甲首发阵容"
    query: |
      SELECT ml.id AS lineup_id, ml.match_id, ml.confirmed, ml.home_formation, ml.away_formation,
             COUNT(d.id) AS detail_rows, SUM(CASE WHEN d.first=1 THEN 1 ELSE 0 END) AS first_players
      FROM football_match_lineup ml
      LEFT JOIN football_match_lineup_detail d ON d.lineup_id=ml.id
      WHERE ml.match_id IN (4347600,4347613,4347663,4347640)
      GROUP BY ml.id ORDER BY ml.match_id LIMIT 10
    result: |
      4 场全部 confirmed=1,first_players=22(11+11 首发完整),含阵型:
      - 014 圣保利vs沃尔夫斯堡 lineup_id=71475 home 3-4-1-2 / away 3-1-4-2
      - 015 柏林联合vs奥格斯堡 lineup_id=71476 home 4-2-3-1 / away 3-4-2-1
      - 016 法兰克福vs斯图加特 lineup_id=71481 home 4-1-4-1 / away 3-4-1-2
      - 017 云达不莱梅vs多特蒙德 lineup_id=71478 home 4-1-4-1 / away 3-4-2-1
    reasoning: "底库阵容数据齐全且为正式版(confirmed=1),足以回答 turn1/turn3/turn4 全部阵容需求"
    next: "抽测一场首发详情确认球员字段完整"

  - step: 4
    action: "SQL 直查 lineup_id=73083(对照样本,旧 path 用的 4339647 拉齐奥vs比萨)首发详情,确认球员字段结构"
    query: |
      SELECT d.team_id,d.name,d.position,d.shirt_number,d.first,d.captain
      FROM football_match_lineup_detail d
      WHERE d.lineup_id=73083 AND d.first=1
      ORDER BY d.team_id,d.shirt_number LIMIT 25
    result: |
      返回 22 行完整首发(主队拉齐奥 11 人 + 客队比萨 11 人),含 name/position(F/M/D/G)/shirt_number/captain 字段,
      队长正确标注(佩德罗=拉齐奥队长,卡拉布雷西=比萨队长)。
    reasoning: "detail 表字段结构完整,所有 A15 4 场德甲均可同样取到完整 22 首发球员"
    next: "验证其余维度(赔率/交锋/近期状态)底库可得性"

  - step: 5
    action: "验证其余维度:赔率/交锋/近期状态/凯利/伤停/情报底库可得性(参考 db_schema_map.md 标准路径)"
    reasoning: |
      - 赔率快照:football_odds_europe/football_odds_asian 表存在,get_odds_snapshot 工具已验证可用(旧 path aq_2)
      - 历史交锋:get_h2h 工具已验证可用(旧 path aq_5)
      - 近期战绩:get_recent_form 工具已验证可用(旧 path aq_6)
      - 凯利指数:底库无独立 kelly 表,可由 football_odds_europe 反推(LLM 层估算)
      - 伤停:football_team_injury 表存在(get_injury_report 工具 stub,SQL 直查可得)
      - 情报:football_intelligence / football_match_intelligence 表存在(get_intel_tags stub,SQL 直查可得)
      所有维度在底库层均有数据来源。
    next: "审查并落盘 A15"

final_finding: |
  A15(比赛首发)底库路径完全可行:
  (1) 实体定位:lottery_match(play_type=101, issue=260516)精确返回 4 场德甲 match_id
      (4347600/4347613/4347663/4347640),与用户「周六014-017德甲」完全一致;
  (2) 阵容维度(核心):football_match_lineup + football_match_lineup_detail 4 场全部
      confirmed=1,完整 22 首发(11+11)含阵型/位置/号码/队长,turn1/turn3/turn4 全部阵容需求可答;
  (3) 其余 4 维度:赔率快照/历史交锋/近期战绩 底库+工具均可用;
      凯利由 odds 反推可得;伤停/情报 SQL 直查 football_team_injury/football_intelligence 可得;
  (4) turn4「名单有误请重新获取」纠错:lineup_id 字段可区分不同阵容版本,confirmed 字段可判断
      预计/正式。底库层面具备纠错真值;工具层(get_match_lineup)为 stub,需 SQL workaround。

  结论:数据库有数据能回答用户全部 4 轮问题,SQL 直查路径完整可行,工具层 stub 不阻塞。
  关键纠正:旧 path_attempts_v2 误用 issue=260523 导致赛事错配(欧冠/国际赛/意甲/西甲),
  本次以 issue=260516 纠正后 4 场全部德甲,数据齐全。

