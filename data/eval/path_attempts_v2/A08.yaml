        hypothesis: "resolve_team 应能返回葡萄牙男足国家队候选；先用 SQL 建立基准确认 team_id，再调工具对照"
        sql_baseline:
          query: |
            SELECT id,name_zh,short_name_zh,national FROM football_team
            WHERE name_zh LIKE '%葡萄牙%' LIMIT 20
          result: "返回 20 条候选，其中 id=13152 name_zh='葡萄牙' national=1 为男足国家队正选；其他候选含葡萄牙体育(10206,national=0)、葡萄牙U16/U21/B队/女足等(national=1 但梯队)、AA葡萄牙人(10468,巴西俱乐部)。基准答案：team_id=13152"
        tool_call:
          name: resolve_team
          params: {name: 葡萄牙}
          result: "code=OK，返回 10 个候选，末位是 {team_id:13152, name:葡萄牙, name_en:Portugal, national:1}；其他候选含葡萄牙体育、AA葡萄牙人、各梯队"
        comparison: "工具候选与 SQL 基准一致，正选 team_id=13152 在列表中。工具返回数量(10)<SQL(20)但含目标。需 LLM 按 national=1 + name 精确匹配消歧选择 13152，不可默认排第一的葡萄牙体育(national=0)"
