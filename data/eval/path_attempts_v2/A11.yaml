final_finding: |
  A11 是合成单轮射手榜示例(规范化为『2026 世界杯射手榜前 10 是谁』)。SQL 直查 football_competition_players_stats JOIN football_player JOIN football_team WHERE season_id=13776 AND goals>0 ORDER BY goals DESC, assists DESC, penalty ASC LIMIT 10 返回完整前 10:1.梅西(阿根廷)6球3场;2.姆巴佩(法国)4球2助;3.登贝莱(法国)4球1助;4.维尼修斯(巴西)4球1助;5.哈兰德(挪威)4球;6.翁达夫(德国)3球2助;7.曼赞比(瑞士)3球1助;8.萨尔(塞内加尔)3球1助;9.库尼亚(巴西)3球;10.布罗比(荷兰)3球。
  本轮 SQL 真实复跑,结果与 atomic 已记录的 DB 基准完全一致。字段齐全(球员/所属队/进球/点球/助攻/出场),排序口径清晰(进球降序→助攻降序→点球升序),剥离 player_id/team_id/season_id 即可合规输出。
  路径清晰且数据正确:SQL 直查是稳健可重复的查询,无脆弱性。foretell 工具链无原生射手榜工具(get_top_scorers 缺失,get_team_season_stats stub,get_standings 是球队榜),属 implementation_gap,但数据在 football_competition_players_stats 表中完整可取,SQL 兜底路径清晰。
  结论:✅ 找到可行路径,数据正确,路径清晰。SQL 直查即可完整回答用户『2026 世界杯射手榜前 10 是谁』。
