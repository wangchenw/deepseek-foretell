type_id: "G07"
type_name: 优化方案
case_id: "TC-G07-001"
scenario: G
explored_at: '2026-06-29'
priority: P1
methodology: SQL优先，工具调用降级为对照验证（phase1_v2 Agent 2）
atomic_source: data/eval/atomic_decompositions/G07.yaml（原 3 轮分解）
context: |
  G07 场景为"优化方案"多轮追问（3 轮）：
    turn0：用户带自创 5 条筛选标准，要求从"今天还没开赛的北单"按标准筛比赛、推荐几场比分（同 D05）。
    turn1：追问"有没有能优化筛选标准的？怎么样选择合适的比赛？"——基于 5 标准框架的优化方案说明。
    turn2："我没有概率估算 还有我在其他窗口 你帮我推荐的今天002和010的比分就是正确的 他们条件是什么？"——
           跨窗口/跨 session 引用其他窗口的 002/010 比分推荐，要求反推条件。
  原判 ⚠️ implementation_gap（北单 bf 序列化损坏）+ context_gap（多轮/跨窗口）。本次返工严格按
  information_schema → SQL 基准 → 工具对照 → 判定 的流程重做，分层验证数据层与工具层。
  关键方法纠正（不做应声虫）：任务单要求"调 get_lottery_schedule(play_type=404) 对照 bf 序列化"，
  但 lottery_type 404 = 北单让球胜平负（BEIDAN_HANDICAP → lottery_bdsf_odds，仅 sf 列，无 bf 列），
  404 根本不返回 bf；bf 玩法赔率只在 lottery_type 301 = 北单胜负过关（BEIDAN_WIN_LOSS → lottery_bd_odds，
  含 spf/jq/bqc/sxp/bf）。故验证 bf 序列化必须用 play_type=301，本探索按 301 执行并在证据中说明。

# =========================================================================
# 全局 schema 基础
# =========================================================================
global_schema:
  schema_query: |
    SELECT table_name, column_name, column_type, column_comment
    FROM information_schema.columns
    WHERE table_schema = DATABASE()
    AND table_name IN ('lottery_bd_odds','lottery_bdsf_odds','lottery_match')
    ORDER BY table_name, ordinal_position
  schema_result_summary: |
    lottery_bd_odds（北单胜负过关 301 的赔率表，每行一场含全部玩法）：
      id/issue/issue_num/comp/home/away/match_time(int)/match_time_str/
      sell_status varchar(20) "销售状态码 顺序：胜平负,总进球,半全场,上下单双盘,比分；0-未开售/1-销售中/2-未知/3-已停售/4-已开奖"/
      spf varchar(200) "胜平负"/jq varchar(200) "进球"/bqc varchar(200) "半全场"/sxp varchar(200) "上下单双"/bf varchar(1000) "比分"。
      spf/jq/bqc/sxp/bf 在 DB 中均为 JSON 字符串（非逗号分隔串），spf 含 goal(让球数)+sf3/sf1/sf0(让球后胜平负赔率)，
      bf 含 sXY 键（s10=1-0、s11=1-1、s21=2-1、s00=0-0、sl/sp/sw=胜其他/平其他/负其他）。
    lottery_bdsf_odds（北单让球胜平负 404）：仅有 sf varchar(100) "胜负赔率"，无 bf/jq/bqc/sxp 列——
      证实 404 玩法不携带比分赔率，不能用 404 验证 bf。
    lottery_match：lottery_type 注释明确"301-北单胜负过关 / 404-北单让球胜平负"。

# =========================================================================
# turn0：按 5 标准找今天还没开赛的北单 + 推荐几场比分
# =========================================================================
turns:

# ---------- turn0 / G07-T0-a2 + a4 + a6：北单未开赛场次 + bf 赔率 ----------
- turn: 0
  atomic_id: G07-T0-a2
  category: fetch_schedule
  target: 今日北单未开赛场次（含 bf 赔率，供 5 标准筛选与比分推荐）
  rounds:
  - round: 1
    hypothesis: 先用 information_schema 确认 lottery_bd_odds 字段语义（sell_status 五段顺序、bf 是否 JSON），
      不凭表名/字段名臆测。
    schema_query: |
      SELECT column_name, column_type, column_comment FROM information_schema.columns
      WHERE table_schema = DATABASE() AND table_name = 'lottery_bd_odds'
      ORDER BY ordinal_position
    schema_result: |
      sell_status varchar(20) "顺序：胜平负,总进球,半全场,上下单双盘,比分；0未开售/1销售中/2未知/3已停售/4已开奖"——
        第 5 段(index 4)=比分玩法销售状态。
      bf varchar(1000) "比分"；spf/jq/bqc/sxp varchar(200)。
      match_time int(时间戳)、match_time_str varchar(20)。
    decision: continue
  - round: 2
    hypothesis: 独立写 SQL 基准，验证"今天(2026-06-29 起)未开赛+比分在售"的北单场次是否存在、bf 字段是否完整合法。
      未开赛 = match_time > UNIX_TIMESTAMP()；比分在售 = sell_status 第 5 段 = '1'。
    sql_baseline:
      query: |
        SELECT id, issue, issue_num, comp, home, away, match_time_str, sell_status,
               LENGTH(bf) AS bf_len, bf
        FROM lottery_bd_odds
        WHERE match_time > UNIX_TIMESTAMP()
        ORDER BY match_time ASC LIMIT 20
      result: |
        命中 4 场今日未开赛北单（issue=26069，全部 sell_status='1,1,1,1,1'，比分玩法在售）：
        - id 26069064, issue_num 64, 世界杯, 巴西 vs 日本, 2026-06-30 00:55, bf_len=352,
          bf='{"s31":"9.50","s30":"24.68","s11":"10.90","s33":"55.48","s10":"15.12","s32":"16.02",
               "s13":"91.65","s12":"22.47","s14":"376.48","sl":"206.37","sp":"290.52","sw":"36.01",
               "s40":"61.91","s20":"10.25","s42":"35.09","s41":"31.98","s00":"24.91","s22":"12.87",
               "s21":"6.26","s02":"85.10","s24":"217.96","s01":"38.55","s23":"42.57","s04":"760.80",
               "s03":"243.96"}'
        - id 26069065, issue_num 65, 冰岛超, IA阿克拉内斯 vs 弗拉姆, 2026-06-30 03:10, bf_len=349（完整 JSON）
        - id 26069066, issue_num 66, 世界杯, 德国 vs 巴拉圭, 2026-06-30 04:25, bf_len=357（完整 JSON）
        - id 26069067, issue_num 67, 世界杯, 荷兰 vs 摩洛哥, 2026-06-30 06:00, bf_len=352（完整 JSON）
        SQL 基准结论：DB 有今日未开赛北单 4 场，bf 字段为完整合法 JSON（25 个比分键 s00-s42 + sl/sp/sw）。
    decision: continue
  - round: 3
    hypothesis: 用 JSON_VALID / JSON_EXTRACT 严格证明 bf JSON 合法且可被 5 标准筛选直接使用，
      并连带 spf 让球数(goal)与让球平(sf1)——这是"标准2 正价值/安全边际"与比分价值排序的输入。
    sql_baseline:
      query: |
        SELECT id, issue_num, comp, home, away, match_time_str,
               JSON_VALID(bf) AS bf_valid, JSON_LENGTH(bf) AS bf_keys,
               JSON_UNQUOTE(JSON_EXTRACT(bf,'$.s10')) AS s_1_0,
               JSON_UNQUOTE(JSON_EXTRACT(bf,'$.s11')) AS s_1_1,
               JSON_UNQUOTE(JSON_EXTRACT(bf,'$.s21')) AS s_2_1,
               JSON_UNQUOTE(JSON_EXTRACT(bf,'$.s00')) AS s_0_0,
               JSON_UNQUOTE(JSON_EXTRACT(spf,'$.goal')) AS handicap,
               JSON_UNQUOTE(JSON_EXTRACT(spf,'$.sf1')) AS rq_draw
        FROM lottery_bd_odds
        WHERE match_time > UNIX_TIMESTAMP()
        ORDER BY match_time ASC LIMIT 10
      result: |
        4 场全部 bf_valid=1, bf_keys=25：
        - 巴西vs日本: s_1_0=15.14, s_1_1=10.88, s_2_1=6.26, s_0_0=24.89, handicap=-1, rq_draw(sf1)=3.69
        - IA阿克拉内斯vs弗拉姆: s_1_0=29.27, s_1_1=15.81, s_2_1=16.09, s_0_0=36.11, handicap=0, rq_draw=3.26
        - 德国vs巴拉圭: s_1_0=14.23, s_1_1=18.36, s_2_1=8.03, s_0_0=29.82, handicap=-1, rq_draw=3.75
        - 荷兰vs摩洛哥: s_1_0=12.04, s_1_1=5.89, s_2_1=6.80, s_0_0=13.91, handicap=0, rq_draw=3.02
        SQL 基准结论：bf JSON 合法且 JSON_EXTRACT 可直接取出各比分赔率；spf JSON 含让球数与让球平赔率。
        5 标准筛选（联赛级别/让球盘口/比分专项/总进球）所需数据在 DB 层全部齐备且可计算。
    decision: continue
  - round: 4
    hypothesis: 调 get_lottery_schedule(play_type=301) 做对照，看工具返回的 bf 与 SQL 原始 JSON 是否一致。
      注：play_type=404（北单让球胜平负）对应 lottery_bdsf_odds，仅 sf 列、无 bf，不能用于 bf 验证，
      故按 301（北单胜负过关，lottery_bd_odds）对照。
    tool_call:
      name: get_lottery_schedule
      params: {play_type: "301"}
      invoke: scripts/_probe_args/g07_lotschedule.py（直调 MySQLCrazySportsClient.get_lottery_schedule(PlayType.BEIDAN_WIN_LOSS)，
        因 PowerShell 调外部程序会吞 JSON 双引号，helper tool 子命令无法直接传参，改用同进程直调）
      result: |
        code=OK, count=4。4 场与 SQL 基准一致（巴西vs日本/IA阿克拉内斯vs弗拉姆/德国vs巴拉圭/荷兰vs摩洛哥），
        sell_status 各玩法均 on_sale。但 odds.bf 序列化损坏：
        - bf 被返回为 list[25]，每项 {"label": <竞彩比分标签>, "odds": <JSON 碎片>}
          例：巴西vs日本 bf[:3] =
            {"label":"1:0","odds":"{\"s31\":\"9.51\""}
            {"label":"2:0","odds":"\"s30\":\"24.60\""}
            {"label":"2:1","odds":"\"s11\":\"10.88\""}
        - odds 字段是 DB bf JSON 被按逗号切碎的片段：首段残留前导 '{'，末段残留尾 '}'，中间段既非合法 JSON 也非裸数值。
        - label 用的是竞彩 _BF_LABELS（1:0/2:0/2:1...共 31 标签），与北单 bf 的 s-键语义（s31=3:1、s30=3:0、s11=1-1...）
          完全错位——标签错、赔率值也是碎片。
        - spf 同样损坏：win="{\"sf3\":\"2.73\""、draw="\"goal\":\"-1\""、loss="\"sf0\":\"2.75\""（JSON 被当 CSV 切碎）。
    comparison: |
      SQL 基准 vs 工具对照：
        - 场次列表：一致（4 场未开赛、sell_status 全可售）。
        - bf 字段：SQL 基准为完整合法 JSON（JSON_VALID=1, 25 键, JSON_EXTRACT 可取值）；
          工具把 bf 当 CSV 切碎，返回 25 个 {竞彩label, JSON碎片}，标签错位、赔率值不可用。
        - spf 字段：SQL 基准为 JSON（goal/sf3/sf1/sf0）；工具同样按 CSV 切碎为碎片。
      根因（代码定位）：foretell/tools/crazy_sports/mysql_client.py
        _parse_lottery_play("bf", raw) 调 _split_csv_values(raw)（L2205-2214 按逗号 split），
        但北单 lottery_bd_odds 的 spf/bf/jq/bqc/sxp 在 DB 里是 JSON 字符串而非逗号分隔串；
        _BF_LABELS（L2191-2196）是竞彩比分标签，与北单 s-键命名不一致。
        即：工具的玩法赔率解析器是为竞彩(jczq/jclq)CSV 串设计的，被错误复用到北单 JSON 字段上。
      按 Agent 2 判定：SQL 基准查出完整可用数据 → 工具字段映射/解析错误（字段含义对不上、返回 JSON 碎片）
      → tool_logic_gap（P1）。非 data_gap、非"无解"。
  final_status: blocked_by_tool
  gap_type: tool_logic_gap
  gap_evidence: |
    SQL 基准（独立写出并真实执行）：
      SELECT id, issue_num, comp, home, away, match_time_str, JSON_VALID(bf) AS bf_valid,
             JSON_LENGTH(bf) AS bf_keys, JSON_EXTRACT(bf,'$.s10')..., JSON_EXTRACT(spf,'$.goal')...
      FROM lottery_bd_odds WHERE match_time > UNIX_TIMESTAMP() ORDER BY match_time ASC LIMIT 10
    真实返回（节选）：
      巴西vs日本(2026-06-30 00:55): bf_valid=1, bf_keys=25, s_1_0=15.14, s_1_1=10.88, s_2_1=6.26, s_0_0=24.89, handicap=-1, rq_draw(sf1)=3.69
      荷兰vs摩洛哥(2026-06-30 06:00): bf_valid=1, bf_keys=25, s_1_0=12.04, s_1_1=5.89, s_2_1=6.80, s_0_0=13.91, handicap=0, rq_draw=3.02
    工具返回（实际调用 get_lottery_schedule play_type=301）：
      count=4，但 odds.bf = [{"label":"1:0","odds":"{\"s31\":\"9.51\""}, ...] ——
      JSON 被按逗号切碎，label=竞彩标签（错位），odds=不合法 JSON 碎片；spf 同样损坏。
    对照结论：DB 层 bf/spf 完整合法且 JSON_EXTRACT 可直接用于 5 标准筛选与比分价值排序；
      工具层 _parse_lottery_play 把 JSON 当 CSV 解析，返回损坏碎片，生产环境照此逻辑用户拿不到可用比分赔率。
      原判 ⚠️ implementation_gap（北单 bf 序列化损坏）方向正确，精化为 tool_logic_gap（DB 数据完整，工具解析逻辑错误）。
  recommended_next_step: |
    P1 修复 foretell/tools/crazy_sports/mysql_client.py 的北单玩法赔率解析：
      在 _parse_lottery_play 中对 BEIDAN_WIN_LOSS/BEIDAN_HANDICAP 的 spf/bf/jq/bqc/sxp 先尝试 json.loads，
      成功则按北单键语义结构化（bf: sXY→{score:"X:Y", odds}；spf: goal/sf3/sf1/sf0→{handicap, win, draw, loss}），
      失败再回退 CSV 分支；并为北单单独定义 _BD_BF_KEY_MAP（s31→3:1、s10→1:0、sl→胜其他...），
      不复用竞彩 _BF_LABELS。属工具层重构，本次不修改 foretell/tools/。

