# ---------- turn0 / G07-T0-a1 + a6：5 标准模板 + 北单比分推荐合成 ----------
- turn: 0
  atomic_id: G07-T0-a6
  category: synthesize_answer
  target: 按 5 标准筛选后输出北单比分推荐
  depends_on: [G07-T0-a2, G07-T0-a4]
  rounds:
  - round: 1
    hypothesis: 北单比分推荐需 bf 各比分赔率做价值排序。SQL 基准已证 bf JSON 完整可用；
      但工具层 get_lottery_schedule 返回的 bf 损坏（见 T0-a2），若 agent 直接用工具输出则比分推荐失真。
    sql_baseline: {query: 同 T0-a2 round3, result: bf_valid=1, 25 键, JSON_EXTRACT 可取各比分赔率}
    tool_call:
      name: get_lottery_schedule
      params: {play_type: "301"}
      result: bf 序列化损坏（竞彩 label + JSON 碎片），不可直接用于比分价值排序。
    comparison: |
      合成所需 bf 比分赔率：SQL 基准可用（JSON_EXTRACT 取 s10/s11/s21/s00...），工具输出损坏。
      Workaround：agent 层改用 SQL 基准/JSON_EXTRACT 或 get_odds_snapshot 欧赔 implied_prob + bf 标签枚举近似，
      但后者精度受损。属 tool_logic_gap 传导到合成环节。
  final_status: blocked_by_tool
  gap_type: tool_logic_gap
  gap_evidence: |
    合成北单比分推荐依赖 bf 各比分赔率。SQL 基准 JSON_VALID(bf)=1、JSON_EXTRACT(bf,'$.s11')=10.88 等可直接排序；
    工具 get_lottery_schedule 返回 bf 损坏碎片，agent 若照工具输出则比分推荐赔率值不可信。
    受 T0-a2 tool_logic_gap 传导。
  recommended_next_step: 随 T0-a2 修复（北单 JSON 玩法解析器）后自动满足；修复前 agent 应 fallback 到 SQL/JSON_EXTRACT。

# ---------- turn0 / G07-T0-a1：5 条筛选标准模板（maintain_context） ----------
- turn: 0
  atomic_id: G07-T0-a1
  category: maintain_context
  target: 5 条筛选标准模板（逐条是/否 + 综合结论规则）
