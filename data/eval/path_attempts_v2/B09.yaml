type_id: B09
type_name: 系列赛G7
case_id: TC-B09-REG-006
explored_at: '2026-06-29'
scenario: B
entity_entry: series_game
priority: P1
methodology: SQL优先，工具调用降级为对照验证（phase1_v2 Agent 2）
context: |
  B09 场景为 NBA 篮球季后赛 best-of-7 系列赛第 7 场（G7）分析。
  atomic T0-a1 要求 resolve_entity —— 定位“马刺 vs 雷霆 系列赛第7场”的唯一 match_id，
  hard_constraint: series_game=7 硬约束，找不到时不得降级 G6；
  T0-a5 hard_constraint: NOT_APPLICABLE 时诚实说明无 G7 数据，不得伪造 G6。
  原判 ⚠️(implementation_gap) 称“match_ids 数组仅5个id缺失2场，无法精确锁定G7”——
  该结论把 get_series_matchup 工具的 buggy 输出当成了 DB 真相，未做 SQL 基准验证，违反方法论。
  本次返工严格按 information_schema → SQL 基准 → 工具对照 → 判定 重做。

# =========================================================================
# 全局 schema 基础
# =========================================================================
global_schema:
  schema_query: |
    SELECT table_name, column_name, column_type, column_comment
    FROM information_schema.columns
    WHERE table_schema = DATABASE()
    AND table_name IN ('basketball_match','basketball_team','basketball_bracket_match_up','basketball_bracket_rounds')
    ORDER BY table_name, ordinal_position
  schema_result_summary: |
    basketball_match: id, competition_id, home_team_id, away_team_id, kind(1常规/2季后赛/3季前赛/4全明星/5杯/6附加),
      status_id(10=完场), match_time(int 时间戳), match_time_str, neutral, home_scores/away_scores
      (varchar 节数分数数组 [q1,q2,q3,q4,ot]), season_id, round_stage_id, round_round_num, round_group_num,
      coverage_intelligence, has_players。
      【关键】basketball_match 表【无】series_game / series_id / game_number / round_game 等系列赛场次字段，
      无法在比赛表本身按“第几场”过滤。
    basketball_team: id(球队id), name_zh, short_name_zh, name_en, competition_id, conference_id, country_id。
      球队主键为 id（非 team_id），中文名为 name_zh。
    basketball_bracket_match_up: id(对阵id/matchup_id), round_id, type_id(赛制: 10=7局4胜制/best_of_7),
      state_id(7主场胜/8客场胜/9取消/10轮空…), home_team_id, away_team_id, winner_team_id,
      home_score/away_score(多回合为【胜场次数】而非单场比分), parent_id/children_id1/children_id2(对阵树连线),
      match_ids(varchar(100), “对阵关联的比赛id”数组，即系列赛 G1..G7 对应的 basketball_match.id 列表)。
      【关键】系列赛“第几场”语义不在 basketball_match，而在 bracket_match_up.match_ids 数组顺序 +
      各 match_id 对应 basketball_match.match_time 排序。
    basketball_bracket_rounds: id, bracket_id, group_id, name_zh(阶段名，如“总决赛/西部决赛”)。
    结论：DB 通过 bracket_match_up.match_ids 字段完整记录 best-of-7 的 7 场关联比赛 id，
          可经 SQL 精确锁定 G7（数组末位 + match_time 最晚的一场），无需 series_game 字段。

# =========================================================================
# 原子查询 1: T0-a1 resolve_entity(马刺vs雷霆 G7)
# =========================================================================
atomics:
- atomic_id: B09-T0-a1
  category: resolve_entity
  target: {home: 雷霆, away: 马刺, series_game: 7, sport: basketball}
  rounds:
  - round: 1
    hypothesis: 先用 information_schema 确认 basketball_match 是否有 series_game 等系列赛字段，
      不凭“系列赛G7”字面臆测字段名；并确认系列赛关联存于哪张表。
    schema_query: |
      SELECT table_name, column_name, column_type, column_comment
      FROM information_schema.columns
      WHERE table_schema = DATABASE() AND table_name = 'basketball_match'
      ORDER BY ordinal_position
    schema_result: |
      basketball_match 全字段见 global_schema。确认无 series_game/series_id/game_number/round_game。
      仅有 kind(2=季后赛)、round_stage_id、round_round_num、round_group_num，均非“系列赛第N场”语义。
      另查 table_name LIKE '%series%' → 0 张表（DB 无独立 series 表）。
      系列赛语义表为 basketball_bracket_match_up，其 match_ids 字段(varchar(100))存系列赛各场 match_id。
    decision: continue
  - round: 2
    hypothesis: 用 SQL 独立解析马刺/雷霆的 basketball team_id，作为后续 matchup 与比赛查询的锚点。
    sql_baseline:
      query: |
        SELECT id, name_zh, short_name_zh, competition_id
        FROM basketball_team
        WHERE name_zh LIKE '%马刺%' OR name_zh LIKE '%雷霆%'
              OR name_en LIKE '%Spurs%' OR name_en LIKE '%Thunder%'
        LIMIT 20
      result: |
        命中（节选）：
        - id=10137, name_zh=圣安东尼奥马刺, short=马刺, competition_id=1(NBA)
        - id=10219, name_zh=俄克拉荷马城雷霆, short=雷霆, competition_id=1(NBA)
        - 其余为奥斯汀马刺/川崎雷霆勇者/各“迅雷/雷鸟”干扰候选（competition_id≠1）。
        基准结论：马刺=10137，雷霆=10219（均为 NBA competition_id=1）。
    decision: continue
  - round: 3
    hypothesis: 用 SQL 直接查 bracket_match_up 中马刺(10137)vs雷霆(10219)的 best_of_7 对阵，
      取其 match_ids 原始字符串，验证 DB 是否真有 7 场关联 id（证伪原判“仅5个/缺失2场”）。
    sql_baseline:
      query: |
        SELECT id, round_id, type_id, state_id, home_team_id, away_team_id,
               winner_team_id, home_score, away_score, match_ids, note
        FROM basketball_bracket_match_up
        WHERE (home_team_id IN (10137,10219) AND away_team_id IN (10137,10219))
        ORDER BY id LIMIT 20
      result: |
        命中 1 行（即原判提及的 matchup 922432）：
        - id=922432, round_id=171928, type_id=10(best_of_7), state_id=8(客场胜),
          home_team_id=10219(雷霆主场), away_team_id=10137(马刺客场),
          winner_team_id=10137(马刺), home_score=3, away_score=4(胜场数 3-4，马刺4-3胜),
          match_ids='[3920588,3920589,3920590,3920591,3921246,3921525,3921754]'
        【关键】SQL 基准 match_ids 共 7 个 id：3920588,3920589,3920590,3920591,3921246,3921525,3921754。
        原判“仅5个id缺失2场”被证伪——DB 实际有完整 7 场关联 id，G7=数组末位 3921754。
    decision: continue
  - round: 4
    hypothesis: 用 SQL 将 7 个 match_id 落到 basketball_match 实表，按 match_time 排序，
      验证 7 场全部真实存在、是否完场、并定位 G7 的主客/比分/时间。
    sql_baseline:
      query: |
        SELECT id, home_team_id, away_team_id, kind, status_id,
               FROM_UNIXTIME(match_time) AS match_time_l, home_scores, away_scores, neutral
        FROM basketball_match
        WHERE id IN (3920588,3920589,3920590,3920591,3921246,3921525,3921754)
        ORDER BY match_time
      result: |
        7 行全部命中，kind=2(季后赛), status_id=10(完场), neutral=0。按时间排序即 G1..G7：
        - G1 id=3920588, 2026-05-19 08:30, 雷霆(h)vs马刺(a), home[27,17,29,28,14]=115 vs away[27,24,29,21,21]=122 → 马刺胜(加时)
        - G2 id=3920589, 2026-05-21 08:30, 雷霆(h)vs马刺(a), 122 vs 113 → 雷霆胜
        - G3 id=3920590, 2026-05-23 08:30, 马刺(h)vs雷霆(a), 108 vs 123 → 雷霆胜
        - G4 id=3920591, 2026-05-25 08:00, 马刺(h)vs雷霆(a), 103 vs 82 → 马刺胜
        - G5 id=3921246, 2026-05-27 08:30, 雷霆(h)vs马刺(a), 127 vs 114 → 雷霆胜
        - G6 id=3921525, 2026-05-29 08:30, 马刺(h)vs雷霆(a), 118 vs 91 → 马刺胜
        - G7 id=3921754, 2026-05-31 08:00, 雷霆(h)vs马刺(a), home[25,28,24,26]=103 vs away[32,24,24,31]=111 → 马刺客场胜
        【G7 真实存在】match_id=3921754, 2026-05-31, 雷霆主场 103-111 马刺，马刺客场夺系列赛 4-3，
        与 matchup home_score=3/away_score=4/winner=10137 完全一致。
        (match_time 为 DB 存储时间戳，FROM_UNIXTIME 显示值按纳米数据惯例约为开赛北京时间；美东换算即 NBA 季后赛常规开赛窗口。)
    decision: continue
  - round: 5
    hypothesis: 调现有 resolve_match 工具对照，验证其能否在 basketball + series_game=7 下定位 G7；
      并对照 get_series_matchup 工具返回的 match_ids 是否与 SQL 基准(7个)一致。
    tool_call:
      name: resolve_match
      params: {home: 雷霆, away: 马刺, series_game: 7}
      result: |
        code=NOT_APPLICABLE, dimension=match_entity,
        reason="未找到系列赛第7场，禁止降级分析其他场次"（home/away 中文经 shell 编码显示为 "??"，但 reason 守轨提示完整）。
        守轨行为生效：诚实说明未找到 G7 且不降级 G6，符合 T0-a5 hard_constraint。
        但底层未找到的原因是 resolve_match 仅查 football_match 表，不支持 basketball_match。
    tool_call_2:
      name: get_series_matchup
      params: {sport: basketball, team_id: 10137, limit: 50}
      result: |
        code=OK, dimension=series_matchup。命中的马刺vs雷霆对阵：
        - matchup_id=922432, series_type=best_of_7, state=away_won, home=雷霆(10219), away=马刺(10137),
          winner=10137, home_wins=3, away_wins=4,
          match_ids=[3920589,3920590,3920591,3921246,3921525]  ← 仅 5 个
        工具返回的 match_ids 漏掉了 3920588(G1) 与 3921754(G7)。
    comparison: |
      SQL 基准 vs 工具：
      1) matchup 元信息（type=best_of_7, winner=马刺, 3-4）—— 工具与 SQL 一致。
      2) match_ids —— SQL 基准 7 个 [3920588,3920589,3920590,3920591,3921246,3921525,3921754]，
         工具仅返回 5 个，漏 3920588(G1) 与 3921754(G7)。工具返回比 SQL 基准少，
         且漏掉的正是关键 G7 → tool_logic_gap（Agent 2 第4条“工具返回比 SQL 基准更少→标记 tool_logic_gap”）。
      3) resolve_match{series_game=7} → NOT_APPLICABLE，而 SQL 证明 G7=3921754 真实存在且完场。
         resolve_match 不查 basketball_match（只查 football_match），series_game 参数虽接收但 SQL 未作过滤
         → implementation_gap（DB 有 G7，工具不支持篮球+series_game 过滤）。
      4) 守轨提示“禁止降级分析其他场次”虽符合 a5，但其触发前提是“工具找不到 G7”——
         而 DB 实际有 G7，故该 NOT_APPLICABLE 属能力不足导致的 false negative，非真“无G7”。
  final_status: blocked_by_tool
  gap_type: implementation_gap
  gap_evidence: |
    SQL 基准（独立写出并真实执行，非工具输出）：
      SELECT id, match_ids, home_team_id, away_team_id, winner_team_id, home_score, away_score, type_id, state_id
      FROM basketball_bracket_match_up
      WHERE (home_team_id IN (10137,10219) AND away_team_id IN (10137,10219)) LIMIT 20
      → matchup 922432, type_id=10(best_of_7), winner=10137(马刺), home_score=3/away_score=4,
        match_ids='[3920588,3920589,3920590,3920591,3921246,3921525,3921754]'  (7 个完整)
      SELECT id, home_team_id, away_team_id, kind, status_id, FROM_UNIXTIME(match_time), home_scores, away_scores
      FROM basketball_match WHERE id IN (3920588,...,3921754) ORDER BY match_time
      → 7 行全命中，全 kind=2 季后赛、status_id=10 完场。
        G7 = 3921754, 2026-05-31 08:00, 雷霆(h) 103-111 马刺(a)，马刺客场夺系列赛 4-3。
    工具返回（实际调用）：
      resolve_match{home:雷霆, away:马刺, series_game:7} → code=NOT_APPLICABLE,
        reason="未找到系列赛第7场，禁止降级分析其他场次"（守轨生效，但底层不查 basketball_match）。
      resolve_match{home:雷霆, away:马刺}(去 series_game) → code=ENTITY_NOT_FOUND（证实根本不查篮球表）。
      get_series_matchup{sport:basketball, team_id:10137} → matchup 922432 元信息 OK，
        但 match_ids 仅返回 [3920589,3920590,3920591,3921246,3921525]（5 个），漏 3920588(G1) 与 3921754(G7)。
    对照结论：
      SQL 基准精确锁定 G7 = match_id 3921754（雷霆主场 103-111 马刺，2026-05-31 完场），
      系列赛 7 场全部在库且完场——DB 有 G7 数据，路径可行。
      现有工具：(a) resolve_match 不支持 basketball_match 且 series_game 不作 SQL 过滤 → implementation_gap；
      (b) get_series_matchup 漏返回 G1/G7 两个 match_id → tool_logic_gap。
      按 Agent 2 判定规则：SQL 基准查出 G7 → 一律判 implementation_gap（不得标无解/data_gap）。
      原判“无法精确锁定G7”被推翻：G7 可经 bracket_match_up.match_ids SQL 精确定位为 3921754。
  recommended_next_step: |
    工程团队两条修复路径（任一即可让 B09 全链路 ✅）：
    (A) 扩展 resolve_match 支持 sport=basketball 分支，JOIN basketball_bracket_match_up 取 match_ids，
        按 series_game 索引（数组第 N 个）+ match_time 排序返回对应 basketball_match.id；
    (B) 修复 get_series_matchup 的 match_ids 解析（当前漏返回首尾各 1 个，疑似字符串 split/截断 bug，
        match_ids 字段 varchar(100) 未超长，非存储截断），使其完整返回 7 个 id，
        再新增/复用按 series_game 取第 N 场的薄封装。
    另：resolve_match 对 basketball 返回 NOT_APPLICABLE + 守轨提示虽符合 a5“不伪造G6”，
    但本质是 false negative（DB 有 G7 却说找不到），no_false_negative 维度需扣分。
    本次不修改 foretell/tools/。

