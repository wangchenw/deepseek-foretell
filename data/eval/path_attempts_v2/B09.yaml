atomic_id: aq_3
rounds:
  - round: 1
    hypothesis: "需要前 6 场结果验证 series 真打满 3:3，且为 aq_4 综合分析提供 series 进展数据。
      用 SQL 一次性聚合 7 场比分（含每场总分计算）"
    sql_baseline:
      query: |
        SELECT m.id, m.match_time_str, m.home_team_id, m.away_team_id,
               m.home_scores, m.away_scores,
               ht.short_name_zh AS home_name, at.short_name_zh AS away_name,
               (CAST(JSON_EXTRACT(m.home_scores,'$[0]') AS UNSIGNED)
                +CAST(JSON_EXTRACT(m.home_scores,'$[1]') AS UNSIGNED)
                +CAST(JSON_EXTRACT(m.home_scores,'$[2]') AS UNSIGNED)
                +CAST(JSON_EXTRACT(m.home_scores,'$[3]') AS UNSIGNED)) AS home_total_4q,
               (CAST(JSON_EXTRACT(m.away_scores,'$[0]') AS UNSIGNED)
                +CAST(JSON_EXTRACT(m.away_scores,'$[1]') AS UNSIGNED)
                +CAST(JSON_EXTRACT(m.away_scores,'$[2]') AS UNSIGNED)
                +CAST(JSON_EXTRACT(m.away_scores,'$[3]') AS UNSIGNED)) AS away_total_4q
        FROM basketball_match m
        JOIN basketball_team ht ON m.home_team_id=ht.id
        JOIN basketball_team at ON m.away_team_id=at.id
        WHERE m.id IN (3920588,3920589,3920590,3920591,3921246,3921525,3921754)
        ORDER BY m.match_time
      result: "7 场全有数据（G1 有加时第5节=14，其余 4 节结束）。逐场胜负：
        G1 5/19 雷霆主 115(含OT14) vs 马刺 122(含OT21) → 马刺胜 1:0
        G2 5/21 雷霆主 122 vs 马刺 113 → 雷霆胜 1:1
        G3 5/23 马刺主 108 vs 雷霆 123 → 雷霆胜 1:2
        G4 5/25 马刺主 103 vs 雷霆 82 → 马刺胜 2:2
        G5 5/27 雷霆主 127 vs 马刺 114 → 雷霆胜 2:3
        G6 5/29 马刺主 118 vs 雷霆 91 → 马刺胜 3:3
        G7 5/31 雷霆主 103 vs 马刺 111 → 马刺胜 4:3 马刺赢系列赛
        pattern：主场优势被打破（5/7 客队取胜），马刺客场 4 胜"
    decision: continue
  - round: 2
    hypothesis: "对照 foretell get_h2h 工具能否返回这 7 场交锋（虽然实际是 series 内战
      而非历史交锋，但工具语义上应能查到两队过往对决）"
    tool_call:
      name: get_h2h
      params: {team_a: 10137, team_b: 10219}
      result:
        code: DATA_MISSING
        data: {team_a: 10137, team_b: 10219, matches: []}
    comparison: "不一致：SQL 基准证明 DB 里有 7 场马刺 vs 雷霆对决（含 G7），但 get_h2h
      返回空。根因：get_h2h 查 football_match h2h，对 basketball team_id 完全不适用
      → implementation_gap（同 aq_1，篮球无 h2h 工具）"
    decision: blocked
final_status: blocked
gap_type: implementation_gap
gap_evidence: "SQL 基准聚合 7 场比分验证 series 3:3 → G7 4:3 马刺赢，且揭示系列赛
  主场劣势 pattern（5/7 客队取胜）。工具对照 get_h2h(team_a=10137, team_b=10219)
  返回 DATA_MISSING——因工具查 football_match，对篮球 team_id 不适用。"
recommended_next_step: "新增篮球版 get_h2h 或在 get_h2h 加 sport 参数分流到
  basketball_match + basketball_team。对 series 类查询，应支持按 bracket_match_up
  聚合（match_ids 数组）而非单纯历史交锋。"

