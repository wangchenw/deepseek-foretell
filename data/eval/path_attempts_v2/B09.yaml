# =========================================================================
# 原子查询 5: T0-a5 apply_guardrails(系列赛约束)
# =========================================================================
- atomic_id: B09-T0-a5
  category: apply_guardrails
  target: {rule: no_downgrade_to_G6, honest_when_not_applicable}
  rounds:
  - round: 1
    hypothesis: 验证守轨行为——工具在“找不到 G7”时是否诚实说明且不降级 G6。
    sql_baseline:
      query: 同 a1（SQL 证明 G7 真实存在=3921754）
      result: G7 在库，客观不存在“无G7”情形。
    tool_call:
      name: resolve_match
      params: {home: 雷霆, away: 马刺, series_game: 7}
      result: |
