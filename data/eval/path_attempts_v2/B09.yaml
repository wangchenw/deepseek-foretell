      验证系列赛基本面数据（系列赛比分、各场赛果）是否在库。
    sql_baseline:
      query_series_summary: |
        SELECT id, home_team_id, away_team_id, winner_team_id, home_score, away_score, type_id, state_id
        FROM basketball_bracket_match_up WHERE id=922432
      query_g7_result: |
        SELECT id, home_team_id, away_team_id, home_scores, away_scores, status_id,
               FROM_UNIXTIME(match_time) AS t, neutral
        FROM basketball_match WHERE id=3921754
      result: |
        系列：922432 best_of_7, 马刺4-3雷霆(away_won), winner=10137。
        G7：3921754, 雷霆(h)103-111马刺(a), 完场, neutral=0。
        系列赛 7 场比分与胜负链 SQL 全部可查（见 a1 round4），基本面数据齐全。
    tool_call:
      name: get_series_matchup
      params: {sport: basketball, team_id: 10137, limit: 50}
      result: matchup 922432 元信息 OK（best_of_7, 3-4, winner=马刺），但 match_ids 漏 G1/G7。
    comparison: |
      系列赛基本面（对阵、赛制、胜场数、赢家）工具与 SQL 一致；7 场逐场赛果 SQL 全可查。
      工具漏返回 G1/G7 的 match_ids 不影响“系列赛比分”元信息，但影响逐场定位（传导 a1）。
  final_status: satisfied_with_sql_match_id
  gap_type: implementation_gap
  gap_evidence: |
    系列赛基本面经 SQL 基准完整可查（922432, best_of_7, 马刺4-3雷霆, G7=3921754 雷霆103-111马刺）。
    get_series_matchup 元信息 OK 但 match_ids 漏 2 个（tool_logic_gap，传导自 a1）。
    无独立 data_gap；逐场定位受 a1 implementation_gap 制约。
  recommended_next_step: 随 a1 修复（match_ids 完整返回 + series_game 取场）后自动满足。

