  # ============================================================
  # 跨运动 ID 碰撞警示(全局最高优先级 P0)
  # ============================================================

  - id: cross_sport_id_collision
    table: football_team / basketball_team
    column: id
    nami_field: 球队ID
    description: |
      football_team.id 与 basketball_team.id 共享同一整数空间,
      数值可碰撞(如 10155 既是篮球卡塔尔又是足球索菲亚火车头)。
      同理 football_match.id 与 basketball_match.id 可碰撞。
    format: plain_integer
    used_by_tools:
      - 所有 deep/stats/odds 工具
    confirmed: true
    collision_warning: |
      **P0 安全隐患**:B08/C07/G08/F03/D07 撞墙根因。
      篮球 team_id/match_id 传入无 sport 参数的足球 deep 工具静默返回足球数据,
      构成 false positive(比 DATA_MISSING 更危险)。
      **重写强制要求**:所有 deep/stats/odds 工具加 sport 参数,
      不匹配时 fail-closed 返回 DATA_MISSING,禁止静默命中。

# ============================================================
# 重写时的强制规则(对照此表)
# ============================================================

rewrite_rules:
  - rule: 所有工具实现必须对照本表 confirmed=true 的字段语义,不得凭字段名假设
    reason: E05/D05/E07 等 bug 根因都是凭字段名假设
  - rule: lottery 域工具返回的 ID 必须显式区分 football_match_id / lottery_official_id / lottery_entry_id
    reason: match_id 一词三义,透传会误导下游
  - rule: 解析 lottery 赔率串必须按彩种分支:101/201 走 CSV,301/404 走 json.loads
    reason: 北单 JSON 被竞彩 CSV 解析器切碎(D05/E07/G07)
  - rule: 所有 deep/stats/odds 工具必须支持 sport 参数,不匹配 fail-closed
    reason: 跨运动 ID 碰撞静默 false positive(B08/C07/G08)
  - rule: get_standings 输出必须按 competition.type 分支:联赛单表 vs 杯赛多组+promotion_id
    reason: 杯赛多组积分榜被压平为联赛单表(B10/H06/F07)
  - rule: basketball status_id 枚举与足球不同(完场=10 非 8),工具不得共用一套状态码
    reason: 篮球 status_id=8 是第四节,误判为完场会出错
