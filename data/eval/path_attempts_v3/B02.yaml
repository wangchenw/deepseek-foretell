caveats:
- id: B02-h2h-field-semantics
  category: tool_logic_gap
  note: >-
    get_h2h sport=basketball 复用 football 字段名:score_breakdown.full_time 实为半场比分、
    half_time 实为全场、red_card/yellow_card 实为各节得分(1Q/2Q/3Q/4Q)。
    数据正确但字段语义错位,LLM 需知道"篮球 red_card=主队某节得分"。
    建议后续为篮球单独映射字段名(q1/q2/q3/q4/full/half)。
- id: B02-schedule-sport-metadata
  category: tool_logic_gap
  note: >-
    get_team_schedule sport=basketball 返回行内 sport 字段仍透传 "football"(元数据 bug),
    status="interrupted"(篮球完场 status_id=10 映射失真)。数据本身是篮球 match_id,
    但元数据透传未跟随 sport 参数。建议 sport 字段回填入参值,status 映射篮球 status_id。
