caveats:
- id: B06-standings-duplicate-rows
  category: tool_logic_gap
  note: >-
    get_basketball_standings(1) 返 30 行但同 team_id 重复(尼克斯出现 2 次 position 1/3,
    马刺 3 次),疑似季后赛+常规赛混合或多 season_id 合并。数据可用但 LLM 需结合
    won/lost 规模判断是常规赛(60+ 胜)还是季后赛(3-5 胜)。建议加 season_id/stage 过滤。
- id: B06-h2h-field-semantics
  category: tool_logic_gap
  note: >-
    get_h2h sport=basketball 字段名复用 football(full_time=半场、half_time=全场、
    red/yellow_card=各节得分)。数据正确,语义错位,建议为篮球单独映射 q1-q4 字段。
- id: B06-deep-missing-dimensions
  category: data_gap
  note: >-
    篮球 8 类 deep 维度无采集(lineup/team_stats/player_stats/incidents/tlive/half_stats
    /player_market 等),走 DATA_MISSING+reason 短路。这是真实数据缺口(非工具 bug),
    篮球深度分析的"战术统计/事件流/首发"维度缺失,LLM 须告知用户该维度不可用。
notes:
