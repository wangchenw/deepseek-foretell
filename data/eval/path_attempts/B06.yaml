blocking_gap:
  type: data_gap
  description: >-
    用户原问题"今天竞彩001已赢2球"中的实体"竞彩001 @ 2026-06-29"在 DB 中不存在：
    (1) 今日 issue=260629 的竞彩 schedule 最小 issue_num 为 1074 (周一074)，
        无 001 场次；
    (2) 该 issue 下所有 lottery 条目对应 match_date 均为 2026-06-30（明日世界杯第3轮），
        非今日 finished 比赛，无法支撑"已赢2球"的复盘前提；
    (3) resolve_lottery_match 用 code="001" 与 code="周一001" 配 date="2026-06-29"
        均返回 ENTITY_NOT_FOUND；list fallback (get_lottery_schedule) 同样无 001。
    属 DB 无该实体（data_gap），非工具 routing 错误——
    resolve_lottery_match 在 code="周一074"+date="2026-06-30" 上 OK 已证明工具正常。
    LLM 正确路径：先承认实体不可定位（按 guardrails 不编造赛果），
    可改为以今日实际存在的 周一074..076 之一为对象（但均为未开赛，无"已赢球"复盘数据），
    或请用户确认场次编号 / 比赛日期。
  failed_atomic: B06-T1-a1

route_complete: false

notes:
  - B06 的价值在于验证深度维度链：用 finished reference match (4460928) 实调 16 个维度工具全部 OK
    (h2h/recent_form×2/standings/fifa/lineup/injury/intel/incidents/team_stats/player_stats/tlive/
     odds_snapshot/odds_trend/kelly/betfair)，证明 Phase 2 工具层完全支撑"全面深度分析"所需并行维度
  - resolve_lottery_match 的 date 参数语义为 match_date（比赛日），非 issue/sell date；
    本 case 中今日 lottery 条目 match_date 均为 2026-06-30，故 date=2026-06-29 必然失配
  - LLM 侧 routing 策略：lottery_code 不存在时必须走 get_lottery_schedule list fallback
    核对 issue_num 编码（parse_lottery_issue_num: weekday+3位序号），不能仅凭用户口径"001"直查
  - 风险点：naive agent 若不承认 ENTITY_NOT_FOUND 而编造赛果/分析，将触发 no_false_negative 与
    output_discipline 双重失分；guardrails 必须显式标注"实体不可定位时禁止补全赛果"
  - 已知：4460928 比分为 1-4（法国客场赢3球），与用户"赢2球"前提不符，仅用作工具链 reference，
    不构成对原 case 的满足
  - 探针建议：scripts/route_probe_registry.py 可为 B06 增加
    "lottery 不可定位 → finished reference match 维度并行" 的探针序列
