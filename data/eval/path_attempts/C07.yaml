probe_summary: |
  C07 近期战绩复盘，场景“勇士vs太阳”（NBA 篮球）。验证 resolve_team / resolve_basketball_team
  → get_recent_form / get_team_schedule / get_team_season_stats 工具链能否复盘篮球球队近期表现。
  发现 cross-sport data collision：篮球 team_id 喂给足球专用工具时不报 DATA_MISSING，
  而是静默返回 football_team 表中同 id 的足球队数据，会误导 LLM 产出 false positive 答案。
