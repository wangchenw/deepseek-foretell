  basketball_team_schedule: false
  basketball_team_season_stats: false
  sport_guard_missing: true
verdict: ❌
verdict_reason: |
  resolve_basketball_team 能正确解析 NBA 勇士/太阳（T1-a1 satisfied），但后续三件套工具
  不支持篮球且未做 sport 校验，静默返回足球数据，存在 cross-sport data collision 风险。
  路径无法安全完成近期战绩复盘，且会误导 LLM 产出错误答案。建议 Phase 3：
  (1) 新增 get_basketball_recent_form / get_basketball_team_schedule / get_basketball_team_season_stats
      查 basketball_match / basketball 相关统计表；
  (2) 或为现有三件套增加 sport 参数并在 SQL 层路由到对应表；
  (3) 在 sport 不匹配时返回 DATA_MISSING 而非静默命中异类实体，作为短期守轨兜底。
