blocking_gap:
  type: implementation_gap
  subtype: cross_sport_data_collision
  description: |
    C07 场景为 NBA 篮球“勇士vs太阳”，但近期战绩复盘所需的三件套
    get_recent_form / get_team_schedule / get_team_season_stats 均为足球专用工具：
    1. SQL 分别查 football_match / football_competition_teams_stats 表，工具签名无 sport 参数；
    2. docstring 明确写“MySQL football_team.id”；
    3. mysql_client 中不存在篮球版本（无 get_basketball_recent_form / get_basketball_team_schedule /
       get_basketball_team_season_stats）。
    更严重的是：basketball_team.id 与 football_team.id 共享同一数值空间但映射不同实体，
    工具层未做 sport 校验。传入篮球 team_id（10155=勇士、10131=太阳）时不报 DATA_MISSING，
    而是静默返回 football_team 表中同 id 的足球队（科特布斯/格勒诺布尔）的足球战绩、赛程、赛季统计，
    code=OK。若 LLM 按原子分解“resolve_basketball_team → get_recent_form”执行，会把足球数据
    当成 NBA 球队近期战绩汇报给用户，构成 false positive，比 DATA_MISSING 更危险。
    Phase 2 重构未覆盖篮球近期战绩/赛程/赛季统计维度（仅 get_schedule_by_date 支持 sport 参数，
    get_series_matchup 支持 sport=basketball，但均为系列赛/日期维度，非球队维度）。
  failed_atomic: C07-T1-a2
route_complete: false
