blocking_gap:
  type: implementation_gap
  description: foretell 工具层北单 bf 比分赔率解析错误。`_parse_lottery_play("bf", raw)` 对所有
    玩法统一走 `_split_csv_values`（按逗号拆分），但北单 lottery_bd_odds.bf 的存储格式是 JSON
    键值串 `{"s31":"61.37","s30":"148.64",...}`（与竞彩 jczq 的 CSV 格式不同）。逗号拆分后第一
    片段 `{"s31":"61.37"` 被整体当作 label="1:0" 的 odds 值，其余 24 个比分项的赔率全部丢失且
    值为畸形截断串（非数字）。get_lottery_schedule 与 resolve_lottery_match 的 bf 字段均受影响
    （bf_len=25 但 bf_numeric=False）。后果：LLM 经 foretell 工具拿不到可用的比分赔率，无法做
    "推荐比分"合成；需 SQL 直查 lottery_bd_odds.bf 并按 s-键映射还原。
  failed_atomic: D05-T1-a2
  workaround: SQL 直查 lottery_bd_odds WHERE match_time>NOW() AND SUBSTRING_INDEX(sell_status,',',-1)='1'，
    bf 列 JSON.parse 后按 _BF_LABELS 顺序映射；或修复 _parse_lottery_play 对 beidan bf 走 JSON
    解析分支。
route_complete: false
data_quality_notes:
- 北单 issue 跨自然日：issue=26069 同时含 06-26/27（已完赛）与 06-29（已开赛）与 06-30（未开赛）
  条目；get_lottery_schedule date 参数按 match_time_str 日历日过滤，"今天未开赛"需用次日 date
  或不传 date（默认在售）才能命中。
- 工具 entry 不暴露 match_time_str（仅 date）与 match_id（恒 null），无法精确判断开赛时刻；需
  以 sell_status.bf=on_sale 作为"未开赛可投"判据。
- bf 25 项 label 顺序与竞彩一致（_BF_LABELS），北单 bf JSON 的 s-键到 label 映射需在工具层补
  JSON 解析分支。
