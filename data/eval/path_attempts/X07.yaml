  result_summary: |
    同 a1。x1 为同类别额外 atomic，复用同一护栏审查结论：护栏对数值 ID 外露无显式约束。
  gap: implementation_gap

guardrail_coverage:
  tool_layer:
    redacts_internal_ids: false
    note: |
      工具层不做任何 ID 屏蔽，envelope 原样回传 match_id/team_id/league_id/company_id/lottery_id。
      这是设计决策（工具层保留主键供后续工具链路透传，如 resolve→schedule→odds），屏蔽责任在 LLM 层。
  skill_layer:
    has_output_discipline: true
    explicit_id_redaction: false
    note: |
      foretell-output-discipline 仅禁「字段名/JSON 结构」，未禁「数值型内部 ID」。
      foretell-status-dictionary 同样仅提「内部字段名」。
  llm_layer:
    id_redaction_enforced: unknown
    note: |
      是否实际外露取决于 LLM 对「字段名」语义的解读；无显式 ID 禁令时存在透传风险。

exposed_id_inventory:
  - field: match_id
    source: football_match.id
    appears_in: get_schedule_by_date, get_team_schedule, get_odds_snapshot, get_odds_trend,
      get_same_odds_history, get_kelly, get_betfair, resolve_match(envelope顶层),
      get_lottery_schedule, resolve_lottery_match
  - field: home_team_id
    source: football_team.id
    appears_in: get_schedule_by_date, get_team_schedule, resolve_match(candidates)
  - field: away_team_id
    source: football_team.id
    appears_in: get_schedule_by_date, get_team_schedule, resolve_match(candidates)
  - field: team_id
    source: football_team.id / basketball_team.id
    appears_in: resolve_team, resolve_basketball_team, get_team_schedule(回传),
      get_team_honors(回传), get_player_transfers(隐含)
  - field: league_id
    source: football_competition.id
    appears_in: get_schedule_by_date, get_team_schedule, resolve_league, get_standings(入参回传)
  - field: company_id
    source: football_company.id
    appears_in: get_odds_snapshot, get_odds_trend(european/asian 条目)
  - field: lottery_id
    source: football_lottery.id
    appears_in: get_lottery_schedule, resolve_lottery_match
  - field: competition_id
    source: football_competition.id
    appears_in: get_top_scorers(入参), 部分维度回传

satisfied: []

blocking_gap:
  type: implementation_gap
  description: |
    X07 的两个 apply_guardrails atomic 均未 satisfied。工具层（4 个代表性工具实调确认）
    原样回传数值型内部 ID（match_id/team_id/league_id/company_id/lottery_id），设计上
    保留主键供工具链路透传（resolve→schedule→odds），屏蔽责任下推至 LLM 层。
    但护栏 skill `foretell-output-discipline` 仅规定「不暴露工具名、数据库字段名、
    内部 JSON 结构」，负样本只列举 status_map/line_cn/meta.truncated 等字段名，
    **未显式禁止数值型内部主键 ID 的输出**。LLM 易将「match_id: 4460914」解读为
    「赛事编号」而非「字段名」而透传给用户，触发内部 ID 外露。

    修复建议（不在本次探路范围，需 skill 层评审）：
    在 foretell-output-discipline 增加显式条款，例如：
      - 禁止向用户输出任何数值型内部 ID（match_id / team_id / league_id /
        company_id / lottery_id / competition_id），无论以「编号」「ID」「代码」何种措辞
      - 用户层只展示名称（球队名/联赛名/博彩公司名/lottery_code 中文场次编号）
      - 内部 ID 仅用于工具间透传，不得出现在面向用户的回复中
  failed_atomic: X07-T1-a1
  blocking_route: true

