  get_odds_snapshot→company_id、get_lottery_schedule→lottery_id），符合 X07 场景预期。
  但护栏 skill foretell-output-discipline 缺少对「数值型内部主键 ID」的显式禁止条款，
  现有「不暴露字段名」语义不足以覆盖 LLM 把 ID 当「赛事编号」复述的外露路径。
  satisfied=0/2，blocking_gap=implementation_gap，倾向 ❌（不通过）：护栏未显式落地，
