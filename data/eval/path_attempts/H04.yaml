      SELECT COUNT(*) AS future_cnt, MIN(match_time_str) AS next_match
      FROM football_match WHERE competition_id=120 AND status_id IN (1,9)
      AND match_time >= UNIX_TIMESTAMP()
  code: OK
  count: 1
  stub: false
  note: >-
    直查 football_match 确认西甲未来赛事 future_cnt=0、next_match=null，
    赛季已彻底结束，remaining_rounds=0 的推算被独立证实，不依赖积分榜 played 字段。
