type_id: H04
type_name: 冠军已锁定
scenario: H
case_id: TC-H04-SYN
entity_entry: league
sport: any
explored_at: '2026-06-29'
source: path_explorer_live
user_utterance: >-
  [合成示例] 本赛季西甲冠军是不是已经没悬念了？榜首领先多少分、还剩几轮，能锁定了吗？
methodology: >-
  H04 为合成语义：冠军是否已锁定 = (榜首分差 > 剩余轮次 × 单场最高得分)。
  足球单场最高 3 分，故判定式 lead > remaining_rounds × 3。路径需要
  resolve_league → get_standings(榜首分差 lead + 已赛轮次 played) → 推算
  remaining = total_rounds − played → 合成判定。赛季已结束场景下
  remaining=0、lead>0，公式平凡成立；中段锁定则需 remaining>0 仍满足不等式。
sample_pick: >-
  6 月底欧洲五大联赛多数已收官但部分库内 MAX(season_id) 已切到下赛季初始空榜
  (英超 82、意甲 108 get_standings 返回 points=0/played=0，不可用)。西甲 120
  仍保留 2025-26 完赛积分榜，且 SQL 确认 competition_id=120 无任何未来赛事
  (future_cnt=0)，是干净的“赛季已结束、冠军已锁定”样本。另探得澳超 590
  (纽卡 48 分 / 阿德莱德 43 分，played 26，剩余约 1 轮，lead 5 > 3) 作为
  非平凡中段锁定的交叉佐证。
