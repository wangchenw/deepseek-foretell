    反转问题，但此处返回空且与 SQL 互证，结论可信；route_matrix 预期的
    get_team_schedule 在本场景的作用正是“确认无剩余轮次”，已满足。
- round: 1
  turn: 1
  atomic_id: H04-T1-a2
  category: cross_validation
  tool: sql
  params:
    query: >-
      SELECT pt.position, pt.team_id, t.name_zh, pt.points, pt.won, pt.draw,
      pt.loss, pt.total AS played FROM football_points_table p
      JOIN football_points_table_team pt ON pt.table_id=p.id
      JOIN football_team t ON t.id=pt.team_id WHERE p.competition_id=120
      AND p.season_id=(SELECT MAX(season_id) FROM football_points_table
      WHERE competition_id=120) ORDER BY pt.position LIMIT 3
  code: OK
