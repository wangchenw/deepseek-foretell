    (31W1D6L, played 38)，次席 皇家马德里 10217 86 分 (27W5D6L, played 38)，
    第三 比利亚雷亚尔 10493 72 分。lead = 94 − 86 = 8；20 队双循环 total_rounds=38，
    played=38 → remaining_rounds=0；8 > 0×3=0 → 冠军已锁定 = 巴萨。
