data_quality_notes:
- get_basketball_standings 缺 scope 过滤是核心工具缺陷——同 team_id 在 scope=3/4/5 下多行，won/lost
  跨度从 4-0 到 64-18，直接消费会得到错误席位判定；必须 SQL 加 WHERE p.scope=5 取常规赛榜。
- basketball_points_table.scope 枚举：1赛季/2预选/3小组赛/4季前赛/5常规赛/6季后赛；NBA 杯赛小组赛
  在 scope=3(东西部各 A/B/C 组 6 表)。席位锁定只用 scope=5。
- basketball_points_table_team.conference 字段存的是 conference_record(如"41-11")战绩，非东西部分区
  名；分区归属需看父表 basketball_points_table.name("东部排名"/"西部排名")。
- season_id 取数陷阱：basketball_season 当前赛季 2120(2026-27) has_table=0 无榜，MAX(season_id) 落到
  1911(2025-26 已完赛)；故工具返回的是上季最终榜，新赛季席位暂不可判(无数据)。
- 季后赛对阵图 join 路径：basketball_bracket_match_up.round_id → basketball_bracket_rounds.id →
  basketball_brackets.id(含 competition_id+season_id)；首轮 round_name="1/8决赛" type_id=10。
- 常规赛 30 队 won+lost 均为 82，赛季已完结，"锁定季后赛"等价于"进入季后赛"，由最终榜 + 对阵图双重验证。
