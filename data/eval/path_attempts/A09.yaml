            (c) 需调 get_match_tlive 逐场拿实时进度，无批量接口。
    3. 实时进度 ✅ 已解 — get_match_tlive 能拿文字直播（佐证在玩），
       get_match_incidents 对部分比赛 DATA_MISSING。
