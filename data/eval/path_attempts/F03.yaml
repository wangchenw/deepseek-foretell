blocking_gap:
  type: implementation_gap
  description: F03 "变动最大"核心路径 = 按 date 拉当日批次 + 逐场拉赔率走势 + 计算变动幅度排序。 足球分支完全可用:get_schedule_by_date(date,tier=all)
    → 逐场 get_odds_trend(match_id) → 返回 points 时序(含 odds+changed_at)→ LLM 算变动幅度 → 排序。已实测
    match_id=4459717 返回 50 个变动点,home_win 4.8↔5.6 波动可量化。 篮球分支存在 implementation_gap:get_odds_trend
    工具硬编码 football_odds_europe_change_* 分区表,对篮球 match_id 一律返回 DATA_MISSING;而 DB 实存
    basketball_odds_europe_change_2026 等表且当日篮球有大量变动数据(match 3909024 = 2436 点)。即数据在库,工具未暴露篮球入口。
    另:无批量 odds_trend 入口,须逐场调用(当日足球 86 + 篮球 51 ≈ 137 场),路径效率偏低; tier=all 单次调用 count
    上限 100 且篮球欠采样,须 football + basketball 两次合并。
  failed_atomic: F03-T1-a1
  workaround: 足球:逐场 get_odds_trend 取 points,按 |max(odd)-min(odd)| 或 |首-末| 计算主/和/客
    变动幅度并排序。篮球:绕过 foretell 工具,SQL 直查 basketball_odds_europe_change_2026 (JOIN basketball_match
    按 match_time_str 过滤当日)取 odd1/odd2/odd3 时序同样计算。 批次:get_schedule_by_date(tier=all)
    + get_schedule_by_date(sport=basketball,tier=all) 合并。
