root_cause_analysis:
  tool: get_team_schedule
  bug: SQL_OPERATOR_PRECEDENCE
  description: |
    mysql_client.get_team_schedule 的 WHERE 子句为
      `WHERE m.home_team_id = %s OR m.away_team_id = %s`
    后续追加 `AND match_time > NOW() AND status_id NOT IN (8)`。
    由于 AND 优先级高于 OR，实际等价于
      `home_team_id = X OR (away_team_id = X AND match_time > NOW() AND status NOT IN (8))`
    即过滤条件只绑定到 away_team_id 分支，home_team_id 分支返回该队全部主场比赛（任意时间/状态）。
  impact:
    - 'direction=upcoming：返回所有主场比赛 ASC（2004 历史比赛在前），完全不是未来赛程'
    - 'direction=recent：返回所有主场比赛 DESC（2026-11 未来比赛在前），完全不是已结束比赛'
    - 'direction=all：无 AND 过滤，仅 ORDER BY，故结果正确'
  evidence:
    - 'upcoming 返回 2127781（match_time=1087056000=2004-06-13, status_id=8=finished），按 SQL 应被 match_time>NOW() AND status NOT IN(8) 排除，却仍出现'
    - '直查 `match_time > UNIX_TIMESTAMP(NOW()) AND status_id NOT IN (8)`（带括号）正确返回 4459727(2026-07-03) 等未来比赛'

false_negative_risk:
  exists: true
  severity: high
  description: |
    若 LLM 仅凭 get_team_schedule(direction=upcoming) 返回的 2004 已结束比赛判断「无未来比赛」，
    会得到「葡萄牙没有未来比赛」的假阴性，错过 2026-07-03 世界杯 vs 克罗地亚。
    但 X05 的 atomic a2 硬约束「direction upcoming→all fallback」正是为该 bug 设计的护栏：
    all fallback 正确返回未来赛程；a3 cross_validation (schedule_by_date) 二次确认明早无赛。
    三路并举后可安全断言「明早无葡萄牙世界杯比赛」，假阴性被补救。

