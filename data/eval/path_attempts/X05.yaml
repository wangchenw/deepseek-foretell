blocking_gap:
  type: implementation_gap
  description: |
    get_team_schedule 的 direction=upcoming/recent 因 WHERE 子句 `home_team_id=X OR away_team_id=X`
    未加括号，导致后续 AND 过滤条件仅绑定到 away 分支，返回错误数据。
    修复建议（不在本次探路范围）：将 WHERE 改为 `(m.home_team_id = %s OR m.away_team_id = %s)`。
    该 gap 不阻断 X05 路由（all fallback + cross_validation 已补救），但对 A08/A17 等依赖
    upcoming 的场景会产生误导，建议优先修复。
  failed_atomic: null
  blocking_route: false

