scenario_note: >
  粤语意图场景：用户用粤语式译名“町田泽维 VS 青年国民”请求胜负走向分析。
  X 场景（边界护栏类），atomic 含 resolve_entity(match) + synthesize_answer +
  apply_guardrails。重点验证：粤语/非规范译名下的实体消歧正确性、假阴性风险、
  护栏（不输出中间态）。Phase 2 工具层重构后实调验证。
ambiguity_finding: >
  关键发现：resolve_team 单独调用会落入歧义陷阱——“町田泽维”首候选是
  “町田泽维亚青年队”(team_id=21873) 而非一线队；“青年国民”首候选是
  “迪拜青年国民”(team_id=16201) 但同 name 下还有 U21/U19/U23 梯队。
  但 resolve_match 内部消歧逻辑正确：从“町田泽维”选一线队“町田泽维亚”(25413)、
  从“青年国民”选“迪拜青年国民”(16201)，并定位到唯一对阵 match_id=4532864
  （2026-04-22 亚精英赛，中立场，已完场）。结论：对模糊/粤语译名对阵，
  应优先走 resolve_match 而非分两步 resolve_team，避免梯队误选。
