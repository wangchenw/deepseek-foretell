  sample: get_match_lineup(match_id=4483087) → DATA_MISSING
  envelope:
    code: DATA_MISSING
    dimension: match_lineup
    data:
      match_id: 4483087
    match_id: 4483087
    meta:
      source: crazy_sports_db
      freshness: '2026-06-28T23:54:19Z'
  assessment: 'DATA_MISSING envelope 四要素齐全：code（机器可判）、dimension（人类可读维度名）、

    data（回显请求参数）、meta.source/freshness（来源与新鲜度）。LLM 据此可明确区分

    "工具未实现" vs "DB 无此维度数据" vs "实体不存在"，且 dimension 字段直接给出

    用户友好的缺失维度标识（match_lineup / intel_tags / recommendations 等），

    无需 LLM 推断。工具层信号传递完整，无 implementation_gap。

    '
