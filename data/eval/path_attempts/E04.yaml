blocking_gap:
  type: routing_gap
  description: resolve_match 无法用竞彩 lottery 简称（布鲁马波/吉维森特）定位 football_match，因
    football_team.name_zh 使用全名（布洛马波卡纳/吉尔维森特），简称与全名不一致导致 ENTITY_NOT_FOUND；带
    date 或去 date 均失败。get_lottery_schedule 返回的 match_id 全为 null（lottery_match 表已知特性）。
    需 SQL 模糊匹配 football_team.name_zh → team_id → football_match 回查。workaround 已验证可打通，不阻断
    LLM eval。
  failed_atomic: E04-T1-a1
  workaround: SQL `football_team.name_zh LIKE '%关键字%'` 定位 team_id，再 `football_match WHERE
    home_team_id=? AND away_team_id=? ORDER BY match_time DESC` 命中 match_id
