blocking_gap:
  type: implementation_gap
  description: |
    resolve_match 工具层 series_game 反转 bug 已修复（entity.py 不再 `if series_game is not None:
    return []`，而是透传到 client 并在无候选时返回 NOT_APPLICABLE + 守轨提示），修复有效。
    但底层 mysql_client.resolve_match 仅查询 football_match 表，不支持 basketball_match；
    且 series_game 参数虽在签名中接受，SQL 过滤条件完全未使用该参数（即使足球也不会按 G7 过滤）。
    因此 B09 (NBA 篮球 G7) 路径无法通过 resolve_match 定位 G7 match_id。可经 get_series_matchup
    证实 7 场系列赛存在（matchup 922432，3-4 马刺胜），但 match_ids 数组仅 5 个 id 缺失 2 场，
    无法精确锁定 G7 的 match_id。
  failed_atomic: B09-T0-a1
route_complete: false
phase2_fix_verified:
  series_game_inversion_bug: true
  evidence: entity.py 当前实现将 series_game 透传至 client.resolve_match，无候选时按 series_game
    分支返回 NOT_APPLICABLE + "禁止降级分析其他场次" 守轨提示，符合 B09-T0-a5 hard_constraint。
verdict: ⚠️
verdict_reason: 修复方向正确且守轨行为已生效，但 resolve_match 尚未支持篮球 + series_game
  SQL 未用作过滤，G7 match_id 仍无法定位。建议 Phase 3 扩展 resolve_match 支持 basketball_match
  并将 series_game 纳入 SQL 过滤（或新增 resolve_basketball_series_match 工具）。
