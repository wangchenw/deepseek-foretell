  (1) turn1-3：5 场全量分析(大小球/比分/盘口/伤停/战意/积分排名/交锋/主客胜率/战术)；
  (2) turn4-5：钻取 001 场，主队主场让 0.25 是否合理，首回合大小球开盘对比，比赛意义+战术调整；
  (3) turn6-7：质疑数据来源单一(疯狂体育) + 要求多渠道工具核查；
  (4) turn8-10：001 客队 3-0 打穿，复盘为何分析全错，临场盘口变化；
  (5) turn11-13：用户 frustration"你究竟在干嘛"，要求下次工具核查，关键点(主队利好升盘)没分析；
  (6) turn14-15：放弃 001，改分析 002-005 这 4 场，同样全方位；
  (7) turn16-17：002-005 重新调用工具核查最新信息+预测。
  隐含需求：
  - "001-005"=竞彩场次编号，需用 resolve_lottery_match(play_type=101, code=周六067..)定位；
  - 用户对"调用工具核查"的执念=对 LLM 凭空分析的强烈不信任，须每项数据都真实调工具；
  - 积分排名是 turn3 明确点名"双方战意联赛积分排名核查"——对应 get_standings；
  - 伤停/战意/盘口走势/积分排名是用户反复追问而工具普遍 DATA_MISSING 的痛点。
  DB 基准：6/28 竞彩 5 场为世界杯场(周六067 克罗地亚vs加纳、068 巴拿马vs英格兰、069 哥伦比亚vs葡萄牙、070 刚果金vs乌兹别克...)；
  意甲(108)最新赛季 14222 全 0 分(未开赛)，get_standings 返回多赛季合并全部 position=1(bug)。
