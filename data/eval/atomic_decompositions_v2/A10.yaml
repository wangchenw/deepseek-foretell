user_intent_analysis: |
  本案 type_name=积分榜，但实际是 17 轮竞彩足球深度预测分析会话。用户高频重复"调用工具核查，不要自己想"，
  要求对竞彩 001-005 共 5 场做全方位分析：大小球方向、比分预测、盘口合理性、初盘→即时盘水位变化、
  伤停核实、战意、联赛积分排名、主客场胜率、历史交锋、战术调整、杯赛轮休、临场盘口变化、赛果复盘。
