user_intent_analysis: |
  本案 16 轮对话的主线是用户要求「模拟赛前 12 小时视角」对 5/17 当日多场比赛做深度前瞻分析,
  并反复强调「不要反推结果」「数据用赛前 12 小时数据」「必须用工具查询真实有效的数据并给出来源,
  不得虚构」。A13「历史交锋:两队历史对战」语义对应的输入维度是用户在 turn 0/2/3/10/13 等
  反复列出的「历史交锋记录:最近3-5次直接交手,是否呈现明显的风格克制或比分规律」,
  以及 turn 0/7/9/10/11 五轮分别点名 5 对球队要求赛前分析(隐含需取 h2h 作为分析输入):
    turn 0:  5/17 福伦丹 vs 特尔斯达
    turn 7:  5/17 科莫 vs 帕尔马
    turn 9:  5/17 全北现代 vs 金泉尚武
    turn 10: 5/17 川崎前锋 vs 町田泽维
    turn 11: 5/17 富川FC vs 浦项制铁
    turn 13: 5/17 川崎前锋 vs 町田泽维(重复,带强制闭环检查)
  隐含需求:
    (1) 每对球队须取最近 3-5 次直接交锋的真实记录(日期/比分/主客),用于「风格克制/比分规律」归纳;
    (2) 数据须真实可溯源(用户明确「不得虚构」「必须用工具查询」),expected_behaviors「数据不足时诚实说明」;
    (3) 5/17 当日那场属「赛前视角」,h2h 须排除该场之后的所有比赛(不得反推),仅取该场之前的交锋;
    (4) 球队名消歧须精准:町田泽维→町田泽维亚(J1,非青年队/U18/室内五人制),
        浦项制铁→浦项铁人(K1 一线队,非后备队/U18),富川FC→Bucheon FC 1995(K2,非富川SK/U18/后备);
    (5) 不暴露内部 match_id/team_id,用球队名+日期+比分呈现;
    (6) 多场重复追问(turn 13 川崎vs町田)须继承前轮上下文,不重复取数但需复用 h2h 结果。
  对话发生时点视为 2026-05-17 前(session 28066650,5/17 当日)。
