hard_constraints:
  - "5 对球队 h2h 全覆盖:福伦丹vs特尔斯达/科莫vs帕尔马/全北vs金泉/川崎vs町田/富川FCvs浦项铁人,一个不得漏"
  - "赛前视角:h2h 须排除 5/17 当日场及之后的比赛,仅取 5/17 之前的交锋(用户明确「不要反推」「赛前12小时数据」)"
  - "数据真实可溯源,禁止虚构(用户明确「必须用工具查询真实有效的数据并给出来源,不得虚构」+ expected_behaviors)"
  - "球队名消歧须精准:町田泽维→町田泽维亚(25413,非室内/青年/U18);浦项制铁→浦项铁人(10417,非后备队 30019/U18 31800);富川FC→20060(非富川SK 10272)"
  - "resolve_team('浦项制铁') 仅返回青年/后备队时,须降级「浦项铁人」或 SQL 兜底,不得误选后备队导致假阴性"
  - "不暴露内部 match_id/team_id,用球队名+日期+比分呈现"
  - "多轮重复追问(turn 13 川崎vs町田)须继承前轮 team_id 与 h2h 结果,不重复取数"
  - "h2h 工具返回的 scores 数组须正确解析(索引0=常规比分/索引1=半场比分),不得误读为红牌/角球"
  - "不调用 internet_search 兜底 h2h;discover_via_search 标记 skipped"
risk_notes: |
  最可能在 aq_9/aq_10(富川FCvs浦项制铁)环节出问题。
  核心怀疑点:
  (1) resolve_team('浦项制铁') 别名表仅命中青年/后备队(30019/31800/82260),一线队「浦项铁人」(10417)
      不在候选中——若 LLM 误选 30019,get_h2h(20060, 30019) 会返回 DATA_MISSING 假阴性,
      而 DB 实际有 4 场富川FCvs浦项铁人交锋(2016 韩国杯 + 2026 三场 K1)。这是 P1 data_gap 导致假阴性。
  (2) get_h2h 返回的 scores 是数组 [比分, 半场比分, 红牌, 黄牌, 角球, 加时, 点球],
      LLM 须取索引 0 作为常规比分,误读会出错。
  (3) get_h2h 暴露 match_id/home_team_id/away_team_id 内部 ID,须 LLM 层剥离。
  (4) get_h2h 不返回 competition_name 与球队名(仅 ID),需 LLM 层 JOIN 名称或额外调 resolve_team 反查。
  (5) 「町田泽维」用户简称,resolve_team 须映射到町田泽维亚(25413),排除同名室内/青年/U18。
  Agent 2 应优先 SQL 直查 football_match(home/away team_id 双向 + match_time < 5/17)建立基准,
  再调 get_h2h 对照,确认别名误路由导致的假阴性。
