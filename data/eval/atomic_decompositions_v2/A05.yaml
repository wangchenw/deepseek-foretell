type_id: "A05"
case_id: "TC-A05-001"
user_intent_analysis: |
  本案 taxonomy 标注为「实时比分查询」，但 16 轮对话的真实意图是「多场赛事深度赛前/临场分析」：
  用户围绕 5/16 三场比赛（浦和红钻 vs 东京FC、大田市民 vs 首尔FC、横滨水手 vs 柏太阳神），
  反复要求按 8 大视角（基本面/战术对位/进程推演/市场热度/矛盾点/直觉结论/动态校准/风险量化）
  做有逻辑递进的篇章式深度分析，并明确强制「所有数据必须用工具查询真实有效、列明来源」、
  「禁止双向推荐」「禁止用数据不足掩盖分析责任」。
  对话中用户多次追问首发阵容（turn5「现在不能确认首发阵容吗」、turn11「首发不是出了吗」、
  turn16「先确认首发阵容然后分析」）、场均进失球/xG/xGA（turn3/4/6/7/16）、
  赔率走势（turn1 视角4、turn8）、半全场/比分概率（turn9-15），属高密度数据需求。
  隐含需求：
  (1) 实体命名容错——用户写「东京FC/首尔FC」，DB 实际存「FC东京/FC首尔」，须能消歧或反向匹配；
  (2) 数据缺失诚实说明——首发/伤停/赛季统计/情报/赔率走势大面积 DATA_MISSING 时，
      须按 expected_behaviors「数据不足时诚实说明」逐项声明不可得，并用 recent_form/h2h/odds_snapshot
      兜底，不得编造首发/xG/伤停；
  (3) 归纳优先于罗列——8 视角须合成为连贯篇章而非序号化清单；
  (4) 不暴露内部 ID/工具名/中间态；不输出「主不败+客不败」双向推荐；
  (5) 多轮上下文：3 场比赛 + 防坑校准模式（turn2/turn8）+ 临场追问（turn9-15）须继承，
      不得每轮重置已确认实体与赛果。
  对话发生时点视为 5/16 赛前（反馈记录时点），但评估 DB 中三场均 status_id=8 已完场，
  故 fetch_result 在评估时点可取到赛果（浦和0-0点球9-10、大田1-2、横滨0-1），
  答案须以「评估时点可得的真实赛果」为基准，不编造临场未赛比分。
turns:
  - turn: 1
    user_text: "作为资深足球分析师深度剖析 5/16 浦和红钻 vs 东京FC，查找双方首发阵容，8 大视角推演，数据须工具查询真实有效并列明来源，禁止双向推荐与序号化标题"
    atomics:
      - id: aq_1
        category: resolve_entity
        target: {pairs: ["浦和红钻→10298", "东京FC→?（用户语序，DB 存 FC东京=10061）", "首尔FC→?（DB 存 FC首尔=10305）", "大田市民→10438", "横滨水手→10336", "柏太阳神→10380"], national: false, prefer: men_club_first_team}
        success_criteria: "返回唯一确定的 team_id，排除梯队/青年队/女足/B队；用户语序「东京FC/首尔FC」须能解析到 FC东京/FC首尔，不得 ENTITY_NOT_FOUND 后放弃"
        depends_on: []
      - id: aq_2
        category: fetch_schedule
        target: {matches: ["5/16 浦和vs东京", "5/16 大田vs首尔", "5/16 横滨vs柏"], method: resolve_match or SQL 直查 football_match}
        success_criteria: "定位 3 个 match_id（预期 4470724/4480359/4470725），含主客/赛事/时间/状态；用户语序 away=东京FC 不得导致漏定位"
        depends_on: [aq_1]
      - id: aq_3
        category: fetch_intel
        target: {match_ids: [4470724,4480359,4470725], tool: get_match_lineup}
        success_criteria: "返回双方首发 11 人；若 DATA_MISSING 须诚实声明「首发阵容未采集」并说明 coverage_lineup=1 但工具取不到，不得编造首发"
        depends_on: [aq_2]
      - id: aq_4
        category: fetch_intel
        target: {match_ids: [4470724,4480359,4470725], tool: get_injury_report}
        success_criteria: "返回伤停/停赛名单；若 DATA_MISSING 须诚实声明「伤停报告未采集」，不得编造伤情"
