      - id: aq_5
        category: fetch_odds_snapshot
        target: {match_ids: [4470724,4480359,4470725], tools: [get_odds_snapshot, get_odds_trend]}
        success_criteria: "返回欧赔/亚盘快照（OK）；赔率走势若 DATA_MISSING 须诚实声明，不得编造走势"
        depends_on: [aq_2]
      - id: aq_6
        category: fetch_stats
        target: {team_ids: [10298,10061,10438,10305,10336,10380], tool: get_team_season_stats, fallback: get_recent_form + SQL 聚合}
        success_criteria: "返回主场/客场场均进失球、xG/xGA；若 season_stats DATA_MISSING 须用 recent_form 兜底给出近 5-10 场具体进失球序列，并诚实声明「赛季统计未采集，以下为近期序列供估算波动性」"
        depends_on: [aq_1]
      - id: aq_7
        category: fetch_stats
        target: {team_ids: [10298,10061,10438,10305,10336,10380], tool: get_recent_form, venue: home/away, n: 10}
        success_criteria: "返回近 5-10 场比分序列与胜负平走势，用于状态/势头校准"
        depends_on: [aq_1]
      - id: aq_8
        category: fetch_stats
        target: {pairs: ["浦和-东京", "大田-首尔", "横滨-柏"], tool: get_h2h, n: 5}
        success_criteria: "返回近 3-5 次直接交手比分，判断风格克制/大小球规律；scores 数组须正确解读为半场/全场/角球/点球"
        depends_on: [aq_1]
  - turn: 2
    user_text: "防坑校准模式：忽略高可信常规数据，重点二次推演低可信/延迟风险项与逻辑矛盾，给出最简操作建议，禁止双向推荐"
    atomics:
      - id: aq_9
        category: maintain_context
        target: {inherit_from_turn: 1, inherit: 3场比赛实体+已有数据缺口, mode: 防坑校准}
        success_criteria: "继承 turn1 的 3 场比赛与已确认的数据缺口（首发/伤停/统计 MISSING），不重置；对低可信项二次推演"
        depends_on: [aq_1, aq_2]
      - id: aq_10
        category: synthesize_answer
        target: {present: 矛盾点排查+盲区预警+最简操作建议, hide: 序号化标题/双向推荐/编造数据}
        success_criteria: "8 视角合成为连贯篇章，归纳优先于罗列；明确主推方向（胜/平/负/让球/大小球）+置信度+仓位建议；不输出「主不败+客不败」"
        depends_on: [aq_3, aq_4, aq_5, aq_6, aq_7, aq_8, aq_9]
  - turn: 3
    user_text: "浦和红钻和东京FC 基础进攻防守数据：主场/客场场均进失球+标准差、xG/xGA、近5-6场比分序列、伤停、战意、赛程体能、历史交锋克制"
    atomics:
      - id: aq_11
        category: maintain_context
        target: {inherit_from_turn: 1, refine: 浦和vs东京的细化数据维度}
        success_criteria: "继承 turn1 的浦和(10298)/东京(10061) team_id 与 5/16 match_id，叠加用户细化的 7 类数据维度"
        depends_on: [aq_1, aq_2]
  - turn: 4
    user_text: "大田市民和首尔FC 同 turn3 的细化数据维度"
    atomics:
      - id: aq_12
        category: maintain_context
        target: {inherit_from_turn: 1, refine: 大田vs首尔的细化数据维度}
        success_criteria: "继承 turn1 的大田(10438)/首尔(10305) team_id 与 5/16 match_id=4480359，叠加 7 类数据维度"
        depends_on: [aq_1, aq_2]
  - turn: 5
    user_text: "现在不能确认首发阵容吗"
    atomics:
      - id: aq_13
        category: fetch_intel
        target: {match_ids: [4470724,4480359,4470725], tool: get_match_lineup, user_frustration: true}
        success_criteria: "诚实回应首发不可得：coverage_lineup=1 但 get_match_lineup DATA_MISSING（implementation_gap），不得编造首发；须说明数据采集状态而非含糊其辞"
