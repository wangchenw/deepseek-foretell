  - turn: 6
    user_text: "横滨水手和柏太阳神 查询首发阵容 + 同 turn3 细化数据"
    atomics:
      - id: aq_14
        category: maintain_context
        target: {inherit_from_turn: 1, refine: 横滨vs柏的细化数据+首发}
        success_criteria: "继承 turn1 的横滨(10336)/柏(10380) team_id 与 5/16 match_id=4470725；首发同 aq_13 诚实声明缺失"
        depends_on: [aq_1, aq_2, aq_3]
  - turn: 7
    user_text: "大田市民和首尔FC 用工具查询首发阵容 + 同 turn3 细化数据"
    atomics:
      - id: aq_15
        category: maintain_context
        target: {inherit_from_turn: 4, refine: 大田vs首尔+首发}
        success_criteria: "继承 turn4 的大田/首尔上下文；首发同 aq_13 诚实声明缺失"
        depends_on: [aq_12, aq_3]
  - turn: 8
    user_text: "防坑校准模式（同 turn2）：二次推演低可信项+盲区预警+最简操作建议"
    atomics:
      - id: aq_16
