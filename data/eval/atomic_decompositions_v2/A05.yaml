        depends_on: [aq_10, aq_17, aq_18, aq_19, aq_22, aq_23, aq_24]
hard_constraints:
  - "实体命名容错：用户「东京FC/首尔FC」必须解析到 FC东京(10061)/FC首尔(10305)，不得 ENTITY_NOT_FOUND 后放弃或选错梯队"
  - "首发阵容缺失须诚实说明：get_match_lineup 三场均 DATA_MISSING，但 coverage_lineup=1（implementation_gap），须声明「工具未采集到首发」而非编造 11 人名单（expected_behaviors 数据不足诚实说明）"
  - "伤停/赛季统计/情报标签/赔率走势缺失须逐项诚实说明，不得编造伤情/xG/xGA/走势（expected_behaviors）"
  - "场均进失球须用 recent_form 兜底（season_stats DATA_MISSING），给出近 5-10 场具体序列并标注「非赛季统计」"
  - "归纳优先于罗列：8 视角须合成为连贯篇章，禁止「模块一/步骤二」序号化标题（expected_behaviors）"
  - "禁止双向推荐：不得输出「主不败+客不败」，须给出明确主推方向+置信度+仓位建议（用户 turn1/turn2 明确禁止）"
  - "不暴露内部 ID：match_id/team_id/competition_id/coverage 字段/工具名不得出现在用户可见回答（expected_behaviors）"
  - "不输出中间态/推理过程外露（如「工具返回 DATA_MISSING」「接口延迟」）（expected_behaviors）"
  - "赛果须以评估时点真实数据为准：三场已完场（浦和0-0点球9-10、大田1-2、横滨0-1），不编造临场未赛比分"
  - "不调用 internet_search/Tavily；discover_via_search 标记 skipped"
  - "多轮上下文继承：turn2/turn8 防坑校准须继承前轮 3 场比赛与数据缺口；turn9-15 临场追问须继承对应 match_id"
risk_notes: |
  最可能在 aq_1（实体解析）、aq_3（首发）、aq_6（赛季统计）三个环节出问题。
  核心怀疑点：(1) resolve_team/resolve_match 对「东京FC/首尔FC」语序反转会 ENTITY_NOT_FOUND，
  导致后续整条分析链断掉（routing_gap，P1）；
  (2) get_match_lineup 三场 DATA_MISSING 但 coverage_lineup=1，用户 turn5/turn11/turn16
  反复追问首发，Foretell 若编造首发会严重违反 expected_behaviors（implementation_gap+造假风险，P1）；
  (3) get_team_season_stats DATA_MISSING，用户 turn3/4/6/7/16 明确要场均进失球+xG，
  Foretell 若编造 xG 会严重违反 expected_behaviors（data_gap，P1）；
  (4) get_team_schedule(direction=upcoming) 语义反转返回 2004 历史升序（P0 bug 复现），
  若 Foretell 用 upcoming 查「下一场」会得到错误赛程（tool_logic_gap，P1）；
  (5) 16 轮多 match 上下文继承无原生 checkpointer，依赖 LLM 层显式串接（context_gap，P2）。
  Agent 2 应优先 SQL 直查 football_match（home/away team_id + match_time_str 5/16）建立 3 场基准，
  再用 resolve_team/resolve_match（正确语序 FC东京/FC首尔）对照验证 routing_gap。
