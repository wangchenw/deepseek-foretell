        target: {inherit_from_turn: 2, scope: 当前3场比赛}
        success_criteria: "继承 turn2 防坑校准框架，应用到当前 3 场；不重置已确认缺口"
        depends_on: [aq_9, aq_10]
  - turn: 9
    user_text: "为什么首选是1-2不是0:2"
    atomics:
      - id: aq_17
