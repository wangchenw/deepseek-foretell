type_id: "A09"
case_id: "TC-A09-001"
user_intent_analysis: |
  用户在滚球盘（live 走地）场景中，9 轮对话围绕同一目标：在"现在进行中"的比赛里找适合买大球的场次，
  并对邓多克、尤文图斯两场具体比分与盘口做实时跟踪。意图分段：
  (1) turn1-2：先要"接下来哪几场比较好买大"→收窄到"现在进行中的比赛"；
  (2) turn3-4：钻取邓多克"现在几比几 + 开什么盘口"，并质疑开球时间 16 点"早踢完了"为何还算在玩；
  (3) turn5-6：重申要现在进行中的比赛，并补充"邓多克和尤文图斯都进球了"——意味着用户同时在追两场在玩比赛；
  (4) turn7-9：基于比分追问"还继续买大吗"+查看邓多克盘口赔率+"需要"确认。
  隐含需求：
  - "现在进行中"=比赛状态 status_id ∈ {2,3,4,5,7}（上半场/中场/下半场/加时/点球），非"今日全部"；
  - "几比几"=实时比分（live score），不是完场复盘；当前 DB 快照"现在"约 2026-06-28 22:00，有 20+ 场 status_id=2 在玩；
  - "开球时间 16 点"与库内邓多克 6/27 场 match_time_beijing=02:45 不一致，存在时区/显示口径冲突，须核对而非附和；
  - "还继续买大吗"=投注建议，属预期管理范畴，须诚实说明工具不提供赛果预测、不得包赚承诺；
  - 邓多克 vs 尤文图斯是两场独立比赛（非同一对阵），turn6"都进球了"指两场各自有进球。
  DB 基准：邓多克 team_id=10484（爱超 228），其最近一场 6/27 02:45 邓多克 2-3 沃特福德联队（status_id=8 已完场）；
  尤文图斯 team_id=10467（意甲 108），近期无在玩/已完场，下一场为 2027-02-15 那不勒斯（status=not_started）。
  快照"现在"=6/28 22:00，二者均不在玩——本案的"现在进行中"在快照内无法对应到邓多克/尤文图斯，
  须以 expected_behaviors"数据不足时诚实说明"兜底，不得编造比分。
turns:
  - turn: 1
    user_text: "滚球盘中 想买大球 接下来哪几场比较好"
    atomics:
      - id: aq_1
        category: refine_time_window
        target: {context: 滚球盘(live走地), phrase: 接下来, scope: "在玩(status_id∈{2,3,4,5,7}) + 即将开赛(1~2小时内)"}
        success_criteria: "识别滚球盘=走地实时语境；『接下来』=当下在玩+临近开赛，非历史/非全部赛程；时间窗锚定 DB 快照 now(2026-06-28 22:00 北京)"
        depends_on: []
      - id: aq_2
        category: fetch_schedule
        target: {filter: status_id IN (2,3,4,5,7), order: match_time, bias: 大球倾向}
        success_criteria: "返回当前在玩比赛列表（含主客/赛事/实时状态/当前比分/盘口倾向）；若工具无 status 过滤，须穷尽 SQL 基准+get_schedule_by_date+get_lottery_schedule 交叉验证后再答，不得直接罗列今日全量"
        depends_on: [aq_1]
      - id: aq_3
        category: synthesize_answer
        target: {present: 归纳出适合买大的几场, basis: 攻防/盘口大球水位, hide: 内部编号}
        success_criteria: "归纳优先于罗列：从在玩场次中筛 3-5 场大球倾向高的，给出依据而非全量堆砌；不输出包赚承诺"
        depends_on: [aq_2]
  - turn: 2
    user_text: "现在进行中的比赛"
    atomics:
      - id: aq_4
        category: maintain_context
        target: {inherit_from_turn: 1, inherit: 大球意图, narrow: status=in_progress}
        success_criteria: "继承 turn1 的大球意图，将范围从『接下来』收窄到『现在进行中(status_id∈{2,3,4,5,7})』；不重置意图"
        depends_on: [aq_1]
      - id: aq_5
        category: fetch_schedule
        target: {filter: status_id IN (2,3,4,5,7), require: 实时比分+当前分钟}
        success_criteria: "返回且仅返回在玩比赛；每场含当前比分、当前比赛阶段(上/中/下)、开球时间；无 status 过滤工具时须穷尽 SQL 直查并诚实标注数据口径"
        depends_on: [aq_4]
  - turn: 3
    user_text: "邓多克现在几比几 开什么盘口"
    atomics:
      - id: aq_6
        category: resolve_entity
        target: {team: 邓多克, expected_team_id: 10484, exclude: U19(35298)/U20(82458)}
        success_criteria: "返回唯一 team_id=10484（爱超邓多克一线队），排除 U19/U20 梯队；national=0 俱乐部"
        depends_on: []
      - id: aq_7
        category: fetch_result
        target: {team_id_from: aq_6, kind: live_score, require: 当前比分+比赛阶段+开球时间}
        success_criteria: "返回邓多克当前在玩场的实时比分；若其在快照内无在玩场（6/27 场已完场 2-3），须诚实说明『当前无在玩，最近一场已完场 2-3』，不得编造实时比分"
        depends_on: [aq_6]
      - id: aq_8
        category: fetch_odds_snapshot
        target: {match_id_from: aq_7, require: 欧赔+亚盘+大小球}
        success_criteria: "返回邓多克对应场的盘口快照（欧赔/亚盘/大小球水位）；若在玩则走地盘，若已完场则终盘"
        depends_on: [aq_7]
  - turn: 4
    user_text: "开球时间16点 那不是早踢完了吗"
    atomics:
      - id: aq_9
        category: refine_time_window
        target: {reconcile: 用户口述16点 vs 库内 match_time_beijing=02:45, status: 在玩?}
        success_criteria: "核对开球时间口径：库内邓多克 6/27 场 match_time_beijing=02:45（北京），status_id=8 已完场；用户『16点』与库不一致，须向用户澄清时区/显示口径而非附和；不得把已完场说成在玩"
        depends_on: [aq_7]
      - id: aq_10
        category: maintain_context
        target: {inherit_from_turn: 3, keep: 邓多克 team_id, keep: 在玩过滤}
        success_criteria: "继承 turn3 的邓多克 team_id 与在玩语境；不因用户质疑时间而重置实体"
        depends_on: [aq_6]
  - turn: 5
    user_text: "我要现在进行中的比赛"
    atomics:
      - id: aq_11
        category: maintain_context
        target: {inherit_from_turn: 2, reaffirm: status=in_progress}
        success_criteria: "用户重申要现在进行中的比赛；继承 turn2 在玩过滤，不退化成今日全量"
        depends_on: [aq_4]
  - turn: 6
    user_text: "邓多克和尤文图斯都进球了"
    atomics:
      - id: aq_12
        category: resolve_entity
        target: {team: 尤文图斯, expected_team_id: 10467, exclude: 尤文图斯U17/U19/U20/女足/SC/SP/RJ/马纳瓜等}
        success_criteria: "返回唯一 team_id=10467（意甲尤文图斯一线队）；从 10+ 个尤文图斯同名候选中按意甲+一线队消歧"
        depends_on: []
      - id: aq_13
        category: fetch_result
        target: {teams: [邓多克(10484), 尤文图斯(10467)], kind: live_score, require: 两场各自当前比分}
        success_criteria: "返回两场各自实时比分；快照内邓多克 6/27 已完场 2-3、尤文图斯无在玩场——须诚实说明『当前两场均不在玩，无法提供实时比分』，不得编造『都进球了』的即时比分"
        depends_on: [aq_6, aq_12]
  - turn: 7
    user_text: "还继续买大吗"
    atomics:
      - id: aq_14
        category: synthesize_answer
        target: {present: 投注建议+风险提示, basis: 当前比分+盘口走势, guardrail: 不包赚}
        success_criteria: "基于已知比分与盘口给出倾向性建议（如『当前 X-Y，大球需再进 N 球，水位 Z』），并明确『赛果不可预测，建议仅供参考』；不得承诺必中/包赚"
        depends_on: [aq_13]
      - id: aq_15
        category: apply_guardrails
        target: {check: no_prediction_guarantee, no_internal_id, no_intermediate_state}
        success_criteria: "终态无包赚承诺、无内部编号、无中间态；数据不足时诚实说明"
        depends_on: [aq_14]
  - turn: 8
    user_text: "查看邓多克盘口赔率"
    atomics:
      - id: aq_16
        category: fetch_odds_snapshot
        target: {team_id_from: aq_6, require: 欧赔+亚盘+大小球完整盘口}
        success_criteria: "返回邓多克对应场盘口快照；含欧赔三项/亚盘让球/大小球水位；不暴露 company_id 内部编号"
        depends_on: [aq_6]
  - turn: 9
    user_text: "需要"
    atomics:
      - id: aq_17
        category: maintain_context
        target: {inherit_from_turn: 8, confirm: 继续提供邓多克盘口/在玩跟踪}
        success_criteria: "确认用户『需要』=继续提供邓多克盘口与在玩跟踪；不重置上下文"
        depends_on: [aq_16]
hard_constraints:
  - "数据不足时诚实说明（expected_behaviors）：DB 快照内邓多克 6/27 已完场、尤文图斯无在玩场时，必须明说『当前无在玩实时比分』，不得编造『都进球了』的即时比分"
  - "归纳优先于罗列（expected_behaviors）：aq_3 推荐大球场次须从在玩列表中归纳筛 3-5 场并给依据，禁止全量堆砌"
  - "意图对齐（expected_behaviors）：滚球盘+买大球语境须聚焦在玩/临近开赛+大球倾向，不答非所问地讲历史战绩"
  - "『现在进行中』=status_id∈{2,3,4,5,7}；get_schedule_by_date 默认返回 100 条全已完场/推迟、不含在玩场，禁止当作在玩列表"
  - "实时比分须用支持在玩的工具；get_match_result 对在玩场返回 NOT_APPLICABLE，get_team_schedule 不返回比分字段——禁止用二者拼凑『现在几比几』"
  - "get_team_schedule(direction=upcoming) 当前有 P0 语义反转 bug（返回 2005 历史升序），禁止用于『接下来哪几场』"
  - "多轮上下文继承：turn2/turn5 继承在玩过滤；turn6 同时追踪邓多克+尤文图斯两场；turn8 继承邓多克 team_id"
  - "不暴露内部编号：match_id/team_id/league_id/company_id/lottery_code 不得出现在用户可见回答"
  - "投注建议须加风险提示，不得包赚/必中承诺（aq_14/aq_15 守门）"
  - "不调用 internet_search；discover_via_search 标记 skipped+note"
risk_notes: |
  最可能在 aq_2/aq_5/aq_7/aq_13 出问题，对应 expected_behaviors"数据不足时诚实说明"。
  核心怀疑点：(1) 无"按 status 过滤的在玩比赛列表"工具——get_schedule_by_date 默认 cap 100 且本轮返回全 finished/postponed，
  在玩场（22:00 status_id=2）被截断不返回；get_lottery_schedule 是可售场次非在玩；无原生 live 列表工具。
  (2) 无"实时比分"工具——get_match_result 对在玩场显式 NOT_APPLICABLE，get_team_schedule 不返回比分字段，
  若 LLM 强行用 get_team_schedule+status 字段拼凑会得到无比分的在玩列表，再用 get_match_result 拿不到比分→假阴性或编造。
  (3) aq_9 开球时间冲突：用户说 16 点、库内 02:45 北京、status=已完场——LLM 若附和用户"早踢完了"会与"现在进行中"自相矛盾。
  (4) aq_14 投注建议是合规高风险点，LLM 易给"继续买大必中"类承诺。
  (5) P0 get_team_schedule(direction=upcoming) bug 在邓多克上复现（返回 2005 历史升序），aq_2 若走 upcoming 路径会漏判在玩/即将场。
  Agent 2 应优先 SQL 直查 football_match WHERE status_id IN (2,3,4,5,7) 建立在玩基准，再用工具对照。
