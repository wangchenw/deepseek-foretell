recommended_answer_path: |
  生产层推荐路径(foretell 原生为主,SQL 补充北单 match 对齐):
  1. 竞彩期号定位:LLM 把「20260402」转「260402」→ get_lottery_schedule(101, period=260402) 取全期号 3 场跨日;
  2. 竞彩单场定位:LLM 推断「周X001」前缀(由 date weekday 决定)→ resolve_lottery_match(101, 周X001, date) 取 home_name/away_name/odds + match_candidates(含 match_id);
  3. 北单单场定位:resolve_lottery_match(301, code=NN, date) 取 home_name/away_name/odds(JSON 字符串);match_id 须 SQL 按 home_name+away_name+date 对齐(SELECT id FROM football_match m JOIN football_team h ON h.name_zh=home_name JOIN football_team a ON a.name_zh=away_name WHERE m.home_team_id=h.id AND m.away_team_id=a.id AND m.match_time_str LIKE date%);
  4. 赛果:get_match_result(match_id) 取 full_time/half_time/corner;
  5. 赔率:竞彩用 lottery_schedule odds.{spf,rq,bf,jq,bqc}(逗号分隔);北单用 odds JSON {sf3,goal,sf0,sf1};欧赔快照用 get_odds_snapshot 或 SQL football_odds_europe.first_odd;
  6. 近况/交锋/情报:get_recent_form/get_h2h(可用)+ football_intelligence(SQL);
  7. 十五维度分析:基于可查数据(赛果/赔率/近况/交锋/情报)做 15 维度分析;官方发布会/伤停/首发不可得须诚实说明,不编造;
  8. 输出:归纳优先于罗列,分段发送(支持 turn12-15「分段/继续」);不暴露 lottery_code(周四001/周一001等)/lottery_id/match_id/team_id/工具名;无双向推荐;输出中断须诚实说明并支持分段重发。
