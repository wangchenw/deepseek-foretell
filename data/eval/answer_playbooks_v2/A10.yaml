recommended_answer_path: |
  1. 竞彩定位:get_lottery_schedule(101, 2026-06-28) 拿 5 场(周六067-071),resolve_lottery_match 或 SQL 映射补 match_id(SQL 基准:4460934 哥伦比亚vs葡萄牙、4460937 巴拿马vs英格兰、4460978 克罗地亚vs加纳、4460985 刚果金vs乌兹别克)
  2. 逐场 get_odds_snapshot(match_id) 拿欧赔/亚盘/大小球盘口(输出剥离 company_id)
  3. 积分排名:SQL 直查 football_points_table JOIN _team WHERE competition_id=? AND season_id=(SELECT MAX(season_id)...) 兜底,禁用 get_standings 直接结果(多赛季合并 bug)
  4. 近期状态:get_recent_form(team_id, n=5) 拿近 5 场战绩
  5. 历史交锋:get_h2h(team_a, team_b, n=5) 拿交锋记录
  6. 诚实说明 DATA_MISSING 项:盘口走势/伤停/战意/主客胜率/阵容/凯利/必发/同赔历史均不可用,不编造
  7. 多渠道核实:诚实说明工具单源(crazy_sports_db),不假装多渠道
  8. 归纳优先于罗列:每场给核心结论(大小球倾向+比分区间+盘口合理性判断)+依据(基于可用数据)+『赛果不可预测,仅供参考』风险提示;不暴露 match_id/team_id/league_id/company_id/lottery_code
  9. 复盘(turn8-10):基于 get_match_result 赛果事实复盘,不编造内幕;临场盘口变化/主力出现 DATA_MISSING 时诚实说明
  10. frustration(turn11):诚实承认工具数据缺口导致分析受限,不辩解
