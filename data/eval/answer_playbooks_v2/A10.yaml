  - gap_type: "data_gap"
    detail: "深度分析工具普遍 DATA_MISSING:get_odds_trend/get_injury_report/get_intel_tags/get_match_lineup/get_kelly/get_betfair/get_same_odds_history(世界杯+英超双重验证)。用户核心需求(盘口走势/伤停/战意/主客胜率/阵容)无法满足"
    evidence_ref: "path_attempts_v2/A10.yaml step 7(8 项工具双重验证均 DATA_MISSING/stub)"
    priority: "P1"
    recommended_action: "P1 接入伤停/情报/盘口走势数据源或修复 stub;Skill 层强制 DATA_MISSING 项诚实说明『XX 数据不可用』,禁止编造伤停名单/战意标签/走势"
