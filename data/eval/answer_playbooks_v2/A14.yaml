recommended_answer_path: |
  对话时点锚定 2026-05-06(session 28164835),用户工作流要求「今日竟足赛事分析」。
  步骤 1:先调 get_lottery_schedule(play_type=101, date=今日) 取当日竞彩赛事 match_id 列表。
  步骤 2:对每个 match_id,SQL 查 coverage_lineup 确认是否有阵容:
    SELECT coverage_lineup FROM football_match WHERE id=?
  步骤 3(单场阵容,有阵容时):
    SELECT l.home_formation, l.away_formation, l.confirmed,
           ld.team_id, t.name_zh AS team, ld.first, ld.captain, ld.name, ld.shirt_number, ld.position, ld.rating
    FROM football_match_lineup l
    JOIN football_match_lineup_detail ld ON ld.lineup_id=l.id
    JOIN football_team t ON t.id=ld.team_id
    WHERE l.match_id=? AND l.confirmed=1
    ORDER BY ld.team_id, ld.first DESC, ld.shirt_number
    赛前场景用 confirmed=0(预计),复盘场景用 confirmed=1(正式)。
  步骤 4(球队大名单,用于伤停核心球员识别):
    SELECT p.name_zh AS player, s.position, s.shirt_number, s.is_captain
    FROM football_team_squad s
    JOIN football_player p ON p.id=s.player_id
    WHERE s.team_id=?
    ORDER BY s.position, s.shirt_number
  输出:双方首发阵型 + 11 首发(按 G/D/M/F 分组)+ 替补 + 队长标注 + 大名单核心球员。
  剥离 match_id/player_id/team_id/lineup_id,用球员名+球队名+位置呈现。
  foretell get_match_lineup 是 stub,须诚实声明「工具层阵容接口不可用,以下经数据库直查」。
  数据不足时(coverage_lineup=0)诚实说明「该比赛无阵容数据」,不编造。
