recommended_answer_path: |
  生产 Foretell 答题路径(数据层已验证可行):
  1. 用 SQL 直查或 resolve_lottery_match(play_type=101, code=周六014-017, issue=今日周六)定位
     4 场德甲 match_id(本案例=4347600/4347613/4347663/4347640);
  2. 对每场执行:
     (a) football_match_lineup + _detail(WHERE match_id=? AND confirmed=1 AND first=1)
         取 22 首发球员 + 阵型 + 队长;
     (b) football_odds_europe/asian 取赔率快照;由赔率反推凯利指数;
     (c) get_h2h 或 SQL 历史对战;
     (d) get_recent_form 或 SQL 近 N 场战绩;
     (e) football_team_injury SQL 取伤停;football_intelligence SQL 取情报;
  3. turn1:5 维度 × 4 场归纳输出(按场次组织,不扁平罗列);
  4. turn2:方法论补强清单(阵型变化/关键球员复出缺阵/位置调整/与赔率变动印证背离);
  5. turn3:重取 confirmed=1 正式阵容,与 turn1 对比补强;
  6. turn4「名单有误」:重取 lineup_id 对比;若 lineup_id 未变则诚实说明「未检测到阵容更新,
     当前数据为最近一次正式名单(lineup_id=xxx, confirmed=1)」,不编造不冒充;
  7. 全程不暴露 match_id/lineup_id/player_id/竞彩编号/工具名;归纳优先于罗列;
     缺失维度显式标注「当前不可得」。
