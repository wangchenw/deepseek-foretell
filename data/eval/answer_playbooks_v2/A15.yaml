path_assessment: |
  路径清晰且数据正确:
  1) 实体定位链路:lottery_match(play_type=101, issue=今日周六)→ match_id →
     football_match → home_team_id/away_team_id/competition_id(确认德甲)
  2) 阵容维度(核心):football_match_lineup.lineup_id JOIN football_match_lineup_detail,
     WHERE match_id=? AND confirmed=1 AND first=1,返回 22 首发球员 + home_formation/away_formation
  3) 5 维度全覆盖:
     - 赔率快照:football_odds_europe / football_odds_asian
     - 凯利:由 odds 反推(无独立表,LLM 层估算)
     - 阵容:football_match_lineup + _detail(confirmed=1)
     - 交锋:get_h2h(team_a, team_b) 或 SQL 直查历史 football_match
     - 近期状态:get_recent_form(team_id) 或 SQL 直查近 N 场 football_match
  4) 多轮场景:
     - turn1 5 维度批量预测 → SQL 路径全部可得
     - turn2 方法论补强 → LLM 层合成,无需新数据
     - turn3 正式阵容已公布 → lineup.confirmed=1 即真值,与 turn1 confirmed=0 区分清晰
     - turn4 名单有误重取 → lineup_id 字段可判断阵容版本;若底库未更新则同 lineup_id
       返回同一份(诚实说明「未检测到阵容更新」即合规)
  路径在数据库层完全成立,生产 Foretell 须用 SQL 路径或修复 stub 工具后方可答题。

