gaps:
  - gap_type: tool_logic_gap
    detail: "resolve_match 工具签名暴露 series_game 参数（entity.py 第 25 行 + 工具 docstring
      明确『G7 传 7』），但 mysql_client.py 第 320-321 行 `if series_game is not None: return []`
      直接返回空列表，根本不查 basketball_bracket_match_up / basketball_match。entity.py
      wrapper 在 series_game 非空且 candidates 空时返回 NOT_APPLICABLE + reason '未找到系列赛
      第N场，禁止降级分析其他场次'——这个 reason 行为符合 expected_behaviors 但掩盖了真正
      根因（DB 有数据，工具不查）。这是生产环境现在就在用的有问题的工具，优先级最高。"
    evidence_ref: "path_attempts_v2/B09.yaml aq_2 round 3：SQL 基准（basketball_match id=3921754
      G7 完整数据）vs 工具返回（NOT_APPLICABLE）"
    priority: P1
    recommended_action: "修复 mysql_client.resolve_match：当 series_game 非空时，应
      ① 查 basketball_bracket_match_up (home/away team_id + type_id=10) 找对阵；
      ② 从 match_ids varchar 字段解析第 series_game 个 match_id；
      ③ 去 basketball_match 查比赛详情返回。
      或拆分为 resolve_basketball_series_match 新工具。"
  - gap_type: implementation_gap
    detail: "篮球实体/赛程/交锋定位工具完全缺失：resolve_team 只查 football_team、
      resolve_match 只查 football_match + football_team、get_h2h 只查 football_match h2h。
      篮球需独立工具集（resolve_basketball_team / resolve_basketball_match /
      get_basketball_h2h / get_basketball_series_progress）查 basketball_team /
      basketball_match / basketball_bracket_match_up 表。"
    evidence_ref: "path_attempts_v2/B09.yaml aq_1 round 2（resolve_team 返回全 football 候选）、
      aq_2 round 3（resolve_match 无 series_game 也 ENTITY_NOT_FOUND）、aq_3 round 2
      （get_h2h DATA_MISSING）"
    priority: P1
    recommended_action: "新增篮球版工具集，复用现有 envelope/status_code 体系。
      优先级与 tool_logic_gap 同级，因 NBA 系列赛查询是常见场景。"
  - gap_type: data_gap
    detail: "球员级深度数据缺失：basketball_match 有 has_players 字段（0/1 标记是否有阵容数据）
      但 foretell 未暴露查询工具，无法做球员级别分析（个人得分/正负值/关键球员表现）。
      篮球赔率工具也缺失。"
    evidence_ref: "path_attempts_v2/B09.yaml aq_4 round 1：data_synthesis 标注『球员级别数据
      不足以分析』"
    priority: P3
    recommended_action: "若产品需要 NBA 深度分析能力，需新增篮球阵容/球员数据工具
      （basketball_match.has_players 字段已存在但未暴露）、篮球赔率工具。当前可作 P3 后置。"
