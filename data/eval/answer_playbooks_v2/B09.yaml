type_id: "B09"
case_id: "TC-B09-REG-006"
review_summary: |
  本 case 是篮球系列赛 G7 深度分析。探索智能体诊断扎实：用 SQL 基准独立证明 DB 里有完整 G7 数据
  （basketball_bracket_match_up id=922432 + basketball_match id=3921754，2026-05-31 08:00 北京时间，
  马刺 111:103 客场胜，系列赛 4:3），同时准确识别双重 tool gap：①resolve_match 接受 series_game
  参数但 mysql_client 第 320-321 行直接 return []（tool_logic_gap）；②resolve_team/resolve_match/
  get_h2h 全部只查 football_* 表，对篮球完全不适用（implementation_gap）。工具链行为符合
  expected_behaviors 两条约束（保留 G7、不降级 G6），但根因是工具不实现而非 DB 无数据。
requirement_analysis_review:
  completeness: "原子拆分完整：覆盖实体定位(aq_1)、G7 比赛定位(aq_2)、series 进程验证(aq_3)、
    综合分析(aq_4)、guardrail(aq_5) 五个环节。hard_constraints 显式引用 expected_behaviors 两条
    + 不暴露 ID + 篮球/足球表区分，预判风险（series_game 假支持、足球工具误用、basketball_match
    无 series_game 字段、降级风险）全部命中实际探索结果。"
  missed_needs: []
path_exploration_review:
  reasoning_quality: "每轮假设—执行—诊断—决策闭环清晰。aq_2 round 1 用 bracket_match_up +
    match_ids 数组反推 G7 是关键洞察（basketball_match 无 series_game 字段，series_game 信息
    只能在 bracket 表的 match_ids varchar 列表第 7 个元素里找到）。aq_3 用 JSON_EXTRACT 聚合
    7 场比分验证 3:3 是高质量 SQL。无机械重试。"
  sql_baseline_quality: "优秀。aq_1/aq_2/aq_3 三个核心原子查询全部独立写了 SQL 基准（不是
    只调工具就信），且 SQL 设计合理：①用 competition_id=1 消歧 NBA；②用 type_id=10 过滤
    7 局 4 胜制；③用 match_ids 数组长度=7 识别打满 G7 的对阵；④用 JSON_EXTRACT 计算每场
    4 节总分。SQL 基准与工具返回对照明确指出 tool_logic_gap / implementation_gap。"
  unexplored_alternatives:
    - "未尝试用 basketball_match.round_stage_id / round_group_num / round_round_num 直接
      定位季后赛 G7（可能 round_round_num=7 即第 7 场），可作为备选路径验证。但 bracket
      路径已成功，非必要。"
  gap_judgment_confidence: high
answer_playbook:
  summary: "篮球系列赛 G7 类问题：先用 SQL 查 basketball_bracket_match_up (type_id=10,
    home/away LIKE) 找对阵，从 match_ids 数组取第 N 个 match_id，再查 basketball_match 拿
    比赛详情；工具链当前不支持，必须 SQL 兜底。"
  steps:
    - "1. resolve_basketball_team 定位主客队（用 basketball_team.name_zh/short_name_zh LIKE
      + competition_id 过滤，NBA=1）"
    - "2. 查 basketball_bracket_match_up WHERE type_id=10 AND home/away team_id 匹配，
      取 match_ids 数组长度=series_game 的对阵"
    - "3. 从 match_ids 第 N 个元素取 G_N 的 match_id，查 basketball_match 拿时间/主客/状态/比分"
    - "4. 查 series 所有场次比分验证 series 真打满（前 N-1 场胜负 == (N-1)/2 : (N-1)/2）"
    - "5. 综合分析：series 进展 + G7 赛果 + 趋势 pattern（主客场胜负规律）"
    - "6. 风险提示：若球员/赔率/伤停数据缺失，明确告知用户深度受限"
  forbidden:
    - "禁止在 series_game=N 找不到时降级分析 G_{N-1} 或其他场次冒充"
    - "禁止暴露 match_id / team_id / round_id / bracket_id 等内部 ID 给用户"
    - "禁止在工具返回 NOT_APPLICABLE 时直接告知用户『无 G7 数据』——必须先 SQL 基准交叉验证
      DB 是否真无数据，再决定回答内容"
    - "禁止用足球工具（resolve_team/resolve_match/get_h2h）处理篮球查询"
  output_template: |
    【马刺 vs 雷霆 西部决赛 G7 分析】

    比赛信息：北京时间 2026-05-31 08:00，雷霆主场（西1）vs 马刺（西2），已完场。
    最终比分：马刺 111 : 103 雷霆（马刺客场夺冠）。

    系列赛回顾（7 场）：
    G1 5/19 雷霆主：马刺 122:115(OT) 胜
    G2 5/21 雷霆主：雷霆 122:113 胜
    G3 5/23 马刺主：雷霆 123:108 胜
    G4 5/25 马刺主：马刺 103:82 胜
    G5 5/27 雷霆主：雷霆 127:114 胜
    G6 5/29 马刺主：马刺 118:91 胜
    G7 5/31 雷霆主：马刺 111:103 胜 → 马刺 4:3 夺冠

    趋势分析：本系列主场优势被打破——7 场中 5 场客队取胜，马刺客场 4 胜横扫。
    风险提示：本分析基于系列赛比分层面，未含球员个人数据/战术/赔率维度
    （当前工具链不支持篮球深度数据），如需 deeper analysis 建议补充外部数据源。

