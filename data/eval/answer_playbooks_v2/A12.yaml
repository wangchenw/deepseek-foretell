type_id: "A12"
case_id: "TC-A12-001"
classification: "✅"
classification_reason: |
  找到可行路径且数据正确完整。SQL 直查 football_competition_teams_stats 按 season_id 聚合,
  七联赛(英超/意甲/西甲/德甲/法甲/日职联/韩职)本季宏观数据(队数/场次/总进球/场均进球/最佳攻击/最佳防守)
  全部命中且与 atomic 期望一致。路径清晰,仅依赖 SQL 聚合即可回答用户全部 turn 12-15 的需求。
path_assessment: |
  路径质量高。核心 SQL 一次性聚合即得七联赛宏观数据,JOIN football_team 取球队中文名,
  JOIN football_season/football_competition 取联赛名与年份。数据完整无缺,字段语义清晰
  (matches=球队已赛场次,goals=球队赛季总进球,goals_against=球队赛季总失球)。
  最佳攻击=MAX(goals),最佳防守=MIN(goals_against>0),逻辑成立。
  唯一隐患:season_id 须按对话时点手工锚定 2025/26(欧五)+2026(日韩),
  不能跟随 DB 的 is_current(已滚到 2026/27),需 LLM 层时间推理。
exploration_sufficiency: |
  探索充分。覆盖了:(1) season_id 归属验证(七联赛当前/历史赛季列表);
  (2) 七联赛宏观聚合(队数/场次/总进球/场均进球);(3) 最佳攻防球队(双向极值);
  (4) foretell 工具 stub 复测(曼城 10181 DATA_MISSING 对照 SQL 实有 77 球)。
  四个维度全部命中,数据真实可溯源,足以支撑用户泊松模型 λ 校准的建模需求。
