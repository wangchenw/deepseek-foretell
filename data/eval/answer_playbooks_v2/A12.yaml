recommended_answer_path: |
  对话时点锚定 2026-05-06,「本季」=2025/26(欧五跨年赛季)+ 2026(日韩自然年赛季)。
  对七联赛分别用 season_id(英超 13242/意甲 13238/西甲 13355/德甲 13295/法甲 13294/日职联 13870/韩职 13903)
  SQL 聚合 football_competition_teams_stats:
    SELECT c.name_zh AS 联赛, COUNT(DISTINCT t.team_id) AS 队数, SUM(t.matches) AS 场次,
           SUM(t.goals) AS 总进球, ROUND(SUM(t.goals)/NULLIF(SUM(t.matches),0),3) AS 场均进球
  最佳攻击球队:JOIN football_team,WHERE t.goals=(SELECT MAX(goals) FROM football_competition_teams_stats WHERE season_id=?)
  最佳防守球队:WHERE t.goals_against=(SELECT MIN(goals_against) FROM football_competition_teams_stats WHERE season_id=? AND goals_against>0)
  汇总七联赛为一张表呈现给用户,用于泊松模型 λ 校准。
  不暴露 season_id/team_id/competition_id,用联赛名+球队名+年份呈现。
  foretell get_team_season_stats 是 stub,须诚实声明「工具层无联赛级宏观数据工具,以下经数据库聚合计算」。
