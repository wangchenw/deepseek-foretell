recommended_answer_path: |
  生产实现推荐路径(按 turn):
  - turn 1(最可能出平局): get_lottery_schedule(play_type=101, date=今日) → 按返回 entries 的 odds.spf
    第 2 个值(平局赔率)升序排序 → 取 top 2-3 场,展示主客队+联赛+平局赔率+让球盘,给推荐理由。
  - turn 2(盘口+历史交战推荐比分): 对每场调 resolve_lottery_match(code=lottery_code) 拿 match_id →
    get_odds_snapshot(match_id) 拿欧赔+亚盘 + SQL football_odds_europe 拿初盘→即时走势 +
    get_h2h(team_a, team_b) 拿历史交锋(样本少时诚实说明) → 综合推荐 1-3 个比分(不双向)。
  - turn 3(已结束比赛结果+赔率): get_lottery_schedule 取列表(按 sell_status=3 过滤已结束)→
    对每场 resolve_lottery_match 拿 match_id → get_match_result(match_id) 拿比分 + odds 字段拿赔率。
  - turn 4(昨天所有): 同 turn 3,日期改为昨日。
  - turn 10-12(深度分析001/002/003): 先 get_lottery_schedule 取列表,按用户口语编号映射到 lottery_code,
    再 resolve_lottery_match + get_odds_snapshot + football_odds_europe + get_h2h + get_match_result(若已结束) 综合分析。
  - turn 13(001红卡): get_match_result(match_id).score_breakdown.red_card。
  - turn 15/16(冷门+大赔率): football_odds_europe 找 real_odd 异常高(冷门方向)+ spf 客胜赔率高 → 推荐冷门比分+半全场。
  全程风险声明:购彩建议必须含"不承诺盈利、量力而行"声明,不暴露 match_id/issue_num 给用户。
