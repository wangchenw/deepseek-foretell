classification_reason: |
  A01 路径完全成立且数据正确完整。step 5 get_lottery_schedule(date='2026-06-28') 返回 9 场竞彩足球
  含完整 spf/rq/bf/jq/bqc 全玩法赔率,可回答 turn 1"最可能出平局"(按 spf 平局赔率排序:阿尔及利亚vs奥地利 1.94 最低)。
  step 4 resolve_lottery_match('周六071') 正确返回 match_id=4460972 与全玩法赔率。step 6 get_match_result
  返回 3-3 比分+1-1 半场+红黄牌角球,回答 turn 3/13。step 8 get_odds_snapshot 返回欧赔+亚盘即时盘。
  step 10 SQL 直查 football_odds_europe 返回 20 家公司初盘/即时/最新盘,完全可推导赔率走势(替代 stub 的 get_odds_trend)。
  所有核心数据需求(赛程、赔率、赛果、盘口、比分、半全场)均有数据支撑,路径稳健,可直接给靠谱回答。
path_assessment: |
  找到的路径能完整回答用户多轮需求。核心链路:
  1) get_lottery_schedule(play_type=101, date=今日) → 拿当日全部竞彩足球场次+全玩法赔率(spf/rq/bf/jq/bqc)
  2) 按 spf 平局赔率升序排序 → 推荐"最可能出平局"场次(数据驱动,不虚构)
  3) resolve_lottery_match(code='周X+三位序号') → 拿 match_id + 全玩法赔率 + match_candidates(含 team_id/排名/环境)
  4) get_odds_snapshot(match_id) → 欧赔+亚盘即时盘(多家公司)
  5) SQL football_odds_europe → 初盘/即时/最新盘对比,推导赔率走势(替代 stub 的 get_odds_trend)
  6) get_h2h(team_a, team_b) → 历史交锋(冷门国家队样本可能少,需诚实说明)
  7) get_match_result(match_id) → 已完赛场次的比分/半场/红黄牌/角球
  数据正确性已交叉验证:6071 阿尔及利亚vs奥地利,工具返回 spf=3.90/1.94/2.80 与 SQL 一致;
  赛果 3-3 平局,机构盘口平局赔率从 3.20→2.15 大幅下调,与赛果一致,数据可信。
  路径稳健性:除 get_odds_trend/get_kelly/get_betfair/get_intel_tags 是 stub 需 SQL 替代外,
  其余工具均返回 OK。无依赖 LLM 层编造的脆弱补丁。
exploration_sufficiency: |
  探索充分。覆盖了:赛程拉取(get_lottery_schedule)、编号解析(resolve_lottery_match 两种格式)、
  赛果(get_match_result)、交锋(get_h2h)、盘口即时(get_odds_snapshot)、盘口走势(SQL football_odds_europe)。
  未尝试的工具(get_kelly/get_betfair/get_intel_tags/get_injury_report/get_match_lineup/get_same_odds_history)
  已在 db_schema_map.md 第四章记录为 stub,且 A01 核心需求(平局推荐/比分/赛果/盘口)不依赖它们,
  无需重复验证。唯一未深挖:bf/bqc/jq 赔率字段的解析格式(31 个比分赔率对应 0-0~3-3 等),
  但工具已返回原始字符串,LLM 层可按竞彩官方规则解析,非数据缺口。
