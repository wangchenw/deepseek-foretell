type_id: "X12"
case_id: "TC-X12-REG-002"
review_summary: |
  本 case 是"主客颠倒 + 多轮消歧"陷阱题。Agent 2 严格按 SQL 优先策略：先用 SQL 独立证明 2024-06-27 DB 无此对阵，
  再用 SQL 证明 2026-06-27 世界杯 id=4460928 为挪威(主) vs 法国(客)，
  然后对照工具发现 resolve_match 按用户字面方向 (home=法国/away=挪威) 会 ENTITY_NOT_FOUND 漏判，
  反向调用与 get_team_schedule 兜底均能正确返回。结论是 tool_logic_gap（resolve_match 不做反向 fallback）+ context_gap（无 checkpointer），
  但最终事实链完整、守门规则落实到位，用户态回答可合规产出。
requirement_analysis_review:
  completeness: "原子拆分完整：覆盖实体解析(aq_1/aq_2)、错误年份验证(aq_3)、多轮修正(aq_4)、时间窗精化(aq_5)、守门(aq_6)。hard_constraints 明确引用反馈 #002 的 P0/P1 教训"
  missed_needs: []
path_exploration_review:
  reasoning_quality: "探索路径合理且无机械重试：aq_5 四轮分别对应'独立基准→字面方向陷阱→纠正方向→兜底路径'，每轮有独立假设与对照目的。aq_3 用 SQL 基准 + 工具双向印证 2024-06-27 无赛，符合 no_false_negative"
  sql_baseline_quality: "Agent 2 真的独立写了 SQL 基准：aq_3/aq_5 round 1 都有完整 SELECT 语句与 result 记录，未直接相信工具。aq_5 round 2 的工具 ENTITY_NOT_FOUND 与 SQL 基准 6 条形成强对照，是定位 tool_logic_gap 的关键证据"
  unexplored_alternatives: []
  gap_judgment_confidence: high
answer_playbook:
  summary: "用户用 'A vs B + 日期' 入口且方向可能与 DB 相反时，先 SQL/工具双向验证方向，失败立即用 get_team_schedule 兜底，最终以 DB 真实方向呈现"
  steps:
    - "1. resolve_team 拿到两支球队的国家队 team_id（过滤女足/青年队）"
    - "2. 用 SQL 或 resolve_match 验证用户给定日期是否真有该对阵；若 0 条，诚实告知并保留上下文等待用户纠正"
    - "3. 用户纠正时间窗/赛事后，重新查目标日期；resolve_match 失败时立即用 get_team_schedule(team_id, direction=all) 兜底，从返回的 home_name/away_name 读真实方向"
    - "4. 最终用户态回答用 DB 真实方向呈现（挪威主场 vs 法国），含北京时间、赛事、状态；不出现 match_id 与中间过程"
  forbidden:
    - "禁止把 resolve_match 的 ENTITY_NOT_FOUND 直接当成'无此赛'断言——可能是主客方向颠倒"
    - "禁止把 match_id（如 4460928）暴露给用户"
    - "禁止输出'未找到/让我换英文名再试/正在查询'等中间态"
    - "禁止沿用用户字面 '法国 vs 挪威' 顺序作为最终主客方向——必须以 DB home_team_id/away_team_id 为准"
  output_template: |
    "您说的应该是 2026 世界杯 6 月 27 日那场——挪威主场对阵法国，北京时间 03:00 开球，比赛已完场。"
gaps:
  - gap_type: tool_logic_gap
    detail: "resolve_match(home=法国, away=挪威, date=2026-06-27) 返回 ENTITY_NOT_FOUND，但 SQL 基准证明 DB 里 2026-06-27 世界杯 id=4460928 真实存在该对阵（方向相反：挪威主/法国客）。工具严格按 home/away 顺序匹配，不做 swap fallback，导致用户主客颠倒时漏判 DB 真实存在的场次。生产环境若 LLM 直接相信工具结果就会答错"
    evidence_ref: "path_attempts_v2/X12.yaml :: aq_5 round 1 (SQL 基准 6 条) + round 2 (工具 ENTITY_NOT_FOUND) + round 3 (反向调用 OK)"
    priority: P1
    recommended_action: "在 resolve_match 内部增加 swap(home,away) fallback：当 (home,away,date) 0 命中时自动反向再查一次，命中则在 envelope meta 标记 orientation_swapped=true；或在 ENTITY_NOT_FOUND 的 data 里加 hint 引导 LLM 反向重试"
  - gap_type: context_gap
    detail: "turn 2 是对 turn 1 的修正（2024→2026、世界杯），需继承 turn 1 已解析的实体与对阵关系。foretell 代码库无 langgraph checkpointer/thread_id 持久化，工具层无法验证多轮继承；只能依赖 LLM 在同一对话内自维护"
    evidence_ref: "path_attempts_v2/X12.yaml :: aq_4"
    priority: P2
    recommended_action: "评估引入 langgraph MemorySaver/SqliteSaver 作为 checkpointer，让多轮修正类 case 在工具/状态层也可验证；当前阶段在 system prompt 里强化'用户纠正字段时只替换对应约束、其余继承'的指令"
scores:
