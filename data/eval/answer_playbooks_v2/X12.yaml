  completeness: {score: 5, reason: "含日期(2026-06-27)、北京时间(03:00)、主客(挪威主/法国客)、赛事(世界杯第3轮)、状态(完场)、中立场标识(neutral=true)——必需字段齐全"}
  no_false_negative: {score: 5, reason: "turn 1 错误年份经 SQL 基准 0 条 + 工具 ENTITY_NOT_FOUND 双向印证后才诚实纠正；turn 2 用 SQL + 反向工具 + team_schedule 三路径穷尽验证，未过早断言无赛"}
