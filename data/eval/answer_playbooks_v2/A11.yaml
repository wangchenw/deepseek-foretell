recommended_answer_path: |
  1. resolve_league('世界杯') 返回 league_id=1(FIFA World Cup 2026 进行中),排除 U20/女足/世欧预(id=2)/女世界杯(id=13)
  2. SQL 查 season_id=MAX(competition_id=1)→13776(本轮验证 3 行积分榜父表均 13776)
  3. SQL 直查射手榜:SELECT ps.goals, ps.penalty, ps.assists, ps.matches, p.name_zh AS player, t.name_zh AS team FROM football_competition_players_stats ps JOIN football_player p ON p.id=ps.player_id JOIN football_team t ON t.id=ps.team_id WHERE ps.season_id=13776 AND ps.goals>0 ORDER BY ps.goals DESC, ps.assists DESC, ps.penalty ASC LIMIT 10
  4. 输出前 10 排名表:排名+球员+所属国家队+进球(含点球)+助攻+出场;剥离 player_id/team_id/season_id/competition_id
  5. 同进球排序口径:助攻降序→点球升序(点球含金量低)
  6. 守门:不外露 SQL/中间态/工具名;未穷尽前不断言无数据(已 SQL 穷尽 season_id=13776 AND goals>0)
  7. 若生产 Foretell 无 SQL 直查能力,诚实说明『工具链暂无射手榜工具,以下数据由数据库直查提供』后给榜单,禁止编造
