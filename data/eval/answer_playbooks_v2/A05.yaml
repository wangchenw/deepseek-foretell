recommended_answer_path: |
  生产层推荐路径(优先修复 stub 后用 foretell 原生工具,过渡期用 SQL workaround):
  1. 实体解析:用 team_id 直查(10298/10061/10438/10305/10336/10380)绕过命名容错,或 LLM 层把「东京FC→FC东京」标准化后调 resolve_team;
  2. 比赛定位:SQL 直查 football_match WHERE id IN (4470724,4480359,4470725),取 status_id=8 赛果;
  3. 首发阵容:SQL JOIN football_match_lineup+detail WHERE confirmed=1 AND first=1(过渡期);修复后调 get_match_lineup;
  4. 伤停:SQL 查 football_team_injury WHERE team_id IN (6 队) AND del_flag=1;修复后调 get_injury_report;
  5. 情报:SQL 查 football_intelligence WHERE id IN (3 场);修复后调 get_intel_tags;
  6. 欧赔快照:调 get_odds_snapshot(可用)或 SQL football_odds_europe;赔率走势缺失须诚实说明;
  7. 赛季统计:SQL 查 football_competition_teams_stats WHERE season_id IN (13870,13903);xG/xGA 诚实声明不可得,用近期进球/射门序列替代;
  8. 近况/h2h:调 get_recent_form/get_h2h(可用)或 SQL 直查;
  9. 赛果:调 get_match_result(可用)或 SQL 解读 home_scores/away_scores;
  10. 输出:8 视角合成为连贯篇章(归纳优先于罗列,无序号化标题);首发/伤停/赔率走势/xG/官方发布会逐项诚实说明数据采集状态;明确主推方向+置信度+仓位,禁止「主不败+客不败」双向推荐;不暴露内部 ID/工具名。
