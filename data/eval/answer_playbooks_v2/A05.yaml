type_id: "A05"
case_id: "TC-A05-001"
classification: "⚠️"
classification_reason: |
  数据库层面路径完整且数据正确:3 场比赛 + 6 队 + 22 人首发/场 + 12 条伤停 + 三场完整情报 + 多公司欧赔 + 6 队赛季统计 + 近况/h2h 全部 SQL 可查,可完整支撑用户 8 大视角深度分析(exploration_log step 1-10 全部验证)。
  但标记 ⚠️ 而非 ✅ 的原因:Foretell 生产工具层有 5 个 stub(get_match_lineup/get_injury_report/get_intel_tags/get_team_season_stats/get_odds_trend)对应用户最关心的首发/伤停/情报/赛季统计/赔率走势维度,若生产系统仅依赖 foretell 工具不暴露 SQL 直查,则 8 视角中至少 4 个(基本面伤停、战术首发、市场赔率走势、情报标签)会全部 DATA_MISSING,导致用户反复追问首发(turn5/11/16)时无法应答。
  SQL workaround 完整且不脆弱(数据真实存在、SQL 标准模板可复用),但需生产层修复 stub 或暴露 SQL 路径才能在 foretell 原生调用下走通。
  真不可得仅 xG/xGA(数据库无字段)与官方发布会(无搜索入口),这两项须按 expected_behaviors「数据不足时诚实说明」逐项声明,不编造。
path_assessment: |
  找到的路径分两层:
  (A) SQL 直查层(本次验证可行):football_match → football_match_lineup+detail → football_team_injury → football_intelligence → football_odds_europe → football_competition_teams_stats → football_match(h2h/recent form)。覆盖 aq_1~aq_8、aq_11~aq_25 全部 atomic。
  (B) foretell 工具层(生产路径):resolve_team/resolve_match 可用但「东京FC/首尔FC」语序风险;get_recent_form/get_h2h/get_odds_snapshot/get_match_result 可用;get_match_lineup/get_injury_report/get_intel_tags/get_team_season_stats/get_odds_trend 五个 stub 不可用。
  数据正确性已交叉验证:三场赛果 home_scores/away_scores 解读与 atomic 一致(浦和0-0点球9-10、横滨0-1、大田1-2);6 队 competition_id 与 match 表对齐;首发 22 人/场与 coverage_lineup=1 标记一致。
exploration_sufficiency: |
  探索充分。10 步覆盖 8 个 atomic 类别(resolve_entity/fetch_schedule/fetch_intel/fetch_odds/fetch_stats/fetch_result/h2h/recent_form),每步均有 SQL 验证数据真实存在,且交叉验证 foretell 工具 stub 状态(Step 5 同时验证 SQL count=22 与 foretell DATA_MISSING)。
  未深入项:赔率走势历史分区表(football_odds_europe_change_*)未单独验证,但欧赔快照(初盘/即时/最新)已足够支撑 8 视角之市场热度分析;赔率走势缺失须诚实说明。
