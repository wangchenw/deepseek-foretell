recommended_answer_path: |
  对每对对阵(主队 tid_h, 客队 tid_a,联赛 cid),按以下顺序组装回答:

  步骤 1 — 近5轮赛程+比分(两队各查一次):
    SELECT m.id, c.short_name_zh AS league, m.match_time_str,
           ht.name_zh AS home, at.name_zh AS away,
           m.home_scores, m.away_scores
    FROM football_match m
    JOIN football_team ht ON ht.id=m.home_team_id
    JOIN football_team at ON at.id=m.away_team_id
    JOIN football_competition c ON c.id=m.competition_id
    WHERE (m.home_team_id=:tid OR m.away_team_id=:tid) AND m.status_id=8
    ORDER BY m.match_time DESC LIMIT 5
    -- 比分取 home_scores[0]/away_scores[0](常规),主客场由 home_team_id=:tid 判定

  步骤 2 — 近5轮攻防统计(两队各查一次):
    SELECT m.match_time_str, ts.goals, ts.goals_against, ts.shots,
           ts.shots_on_target, ts.ball_possession, ts.corner_kicks,
           ts.tackles, ts.interceptions, ts.clearances, ts.blocked_shots
    FROM football_match m
    JOIN football_match_team_stats ts ON ts.match_id=m.id AND ts.team_id=:tid
    WHERE (m.home_team_id=:tid OR m.away_team_id=:tid) AND m.status_id=8
    ORDER BY m.match_time DESC LIMIT 5

  步骤 3 — 伤停(两队各查一次):
    SELECT i.type, i.reason, i.missed_matches, p.name_zh AS player
    FROM football_team_injury i
    JOIN football_player p ON p.id=i.player_id
    WHERE i.team_id=:tid AND i.del_flag=1
    -- type:1受伤/2停赛/3出战成疑

  步骤 4 — 赔率变化(对本场 match_id):
    SELECT company_id, first_odd1, first_odd2, first_odd3,
           odd1, odd2, odd3, real_odd1, real_odd2, real_odd3
    FROM football_odds_europe WHERE match_id=:mid
    -- first_odd=初盘, odd=即时, real_odd=最新;对比描述升降

  步骤 5 — 主客差异:由步骤1的 home_team_id=:tid 标识区分主客场,
           步骤2攻防统计可加 GROUP BY (home_team_id=:tid) 拆主客均值。

  步骤 6 — XG 维度:诚实声明"Foretell 数据库未存储 xG/xGA 字段,
           无法提供预期进球数据;以下用 shots_on_target(射正)与
           ball_possession(控球率)近似描述进攻质量,非 xG。"
           不得用实际进球或射门数冒充 xG 数值。

  步骤 7 — 多联赛场次批量(如 turn16 周五001-006):
           可用 resolve_lottery_match(play_type=101, code=场次编号, date=周五日期)
           或 SQL 直查 lottery_jczq_odds WHERE issue_num+issue 定位 match,
           再回 football_match 取数据;每场重复步骤1-6。
           冷门联赛(芬超/瑞超/德丙)实测有数据,无需特殊处理。

  战意/防守漏洞指数:在回答合成层由步骤2多字段综合推算,明确标注为合成指标。
