    evidence_ref: "path_attempts_v2/G01.yaml aq_1 round 2（SQL 基准 issue=260428 巴黎vs拜仁）vs round 2 工具返回 issue=260526 基多体大vs时刻准备；round 4 工具带 date=2026-04-29 才返回正确 issue=260428"
    priority: P1
    recommended_action: "修复 foretell/tools/entity.py resolve_lottery_match 或其 crazy_sports client：①不带 date 时若同名 code 跨多期存在，必须返回 ambiguous + 列出所有候选（issue+主客队+match_time），禁止静默取最新；②在 lottery_jczq_odds 上对 (issue_num, match_time) 做时间窗校验"
  - gap_type: parameter_gap
    detail: "resolve_lottery_match docstring 写 date='开奖/销售日期 YYYY-MM-DD'，但实测 date=2026-04-28（彩票周二开售日）返回 ENTITY_NOT_FOUND，date=2026-04-29（match_time 日期）才 OK。docstring 与实际语义不符，会误导调用方。"
    evidence_ref: "path_attempts_v2/G01.yaml aq_1 round 3（date=2026-04-28 NOT_FOUND）vs round 4（date=2026-04-29 OK）"
    priority: P2
    recommended_action: "更新 docstring 明确 date 语义=match_time 所在日期；或同时接受 issue 开售日并在 client 内做 issue→match_time 映射；或新增 issue 参数允许直接传 260428"
