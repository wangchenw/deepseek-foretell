answer_playbook:
  summary: "比分预测追问的标准应答：turn 1 完整六段分析（定位+对阵+胜平负+让球+比分倾向+风险），turn 2 只输出比分区间+主推比分+一句话理由，复用同场定位不重述。"
  steps:
    - "1. resolve_lottery_match(play_type=101, code=周二004, date=<推断的 match_time 日期>) 定位场次；若用户未给 date，必须用 home/away 提示交叉验证（resolve_match 短名），禁止盲信工具默认返回"
    - "2. 取 lottery_jczq_odds 的 spf/rq/bf/jq/bqc 全字段，bf 按 column_comment 固定 31 项顺序切片成 (比分→赔率) 字典"
    - "3. 用 resolve_match(home短名, away短名, date) 拿 match_id，调 get_odds_snapshot 取欧赔/亚盘做倾向校验"
    - "4. turn 1 合成六段：定位(赛事+北京开赛时间，不暴露 match_id/编号)→对阵(主客全名+排名)→胜平负倾向+让球口径→比分倾向3-5个→历史交锋/近期状态(可选)→风险提示"
    - "5. turn 2 '比分预测'：通过 thread state 复用 turn 1 的 issue/issue_num/match_id，不重新调 resolve_lottery_match"
    - "6. turn 2 输出仅比分区间：主推2-3个（bf 最低赔率）+次推2-3个 + 一句话理由（bf/jq/亚盘印证），禁止重述六段"
  forbidden:
    - "禁止 resolve_lottery_match 不带 date 且不做主客名交叉验证就交付结果（会导致返回最新一期同名 code 的错误场次）"
    - "禁止 turn 2 重新解析实体或重述完整六段（违反 expected_behaviors）"
    - "禁止暴露 match_id/issue/issue_num/lottery_id 给用户"
    - "禁止凭空猜比分——必须基于 bf 赔率或 jq 总进球分布"
    - "禁止把 bf 字段当 JSON 解析——它是按 column_comment 固定 31 项顺序的逗号分隔串"
  output_template: |
    【turn 1】
    欧冠半决赛首回合，北京时间 4月29日 03:00，巴黎圣日耳曼（主）vs 拜仁慕尼黑（客）。
    胜平负倾向：主胜略优（spf 2.22），但客胜 2.41 不容忽视，势均力敌。
    让球口径：巴黎让一球（-1），让负 1.49 低赔，意味着拜仁 +1 让球赢面大，巴黎需赢 2 球才让胜。
    比分倾向：2-1 / 1-1 / 1-2 / 1-0 / 0-1（bf 赔率最低 5 项），进球数 2-3 球。
    欧赔公司13：2.55/3.40/2.75；亚盘平手盘 0.85/0.0/1.07，印证巴黎略占优但非强势。
    风险：拜仁客战能力强，客胜可能性高于赔率表面值；建议保守玩法让球平/让球负。

    【turn 2 follow-up '比分预测'】
    主推 2-1 / 1-1（bf 赔率 8.50 并列最低），次推 1-2（8.75）/ 1-0 / 0-1。
    区间 2-3 球，巴黎小胜或平。理由：bf 三低赔集中 2:1/1:1/1:2，jq 总进球 2-3 球赔率最低，亚盘平手盘印证势均力敌。
