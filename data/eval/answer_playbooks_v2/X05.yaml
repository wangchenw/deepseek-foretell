gaps:
  - gap_type: tool_logic_gap
    detail: "foretell/tools/crazy_sports/client.get_team_schedule 的 direction=upcoming 实际返回历史已完场赛事（2004-2006），未做 match_time>NOW() 与 status_id 未赛过滤；同时 league_id 参数被忽略（传 1 仍返回 league_id=45 欧洲杯场次）。生产环境现就在用这个有问题的工具，是反馈 #003 假阴性的直接根因"
    evidence_ref: "path_attempts_v2/X05.yaml aq_4 round 3-4：SQL 基准返回 2026-07-03 07:00 葡萄牙 vs 克罗地亚（status=1 未赛）+ 2026-06-28 07:30 哥伦比亚 vs 葡萄牙（status=8），工具 direction=upcoming league_id=1 返回 2004-2006 历史"
    priority: P1
    recommended_action: "修复 client.get_team_schedule：(1) direction=upcoming → WHERE match_time > UNIX_TIMESTAMP(NOW()) AND status_id IN (1,9,13) ORDER BY match_time ASC；(2) league_id 参数加入 WHERE competition_id=%s；(3) 加单元测试覆盖「未赛场优先」+「联赛过滤生效」。修复前在 Skill 层禁止把 get_team_schedule 当作「下一场」唯一依据"
  - gap_type: implementation_gap
    detail: "get_team_schedule 返回的 neutral 字段为 null，但 SQL 查 football_match.neutral=1（中立场）。client 字段映射可能漏了 neutral 字段，影响「是否中立场」的呈现准确性"
    evidence_ref: "path_attempts_v2/X05.yaml aq_5：工具返回 neutral=null，SQL 基准 neutral=1"
    priority: P3
    recommended_action: "核对 client.get_schedule_by_date 的字段映射，补 neutral 字段；不影响主客判断但影响中立场标注"
