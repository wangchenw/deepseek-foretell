type_id: "X05"
case_id: "TC-X05-REG-008"
review_summary: |
  本 case 的评估过程扎实：探索智能体真正写了 SQL 基准并多路径交叉验证，发现 get_team_schedule(direction=upcoming)
  存在严重 tool_logic_gap（返回 2004-2006 历史赛事、league_id 过滤失效），并准确定位这是反馈 #003 假阴性的工具层根因。
  最终结论与 DB 事实一致，护栏满足——未在穷尽前断言无比赛。case pass。
requirement_analysis_review:
  completeness: "原子拆分覆盖了实体解析(球队+赛事)、时间窗细化（双解释）、赛程获取、交叉验证、护栏、综合答案 8 个 aq，结构完整。aq_3 明确区分「明天=6/28」与「明天=6/29」两种解释，是本 case 的关键判断点"
  missed_needs:
    - "轻微遗漏：未单独拆一个 aq 用 resolve_match 做对阵反查（虽然 aq_7 在路径探索里补上了），需求分析阶段可更显式地把 resolve_match 列为交叉验证路径之一"
path_exploration_review:
  reasoning_quality: "推理合理。aq_4 第 3-4 轮从「怀疑 direction 失效」到「怀疑 league_id 也失效」逐步钉死，每一轮都有明确假设和对照证据，不是机械重试。aq_5/aq_6/aq_7 三条独立路径交叉验证 6/28 07:30 场次，证据链完整"
  sql_baseline_quality: "优秀。每个原子查询都先写了独立 SQL 基准再调工具对照：aq_1 查 football_team、aq_2 查 football_competition、aq_4 查 football_match 葡萄牙 WC 场次、aq_5/aq_6 查 6/28 与 6/29 全天赛程。SQL 基准与工具背离时（aq_4），明确标记 tool_logic_gap 而非采信工具，正是 v2 评估要解决的信任问题"
  unexplored_alternatives:
    - "未尝试 get_lottery_schedule(play_type=101, date=2026-06-28) 作为第四条交叉路径——反馈 #003 第三轮正是靠竞彩接口兜底命中周六 069，可作为补充验证；但不影响本 case 结论的成立"
  gap_judgment_confidence: high
answer_playbook:
  summary: "「某队明天早上某赛事有比赛吗」类护栏题：必须并行 SQL 基准 + get_schedule_by_date（双日期解释）+ resolve_match/resolve_team 多路径交叉，禁止仅凭 get_team_schedule 断言"
  steps:
    - "1. resolve_team 定位球队 team_id；resolve_league 定位赛事 competition_id（双确认，不靠工具单源）"
    - "2. SQL 基准：SELECT * FROM football_match WHERE (home_team_id=? OR away_team_id=?) AND competition_id=? AND match_time_str LIKE 'YYYY-MM-DD%'，覆盖「明天」的两种可能日期解释"
    - "3. 工具对照：get_schedule_by_date(date=..., league_preset=赛事名, tier=all) 对每个候选日期分别查"
    - "4. 若 get_team_schedule(direction=upcoming) 返回与 SQL 基准不一致 → 标记 tool_logic_gap，以 SQL/get_schedule_by_date 为准"
    - "5. 至少 2 条独立路径都返回空 + SQL 基准也为空，才允许输出「无比赛」；任一非空则给出对阵+北京时间+主客场+赛事名+轮次"
    - "6. 输出前剥离 match_id/team_id/competition_id/竞彩编号/工具名/查询过程"
  forbidden:
    - "禁止仅凭 get_team_schedule 一源断言有无比赛（已验证 direction=upcoming 失效）"
    - "禁止未穷尽 SQL 基准 + 至少一条 get_schedule_by_date 交叉就下「无比赛」结论"
    - "禁止暴露 match_id / team_id / 竞彩编号 / 工具名 / 「正在查询」「接口延迟」等中间态"
    - "禁止按用户表述「葡萄牙 vs X」臆测主客，必须以工具/SQL 返回的 home_name vs away_name 为准"
  output_template: |
    有比赛：
    「有。明早 07:30 世界杯 哥伦比亚 vs 葡萄牙（哥伦比亚主场，小组赛第 3 轮）。」
    无比赛（穷尽后）：
    「明早（6/29）没有葡萄牙的世界杯比赛。葡萄牙最近一场世界杯是今天 07:30 哥伦比亚 vs 葡萄牙（已完场），下一场是 7/3 07:00 葡萄牙 vs 克罗地亚。」
