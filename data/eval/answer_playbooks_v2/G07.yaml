    evidence_ref: "path_attempts_v2/G07.yaml aq_1 round 2（SQL 基准 30+ 场全 sell_status=3）vs round 2 工具返回同样全 sell_status=3；round 3 用 2026-06-28 数据验证未开赛过滤逻辑成功"
    priority: P2
