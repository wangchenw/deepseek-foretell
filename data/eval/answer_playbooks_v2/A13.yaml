recommended_answer_path: |
  对话时点锚定 2026-05-17(session 28066650),5/17 = 2026-05-17,赛前视角 cutoff 时间戳 = 1778976000。
  对 5 对球队分别 SQL 双向查:
    SELECT m.match_time_str, ht.name_zh AS home, at.name_zh AS away,
           m.home_scores, m.away_scores, c.name_zh AS comp
    FROM football_match m
    JOIN football_team ht ON ht.id=m.home_team_id
    JOIN football_team at ON at.id=m.away_team_id
    JOIN football_competition c ON c.id=m.competition_id
    WHERE ((m.home_team_id=A AND m.away_team_id=B) OR (m.home_team_id=B AND m.away_team_id=A))
      AND m.match_time < 1778976000
    ORDER BY m.match_time DESC LIMIT 5
  scores 取索引 0 作为常规比分(数组 [比分,半场,红牌,黄牌,角球,加时,点球])。
  team_id:福伦丹10647/特尔斯达10455/科莫13402/帕尔马10907/全北10238/金泉10652/川崎10908/町田泽维亚25413/富川FC20060/浦项铁人10417。
  「浦项制铁」须降级「浦项铁人」命中一线队 10417,不得误选 resolve_team 返回的后备队 30019。
  输出 5 对球队 h2h 汇总(日期/主客/比分/赛事),剥离 match_id/team_id,标注数据来源。
  不反推 5/17 当日结果,仅取 5/17 之前交锋。
  若用 foretell get_h2h,须 LLM 层:(1) 剔除 date>=2026-05-17 的比赛;(2) JOIN 球队名/赛事名;(3) 剥离内部 ID。
