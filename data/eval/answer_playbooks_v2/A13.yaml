type_id: "A13"
case_id: "TC-A13-001"
classification: "⚠️"
classification_reason: |
  找到可行路径但 foretell 工具有隐患。SQL 直查 football_match 双向 + match_time<2026-05-17 路径完全可行,
  5 对球队 h2h 数据全部命中且与 atomic 期望完全一致。但 foretell get_h2h 工具有三类隐患:
  (1) 不区分赛前/赛后,返回 5/17 当日场违反「赛前视角不反推」硬约束;
  (2) resolve_team('浦项制铁') 别名缺失一线队 10417,误选后备队会导致假阴性;
  (3) 暴露内部 ID 且不返回球队名/赛事名,需 LLM 层 JOIN 剥离。
  须用 SQL workaround 或 LLM 层严格剔除+别名降级,工具直调路径脆弱。
path_assessment: |
  SQL 路径质量高:football_match 双向查 + match_time<1778976000 + JOIN football_team(主客各一)+ football_competition,
  一次性返回带球队中文名/赛事名/比分的 h2h 列表,完全规避工具三类隐患。
  foretell get_h2h 路径脆弱:(1) 须 LLM 层手工剔除 date>=赛前日的比赛(get_h2h 无 before 参数);
  (2) 须 LLM 层判断 resolve_team 候选是否为一线队(浦项制铁须降级「浦项铁人」);
  (3) 须 LLM 层 JOIN 名称 + 剥离 match_id/team_id;
  (4) 须正确解析 scores 数组索引 0=常规比分。
  推荐 SQL 直查为首选,工具调用为兜底且须配合 LLM 层严格守门。
exploration_sufficiency: |
  探索充分。覆盖了:(1) 10 个 team_id 一线队归属验证;
  (2) 5 对球队 h2h 双向 SQL 查询(正确时间戳 1778976000);
  (3) 时间戳坑复现(初用 1747465600 漏掉一年,修正后 atomic 期望全部命中);
  (4) get_h2h 工具对照(发现赛前/赛后不区分+ID 暴露);
  (5) resolve_team('浦项制铁') 别名风险复现(一线队 10417 缺失)。
  五个维度全部命中,数据真实可溯源,足以支撑用户 5 场赛前分析的 h2h 输入需求。
