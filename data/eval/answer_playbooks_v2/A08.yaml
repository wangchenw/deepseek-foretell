gaps:
  - gap_type: tool_logic_gap
    detail: "get_team_schedule(direction=upcoming) 语义反转：docstring 声明 upcoming=未来赛事，实际返回 2004-2006 历史比赛按 match_time 升序。生产环境现在就在用这个有问题的工具，任何用 upcoming 查未来的调用方都会得到错误结果。"
    evidence_ref: "path_attempts aq_3 round1 (direction=upcoming, limit=5, no league_id) 返回 2004-2006 历史升序"
    priority: P1
    recommended_action: "修复 foretell/tools/schedule.py get_team_schedule：direction=upcoming 时 SQL 应过滤 status_id IN (1,2,3,4,5,9) 且 match_time >= NOW()，按 match_time 升序返回未来赛事。"
  - gap_type: tool_logic_gap
    detail: "get_team_schedule(direction=upcoming, league_id='fc_1') 返回 DATA_MISSING 空结果，而 DB 实际有 4 场 2026 世界杯葡萄牙赛事。这是反馈 #003 假阴性的直接根因——原 Foretell 若用此参数组合会得到『葡萄牙世界杯无 upcoming 赛事』的错误结论。league_id 前缀 strip 逻辑在 upcoming 方向失效。"
    evidence_ref: "path_attempts aq_3 round2 (direction=upcoming, league_id=fc_1) → DATA_MISSING；对照 aq_8 round1 SQL 基准 1 条命中"
    priority: P1
    recommended_action: "修复 league_id 前缀解析：fc_/ft_/fm_ 前缀 strip 须在所有 direction 生效；并修复 upcoming+league_id 组合的 WHERE 拼接逻辑。"
  - gap_type: tool_logic_gap
    detail: "get_team_schedule 的 league_id 整数过滤器在 direction=upcoming/all 方向被静默忽略：传 league_id=1 仍返回欧国联(2906)/欧洲杯(45)/国际友谊(34)/世欧预(2)等非世界杯赛事。调用方若相信 league_id 过滤会得到错误结论。"
    evidence_ref: "path_attempts aq_3 round3 (direction=all, league_id=1) 返回 20 条含欧国联/国际友谊等；aq_8 round1 (direction=upcoming, league_id=1) 返回欧洲杯赛事"
    priority: P1
    recommended_action: "修复 get_team_schedule SQL 拼接：league_id 参数须统一 strip 前缀后加入 WHERE competition_id=? 条件，且在所有 direction 生效。"
  - gap_type: context_gap
    detail: "多轮上下文继承无原生 checkpointer：turn2 须继承 turn1 的 team_id，turn3 须继承 turn2 的时间窗并叠加 competition_id。反馈 #003 关联 #002 已证实此环节历史失败（turn2 未继承世界杯语境导致漏查）。当前完全依赖 LLM 调用层显式串接，无系统级保障。"
    evidence_ref: "path_attempts aq_4/aq_6 标记 context_gap；反馈 #003 第一轮漏 6/28，第二轮未继承『明天早上』的世界杯语境"
    priority: P2
    recommended_action: "引入 LangGraph MemorySaver 或 StoreBackend 持久化会话级 {team_id, competition_id, time_window}；turn2/turn3 自动继承而非依赖 LLM 显式串接。"
  - gap_type: routing_gap
    detail: "Skill 层未固化『国家队+时间窗』类问题的主动推断规则：用户说『葡萄牙明早比赛』时，LLM 应在 turn1/turn2 主动预填 competition_id=1（2026 世界杯进行期）作为默认赛事过滤，而非等用户 turn3 主动补出『世界杯』才纠正。"
    evidence_ref: "反馈 #003 显示用户被迫在 turn3 主动补出世界杯语境才纠正；aq_6 标记此环节依赖 LLM 层"
    priority: P2
    recommended_action: "在 foretell-light-query Skill 中增加规则：『国家队 + 时间窗类问题，世界杯进行期默认预填 competition_id=1 过滤，并主动提示该赛事』。"
