case_id: "TC-A08-REG-003"
review_summary: |
  本案是反馈 #003 的回归验证。Agent 2 严格按 SQL 优先策略，先用 football_match 直查建立基准
  （6/28 07:30 哥伦比亚主 vs 葡萄牙客，match_id=4460934, competition_id=1），再调用
  get_team_schedule 多参数组合对照，成功定位到三处 tool_logic_gap：(1) direction=upcoming
  语义反转返回 2004-2006 历史升序；(2) league_id=fc_1 + upcoming 返回 DATA_MISSING 空结果
  （#003 假阴性的直接根因）；(3) league_id 整数过滤器在 upcoming/all 方向被静默忽略。
  Agent 2 没有因为工具返回空就断言无赛，而是切换 direction=all + 手动过滤 + get_lottery_schedule
  交叉验证找到目标场，未穷尽前未断言无赛，完全符合 expected_behaviors。aq_4/aq_6 诚实标注
  context_gap（无原生 checkpointer）。整体诊断扎实、根因清晰、workaround 可落地。
requirement_analysis_review:
  completeness: "原子拆分覆盖完整：实体解析(aq_1/aq_7)、时间窗推断(aq_2)、赛程查询(aq_3/aq_5/aq_8)、多轮上下文(aq_4/aq_6)、合成(aq_9)、守门(aq_10) 共 10 个原子，按意图段而非句子分组，turn2/turn3 正确标注为 maintain_context 而非重新拆实体。hard_constraints 9 条覆盖 expected_behaviors 全部 4 条 + 反馈 #003 的 P0/P1 教训 + #002 上下文丢失关联。"
  missed_needs: []
path_exploration_review:
  reasoning_quality: "推理链清晰：aq_3 用 4 轮逐步揭示 upcoming 语义反转→fc_1 前缀失效→league_id 过滤失效→lottery 兜底，每轮假设都基于前一轮诊断，无机械重试。aq_5/aq_8 复用 aq_3 发现，1-2 轮即结论，效率高。aq_4/aq_6 1 轮即标注 context_gap，未假装能验证。"
  sql_baseline_quality: "优秀。Agent 2 在 aq_3 round1、aq_5 round1、aq_8 round1 三个关键 fetch_schedule 原子上都独立写了 SQL 基准（football_match JOIN football_team JOIN football_competition，按 match_time_str 时间窗过滤），且 aq_3 round1 SQL 基准=0 条时未直接断言无赛，而是继续工具对照发现 tool_logic_gap。这是本次评估核心信任问题的正确处理——不把工具返回值当地面真相。aq_1/aq_7 也都先 SQL 基准再工具对照。"
  unexplored_alternatives:
    - "未尝试 resolve_match(home=哥伦比亚, away=葡萄牙, date=2026-06-28) 作为另一条交叉验证路径，但 lottery 已足够交叉验证，非必要"
    - "未测试 league_id 传整数 1 在 direction=recent 下的过滤行为（已测 upcoming/all 两种，recent 默认行为已观察到 league_id 过滤失效迹象）"
  gap_judgment_confidence: high
answer_playbook:
  summary: "国家队+时间窗类轻量赛程查询，须用 get_team_schedule(direction=all) + LLM 手动按 league_name+match_time 窗过滤，交叉验证 get_lottery_schedule，输出剥离内部编号。"
  steps:
    - "1. resolve_team(name=国家队名) → 按 national=1 + 精确名称消歧选 team_id（排除俱乐部/梯队）"
    - "2. resolve_league(name=世界杯) → 选 league_id=1（2026 进行中世界杯，排除预选赛/U20/女足）"
    - "3. get_team_schedule(team_id, direction=all, limit=20) 获取全部近期赛事（禁用 direction=upcoming，当前有 bug）"
    - "4. LLM 层手动过滤：league_name='世界杯' + match_time_beijing 在用户时间窗内（『明早』=00:00-12:00 含凌晨早场）"
    - "5. 交叉验证 get_lottery_schedule(play_type=101, date=目标日) 兜底确认（竞彩接口含世界杯场次）"
    - "6. 多轮上下文：turn2/turn3 须继承 turn1 的 team_id，叠加用户补出的 competition_id 与细化时间窗"
    - "7. 输出模板：『{date} {HH:MM}（北京时间）{赛事}：{home} vs {away}（{home}主场），{status}』"
    - "8. 守门：剥离 match_id/team_id/league_id/lottery_code/工具名/中间态；未穷尽交叉验证前不得输出『无比赛』"
  forbidden:
    - "禁止使用 get_team_schedule(direction=upcoming) — 当前实现返回历史升序，语义反转"
    - "禁止使用 get_team_schedule(direction=upcoming, league_id=fc_1) — 返回 DATA_MISSING，是 #003 假阴性根因"
    - "禁止仅凭 league_id 整数过滤相信结果 — 当前实现过滤器被忽略，须 LLM 层按 league_name 二次过滤"
    - "禁止按字面 6-9 点理解『早上』— 须覆盖 00:00-12:00 含凌晨/早场（如 07:30）"
    - "禁止暴露 match_id/ft_/fc_/lottery_code『周六069』/工具名/『正在查询』『接口延迟』中间态"
    - "禁止未穷尽 DB 检索（SQL 基准 + direction=all + lottery 交叉验证）就断言『无比赛』"
  output_template: |
    6 月 28 日 07:30（北京时间）世界杯：哥伦比亚 vs 葡萄牙（哥伦比亚主场），未开赛。
    （若用户问「今晚」且今晚窗内无赛，须主动追加：「明早 07:30 有一场世界杯小组赛：哥伦比亚 vs 葡萄牙。」）
