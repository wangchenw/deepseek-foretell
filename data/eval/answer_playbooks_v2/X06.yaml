gaps:
  - gap_type: routing_gap
    detail: "entity resolution skill 未强制要求 resolve_match 双向查询。当用户表述「A vs B」时，agent 自然倾向正向 resolve_match(home=A, away=B)，但 DB 中该场可能是 B 主场，正向查询会返回 0 男足命中或被女足/青年队占满 top-10。反馈 #002 的「2024 误锚定 → 多次失败」正是缺此规则导致"
    evidence_ref: "path_attempts_v2/X06.yaml aq_3 round 2：resolve_match(home=法国, away=挪威) 返回 10 候选全为女足/青年队，0 男足命中；aq_4 round 1：resolve_match(home=挪威, away=法国) top-1 = 4460928 2026 世界杯"
    priority: P2
    recommended_action: "在 entity resolution skill / resolve_match 工具 docstring 中加规则：当 home/away 是用户表述顺序而非确定主客时，必须同时尝试 (home=A,away=B) 与 (home=B,away=A)，合并候选去重后让 LLM 按赛事等级+最近日期选定。或考虑给 resolve_match 增加一个 strict=false 参数自动双向"
  - gap_type: implementation_gap
    detail: "resolve_match top-10 排序把 2014 法国主场 vs 挪威的国际友谊赛挤出，且正向查询时 2026 挪威主场的世界杯场因 home 不匹配无法命中。工具排序未明显优先男足国家队 + 顶级赛事，导致用户表述方向反时连历史同向场次都看不到"
    evidence_ref: "path_attempts_v2/X06.yaml aq_3 round 2：正向 10 候选均为女足/U17/U19/U21/U23/室内，2014 男足友谊赛未出现"
    priority: P3
    recommended_action: "探索 resolve_match 排序策略：是否应优先 men's national team + 顶级赛事（世界杯/欧洲杯/欧冠）+ 最近日期；或增加 sport_filter/national_only 参数让 agent 显式过滤"
