path_exploration_review:
  reasoning_quality: "推理清晰。aq_3 round 1 先 SQL 基准了解全貌，round 2 正向工具对照发现 0 命中，自然引出 aq_4 反向尝试。每轮有明确假设，不是机械重试。aq_4 round 2 用 date pin 收敛 ambiguous→single 是漂亮的收尾"
  sql_baseline_quality: "优秀。aq_1/aq_2 查 football_team、aq_3 查 football_match 男足全部对阵、aq_5 查未来场次，每条 SQL 基准都与工具对照。aq_3 round 2 的对照「SQL 证明 DB 有 3 场男足，工具正向 0 命中」是经典的 SQL 优先于工具信任的范例"
  unexplored_alternatives:
    - "未尝试 get_team_schedule(team_id=10234, direction=all) + 手动筛选 away_team_id=13820 的场次作为第三路径；可作为补充但 SQL 基准已等价覆盖"
    - "未尝试 resolve_lottery_match（竞彩编号定位）——本 case 用户未给编号，不适用"
  gap_judgment_confidence: high
answer_playbook:
  summary: "「A vs B 具体哪场」类单场定位题：必须双向 resolve_match + SQL 基准对照，正向无男足国家队命中时立即反向重试，最终仅输出唯一选定的场次"
  steps:
    - "1. resolve_team 双方都定位（team_id + national=true 确认男足国家队）"
    - "2. SQL 基准：SELECT * FROM football_match WHERE ((home=A AND away=B) OR (home=B AND away=A))，了解 DB 里两队男足全部对阵历史"
    - "3. resolve_match(home=A, away=B) 正向；若返回 ambiguous 或无男足国家队候选 → 立即 resolve_match(home=B, away=A) 反向"
    - "4. 反向仍 ambiguous → 加 date pin（最近/即将进行的日期）收敛到 single"
    - "5. 多候选时按「最近 + 顶级赛事优先」选定唯一场；含对阵、北京时间、主客、赛事、轮次、状态"
    - "6. 输出前剥离 match_id/team_id/competition_id/工具名/查询过程；禁止「未找到」「换名重试」「正在查询」等中间态"
  forbidden:
    - "禁止仅正向 resolve_match 一次就放弃（已验证正向会漏掉主客反转的世界杯场）"
    - "禁止把「正向未找到 → 反向重试 → 命中」的探索过程呈现给用户（#002 P0 中间态外露）"
    - "禁止暴露 match_id / team_id / competition_id / 工具名"
    - "禁止按用户表述「法国 vs 挪威」臆测主客——必须以工具/SQL 返回的 home_name vs away_name 为准"
    - "禁止默认 2024 等错误年份锚定（#002 P0），无年份时按最近原则"
  output_template: |
    单一明确场次：
    「2026 世界杯小组赛第 3 轮：挪威 vs 法国，6/27 凌晨 03:00 开球（中立场，已完场）。」
