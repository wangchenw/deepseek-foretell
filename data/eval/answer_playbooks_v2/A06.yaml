recommended_answer_path: |
  生产层推荐路径(foretell 原生 + SQL 补充):
  1. 实体解析:用 team_id 直查(13152/11142/11079/11606/11017/12064/10582/10476)绕过 resolve_team 消歧,或 LLM 层在世界杯语境默认 national=1;
  2. 比赛定位:SQL 直查 football_match WHERE id IN (4460932,4460935,4460976,4460973) + competition_id=1,或 resolve_match(home=葡萄牙, away=刚果金/民主刚果, date=2026-06-18);
  3. 赛果:调 get_match_result(原生可用),返回 full_time/half_time/corner;4 场分别是 葡1-1刚果(爆冷平)、英4-2克(正路主胜)、加1-0巴(正路主胜)、乌1-3哥(正路客胜);
  4. 中国体彩赔率:调 get_lottery_schedule(play_type=101, date=2026-06-18) 取 4 场世界杯 spf/rq/bf/jq/bqc;按 home_name+away_name+date 对齐 match_id(命名映射:刚果金=民主刚果,乌兹别克=乌兹别克斯坦);
  5. 欧赔初盘:SQL football_odds_europe.first_odd1/2/3(赛前初盘);get_odds_snapshot 对完场不适用;
  6. 赔率走势/必发/凯利:三工具 stub,须诚实说明「赔率走势/资金流动数据未采集」,不编造;可用初盘→即时→最新(first_odd/odd/real_odd)三时点对比做静态走势替代;
  7. 庄家收割分析:基于 4 场赛果(1爆冷+3正路)+ 体彩 spf 赔率对照(葡萄牙 spf=1.13 大热打平=爆冷;英/加/乌正路)+ 欧赔初盘,分析「强队大热是否打出」「爆冷与正路分布」;不因一场爆冷推断全部爆冷(turn6 意图对齐);
  8. 让球胜平负预测:用体彩 rq 赔率 + 已完赛果对照,给出明天四场让球胜平负预判;不双向推荐;
  9. 输出:归纳优先于罗列,庄家视角连贯篇章;不暴露 lottery_code(周三021等)/lottery_id/match_id/team_id/工具名;数据缺失(走势/必发/凯利)逐项诚实说明。
