gaps:
  - gap_type: tool_logic_gap
    detail: "get_lottery_schedule / resolve_lottery_match 返回的 match_id 字段是
      lottery_zc_match.match_id（合成 ID = issue*10 + entry_num，如 260891），不是
      football_match.id 的真实外键。Agent 拿这个 match_id 调 get_odds_snapshot /
      get_match_result 等下游工具，会 JOIN 到 football_match 里恰好有 id=260891 的历史
      比赛（2009/2019 年，status_id=8 已完场），拿到完全无关的数据。这是生产环境现在
      就在用的有问题的工具，优先级最高。"
    evidence_ref: "path_attempts_v2/E05.yaml aq_3 round 1：JOIN 假命中 14/14 status_id=8
      + fm_time_str=2009/2019；aq_3 round 2/3：用名称+时间窗找到真实 id=4459718~4459732
      全部 status_id=1"
    priority: P1
    recommended_action: "修复 mysql_client._row_lottery_entry / get_lottery_schedule /
      resolve_lottery_match：① match_id 字段应解析为真实 football_match.id——用 home/away
      名称 + match_time 日期 JOIN football_match + football_team 反查真实 ID；或在
      lottery_zc_match 表新增 real_match_id 字段由上游数据管道填充；② 返回字段补充
      status_id（JOIN football_match 取），让上层可直接做两阶段初筛；③ resolve_lottery_match
      的 code='第N场' 返回多期候选时，应优先按 issue=MAX(issue) 或支持 issue 参数过滤本期。"
  - gap_type: implementation_gap
    detail: "get_lottery_schedule 返回不含 status_id 字段，无法直接做两阶段初筛第二阶段
      （区分未开赛/已完场）。需 Agent 额外用 home/away 名称 + 时间窗 + neutral 关联
      football_match 取 status_id，增加链路复杂度且易出错。"
    evidence_ref: "path_attempts_v2/E05.yaml aq_1 round 1：_row_lottery_entry 返回字段
      无 status_id；aq_3 round 2：必须 JOIN football_match 才能拿状态"
    priority: P2
    recommended_action: "在 _row_lottery_entry 增补 status_id 字段（LEFT JOIN football_match
      ON 真实 match_id）。与 P1 修复可合并。"
