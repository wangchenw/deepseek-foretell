recommended_answer_path: |
  生产 Foretell 答题路径(数据层已验证可行):
  1. 球队实体:SQL 直查 basketball_team WHERE name_zh LIKE '%雷霆%'/'%马刺%' → 10219/10137
     (禁用 resolve_team,因仅查 football_team);
  2. NBA 赛程:SQL 直查 basketball_match JOIN basketball_team JOIN basketball_competition,
     WHERE (home_team_id=10219 OR away_team_id=10219) AND 对手=马刺 ORDER BY match_time_str DESC
     → 最近一场 2026-05-31 08:00 雷霆主 vs 马刺客 季后赛 match_id=3921754 neutral=0;
     或工具路径 get_schedule_by_date(sport=basketball, league_preset=NBA, date=2026-05-31);
  3. 比赛分析(turn5):聚合 basketball_match 历史赛事得近期战绩/交锋;主客拆分按
     home_team_id/away_team_id 分组;若有 basketball_points_table_team 取赛季排名;
  4. 主客验证(turn7):用 home_team_id=10219(雷霆) + neutral=0 确认雷霆主场,
     不附和用户语气「应该是雷霆主场了吧」;
  5. 信心指数:基于赛程+主客+赛季排名+大小分盘口合成,列明依据,不编造星级;
  6. turn6 历史推荐回溯:无会话记录时显式说明「无法回溯此前 4 星大分推荐」,
     不得编造历史推荐;
  7. turn9 大小分:SQL 直查 lottery_jclq_odds(issue=今日, issue_num=对应编号)取
     dxf=214.5;或工具 get_lottery_schedule(play_type=201, date=2026-05-31);
     显式指出用户 219.5 与底库 214.5 mismatch,请用户确认;结合球队得分能力
     (basketball_match 历史总分聚合)给出大/小分倾向;
  8. 全程不暴露 match_id/team_id/竞彩编号/工具名;归纳优先于罗列;
     统计维度缺失时降级标注「篮球球队统计维度当前工具不可得,已用赛程+主客+盘口合成」。
