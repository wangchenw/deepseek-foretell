  2) NBA 赛程查询:basketball_match JOIN basketball_team JOIN basketball_competition,
     WHERE (home_team_id=10219 OR away_team_id=10219) AND 对手=马刺,返回 10 场含
     match_id/主客/日期/状态/赛事/比分/neutral 字段
  3) 主客验证(turn7):2026-05-31 场 home_team_id=10219(雷霆) neutral=0 → 雷霆主场,
     与用户猜测一致,但须用数据确认而非附和
