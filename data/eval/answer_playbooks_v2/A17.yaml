gaps:
  - gap_type: tool_logic_gap
    detail: "get_team_schedule(direction=upcoming, league_id='fc_1') 在法国队上也返回 DATA_MISSING 空结果，而 DB 实际有 4 场法国 2026 世界杯赛事（含 7/1 未赛）。这是 A08 已记录的 bug 在 A17 的重现，确认是工具层 bug 而非球队特定。生产环境任何用此参数组合的调用方都会得到假阴性。"
    evidence_ref: "path_attempts aq_3 round3 (direction=upcoming, league_id=fc_1) → DATA_MISSING；对照 aq_3 round1 SQL 基准 4 条命中"
    priority: P1
    recommended_action: "修复 foretell/tools/schedule.py get_team_schedule：league_id 前缀 strip 逻辑须在所有 direction 生效；upcoming 方向的 WHERE 拼接须正确处理 league_id 过滤。"
  - gap_type: tool_logic_gap
    detail: "get_team_schedule 的 league_id 整数过滤器在 direction=all 方向被静默忽略：传 league_id=1 仍返回欧国联/国际友谊/世欧预/欧洲杯等非世界杯赛事。A08/A17 双重验证。调用方若相信 league_id 过滤会得到错误结论。"
    evidence_ref: "path_attempts aq_3 round2 (direction=all, league_id=1) 返回 20 条含欧国联/国际友谊等；需手动按 league_name='世界杯' 过滤才得 4 条"
    priority: P1
    recommended_action: "修复 get_team_schedule SQL 拼接：league_id 参数须统一 strip 前缀后加入 WHERE competition_id=? 条件，且在所有 direction 生效。"
  - gap_type: data_gap
    detail: "反馈 #001 时点(2026-06-26) DB 可能只含 3 场法国小组赛，未呈现 7/1 淘汰赛 vs 瑞典。现(2026-06-28) DB 已含 4 场。这是数据时效性问题——赛程数据随赛事推进持续录入，淘汰赛对阵在小组赛结束后才确定。"
    evidence_ref: "path_attempts aq_3 round1 SQL 基准 4 条 vs 反馈 #001 列 3 场；aq_3 round4 lottery 交叉验证 7/1 法国vs瑞典存在"
    priority: P3
    recommended_action: "非紧急；纳米数据源会在赛事推进时更新淘汰赛对阵。Skill 层可在世界杯进行期主动提示『赛程可能随赛事推进更新，建议临场再查』。"
  - gap_type: routing_gap
    detail: "反馈 #001 P1 漏开球时间+主客是输出模板问题而非工具问题——工具返回的 match_time_beijing/home_name/away_name 字段齐全，是 LLM 层合成时未保留这两字段。Skill 层未固化赛程类问题的必需字段清单。"
    evidence_ref: "反馈 #001 待改进项 P1 缺开球时间/主客；本案 aq_4 输出模板已强制含这两字段"
    priority: P2
    recommended_action: "在 foretell-light-query Skill 中固化赛程类输出模板：表格列必须含『日期(北京时间)|赛事|对阵|主场|状态』，缺任一字段视为不合规。"
