# Pre-commit hooks for Foretell
# 安装：uv run pre-commit install
# 手动全量跑：uv run pre-commit run --all-files
#
# ruff / mypy 复用项目 venv 中的版本（language: system），避免与 CI 版本漂移。
# 首次需安装依赖：uv sync

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
        exclude: ^frontend/|^\.cursor/skills/
      - id: trailing-whitespace
        exclude: ^frontend/|^\.cursor/skills/
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=500]

  # mypy 不放 pre-commit（较慢，留给 CI），保持提交期轻量。
