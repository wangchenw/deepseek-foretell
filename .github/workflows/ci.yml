name: CI

on:
  push:
    branches: [main]
  pull_request:

# 取消同一分支上的旧运行，节省额度
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    name: Lint & Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.14"]

    env:
      # 测试套件离线可跑：conftest autouse 已强制 CRAZY_SPORTS_DATA_SOURCE=mock。
      # 仅 create_foretell_agent 图编译测试需要 key 字符串存在（构造 ChatOpenAI 不发网络请求）。
      MINIMAX_API_KEY: test-key-for-pytest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        # 装主依赖 + dev（ruff/mypy）；不装 prod（Postgres，CI 不需要）
        run: uv sync --extra dev

      - name: Ruff check
        run: uv run ruff check

      - name: Ruff format check
        run: uv run ruff format --check

      - name: Mypy
        run: uv run mypy

      - name: Pytest
        run: uv run pytest
